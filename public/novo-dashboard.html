<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRO Dashboard | Axenya</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#171f2e;--card2:#1e2a3c;--border:#293a50;--text:#e6edf3;--text2:#8b949e;--muted:#6e7681;--teal:#3ab8b7;--green:#3fb950;--red:#f85149;--orange:#d29922;--yellow:#e3b341;--hover:rgba(255,255,255,0.06);--even-s:#131b28;--hover-s:#1c2b40}
html[data-theme="light"]{--bg:#f6f8fa;--card:#ffffff;--card2:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#57606a;--teal:#0d7377;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--hover:rgba(0,0,0,0.05);--even-s:#f1f4f8;--hover-s:#e8eef4}
body{background:var(--bg);color:var(--text);font-family:Inter,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5}
button,input,select,textarea{font-family:Inter,'Segoe UI',system-ui,sans-serif}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.15rem}

/* Buttons */
.hdr-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);border-radius:99px;cursor:pointer;transition:background .15s,color .15s;position:relative;flex-shrink:0}
.hdr-btn:hover{background:rgba(255,255,255,0.13);color:var(--text)}
html[data-theme="light"] .hdr-btn:hover{background:rgba(0,0,0,0.07)}
.hdr-btn.highlighted{background:var(--teal)!important;color:#fff!important;box-shadow:0 0 0 2px rgba(58,184,183,.3)}
.hdr-btn.highlighted:hover{filter:brightness(.88)}
[data-theme="light"] .hdr-btn.highlighted{color:#fff!important}
.hdr-btn[data-tooltip]::after{content:attr(data-tooltip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);font-size:.73rem;font-family:Inter,'Segoe UI',system-ui,sans-serif;font-weight:400;padding:.26rem .62rem;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300}
.hdr-btn[data-tooltip]:hover::after{opacity:1}
.hdr-sep{width:1px;height:16px;background:rgba(255,255,255,0.12);margin:0 2px;flex-shrink:0}
html[data-theme="light"] .hdr-sep{background:rgba(0,0,0,0.12)}
.hdr-actions{display:flex;align-items:center;background:rgba(255,255,255,0.09);border-radius:99px;padding:7px;gap:12px}
html[data-theme="light"] .hdr-actions{background:rgba(0,0,0,0.03)}
@keyframes hdr-spin{to{transform:rotate(360deg)}}
.hdr-btn.spinning svg{animation:hdr-spin .7s linear infinite}

/* Nav Drawer */
.nav-drawer{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--card);border-right:1px solid rgba(255,255,255,.08);z-index:1000;transition:left .25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.nav-drawer.open{left:0}
.nav-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s ease}
.nav-backdrop.open{opacity:1;pointer-events:auto}
.nav-drawer-header{display:flex;align-items:center;gap:.75rem;padding:1.1rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-drawer-brand{font-weight:600;font-size:1rem;color:var(--text);flex:1}
.nav-menu{list-style:none;padding:.5rem 0;margin:0}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.25rem;cursor:pointer;font-size:.9rem;color:var(--text2);transition:background .15s,color .15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.nav-item.active{color:var(--teal);font-weight:500}
.nav-item.active svg{stroke:var(--teal)}
[data-theme="light"] .nav-drawer{background:var(--card);border-right-color:rgba(0,0,0,.1)}
[data-theme="light"] .nav-backdrop{background:rgba(0,0,0,.3)}
[data-theme="light"] .nav-item:hover{background:rgba(0,0,0,.04)}

/* Header */
.novo-hdr{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.25rem 2rem;background:var(--card);position:sticky;top:0;z-index:100}
.novo-theme-sun{display:block}.novo-theme-moon{display:none}
[data-theme="light"] .novo-theme-sun{display:none}[data-theme="light"] .novo-theme-moon{display:block}
.novo-lang-btn{width:auto !important;padding:0 9px;font-size:.71rem;font-weight:700;letter-spacing:.06em}

/* Cards */
.novo-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:1rem;padding-bottom:2rem}
.novo-card{background:var(--card);border-radius:10px;padding:1.25rem 1.5rem}
.novo-card-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.novo-card-header h3{font-size:.88rem;font-weight:600;color:var(--text);margin:0;flex:1}

/* Info button */
.novo-info-btn{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--text2);background:none;color:var(--text2);font-size:.62rem;font-style:normal;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;padding:0;line-height:1}
.novo-info-btn[data-tooltip]::after{content:attr(data-tooltip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);font-size:.73rem;font-family:Inter,'Segoe UI',system-ui,sans-serif;font-weight:400;padding:.4rem .7rem;border-radius:6px;white-space:normal;width:270px;text-align:left;line-height:1.5;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300;border:1px solid var(--border)}
.novo-info-btn[data-tooltip]:hover::after{opacity:1}

/* Tab sub */
.tab-sub{display:flex;gap:0;margin-bottom:1rem}
.tab-sub-btn{background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:.35rem .8rem;cursor:pointer;font-size:.75rem;transition:background-color .12s,border-color .12s,color .12s}
.tab-sub-btn:first-child{border-radius:6px 0 0 6px}
.tab-sub-btn:last-child{border-radius:0 6px 6px 0}
.tab-sub-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}

/* Skeleton */
@keyframes novo-shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
.novo-skel{background:linear-gradient(90deg,var(--card2) 25%,var(--hover) 50%,var(--card2) 75%);background-size:1600px 100%;animation:novo-shimmer 1.4s ease-in-out infinite}

/* Blur + nav docking */
#view-novo{transition:filter .25s ease,margin-left .25s cubic-bezier(0.4,0,0.2,1)}
body.nav-docked #view-novo{margin-left:280px}
@media(max-width:820px){body.nav-docked #view-novo{margin-left:0}}
.content-blur{filter:blur(4px);pointer-events:none;user-select:none}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s linear;backdrop-filter:blur(5px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:90vw;max-width:960px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .28s cubic-bezier(0.4,0,0.2,1);will-change:transform}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1rem;font-weight:600;color:var(--text)}
.modal-back{background:none;border:none;color:var(--text2);font-size:1rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px;transition:color .15s;display:none}
.modal-back:hover{color:var(--teal)}
.modal-back.visible{display:inline-flex;align-items:center;gap:.3rem}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px;transition:color .15s}
.modal-close:hover{color:var(--red)}
.modal-body{padding:1.2rem 1.5rem;overflow-y:auto;flex:1}
.btn-export{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:.3rem .7rem;font-size:.7rem;cursor:pointer;transition:border-color .12s,color .12s;margin-left:auto}
.btn-export:hover{border-color:var(--teal);color:var(--teal)}
table.lb{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
table.lb th{text-align:right;color:var(--teal);font-size:.72rem;font-weight:700;text-transform:uppercase;padding:.6rem 1rem;border-bottom:2px solid var(--teal);white-space:nowrap;position:sticky;top:0;background:var(--card)}
table.lb th:first-child{text-align:left}
table.lb td{padding:calc(.38rem + 0.4px) calc(.65rem + 0.4px) calc(.38rem + 0.4px) 1rem;border-bottom:1px solid var(--border);color:var(--text);text-align:right;font-variant-numeric:lining-nums}
table.lb td:first-child{text-align:left;font-weight:600}
table.lb tbody tr{transition:background-color .12s}
table.lb tbody tr:nth-child(even) td{background:var(--even-s)}
table.lb tbody tr:hover td{background:var(--hover-s)}
table.lb tfoot td{font-weight:600;border-top:2px solid var(--border)}

/* Settings drawer */
.novo-prob-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s ease}
.novo-prob-backdrop.open{opacity:1;pointer-events:auto}
.novo-prob-drawer{position:fixed;top:0;right:-380px;width:360px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:3001;display:flex;flex-direction:column;transition:right .28s cubic-bezier(0.4,0,0.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.25)}
.novo-prob-drawer.open{right:0}
.novo-prob-drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.novo-prob-drawer-hdr h3{margin:0;font-size:1.35rem;font-weight:600;color:var(--text)}
.novo-prob-body{flex:1;overflow-y:auto;padding:0 1.5rem}
.novo-prob-field{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border)}
.novo-prob-field label{flex:1;font-size:.9rem;color:var(--text)}
.novo-prob-field input{width:72px;text-align:right;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.35rem .5rem;font-size:.9rem;font-family:inherit}
.novo-prob-field input:focus{outline:none;border-color:var(--teal)}
.novo-prob-pct{font-size:.85rem;color:var(--text2);width:14px}
.novo-prob-drawer-ftr{display:flex;justify-content:center;gap:1rem;padding:1.25rem 1.5rem;border-top:1px solid var(--border);flex-shrink:0}
.novo-prob-cancel{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--card2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.novo-prob-cancel:hover{border-color:var(--text2);color:var(--text)}
.novo-prob-save{width:48px;height:48px;border-radius:50%;border:none;background:var(--teal);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.novo-prob-save:hover{background:#2ea5a4}

/* Help drawer (desliza da direita, desfoca o fundo) */
.novo-help-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s ease}
.novo-help-backdrop.open{opacity:1;pointer-events:auto}
.novo-help-drawer{position:fixed;top:0;right:-580px;width:540px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:3001;display:flex;flex-direction:column;transition:right .28s cubic-bezier(0.4,0,0.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.25)}
.novo-help-drawer.open{right:0}
.novo-help-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.novo-help-hdr h3{margin:0;font-size:1.15rem;font-weight:600;color:var(--text)}
.novo-help-body{flex:1;overflow-y:auto;padding:1.25rem 1.5rem}
</style>
</head>
<body>

<!-- Nav Drawer -->
<nav class="nav-drawer" id="nav-drawer" aria-label="Menu principal">
  <div class="nav-drawer-header">
    <span class="nav-drawer-brand">Dashboard Axenya</span>
    <button class="hdr-btn" onclick="closeDrawer()" aria-label="Fechar menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <ul class="nav-menu">
    <li class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      CRO Dashboard
    </li>
  </ul>
</nav>
<div class="nav-backdrop" id="nav-backdrop" onclick="closeDrawer()"></div>

<!-- Main view -->
<div id="view-novo">
  <div class="novo-hdr">
    <div style="display:flex;align-items:center;gap:.75rem">
      <button class="hdr-btn" onclick="toggleDrawer()" data-tooltip="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div>
        <h1>CRO Dashboard</h1>
      </div>
    </div>
    <div class="hdr-actions">
      <button class="hdr-btn" onclick="doLogout()" data-tooltip="Sair">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <div class="hdr-sep"></div>
      <button class="hdr-btn novo-lang-btn" id="novo-lang-btn" onclick="novoToggleLang()" data-tooltip="Idioma / Language">
        <span id="novo-lang-label">PT</span>
      </button>
      <button class="hdr-btn" onclick="toggleTheme()" data-tooltip="Alternar tema">
        <svg class="novo-theme-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="novo-theme-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="hdr-btn" onclick="novoHelp()" data-tooltip="Campos do HubSpot por gráfico">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
      <button class="hdr-btn" onclick="novoOpenProbEditor()" data-tooltip="Configurações">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="hdr-btn" onclick="exportFullLayout()" data-tooltip="Exportar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="hdr-btn highlighted" id="btn-refresh" onclick="_novoDeals = null; novoLoadData();" data-tooltip="Atualizar dados">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>
  </div>
  <div id="novo-content" style="max-width:1400px;margin:0 auto;padding:2rem">
    <div id="novo-status" style="text-align:center;padding:3rem 0;color:var(--text2);font-size:.9rem">
      Aguardando dados…
    </div>
  </div>
</div>

<!-- Settings drawer -->
<div class="novo-prob-backdrop" id="novo-prob-backdrop" onclick="novoCloseProbEditor()"></div>
<div class="novo-prob-drawer" id="novo-prob-drawer">
  <div class="novo-prob-drawer-hdr">
    <h3>Configurações</h3>
    <button class="hdr-btn" onclick="novoCloseProbEditor()" aria-label="Fechar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="novo-prob-body">
    <div class="novo-prob-field"><label>Cotação</label><input type="text" id="np-cot"><span class="novo-prob-pct">%</span></div>
    <div class="novo-prob-field"><label>Proposta Enviada <span style="opacity:.5;font-size:.8em">(BID)</span></label><input type="text" id="np-pro"><span class="novo-prob-pct">%</span></div>
    <div class="novo-prob-field"><label>Consultoria</label><input type="text" id="np-con"><span class="novo-prob-pct">%</span></div>
    <div class="novo-prob-field"><label>Negociação</label><input type="text" id="np-neg"><span class="novo-prob-pct">%</span></div>
    <div class="novo-prob-field"><label>Implantação</label><input type="text" id="np-imp"><span class="novo-prob-pct">%</span></div>
    <div class="novo-prob-field"><label>Ganho</label><input type="text" id="np-gan"><span class="novo-prob-pct">%</span></div>
    <div class="novo-prob-field" style="border-bottom:none"><label>Standby</label><input type="text" id="np-stb"><span class="novo-prob-pct">%</span></div>
    <div style="height:1px;background:var(--border);margin:.25rem 0"></div>
    <div class="novo-prob-field" style="border-bottom:none"><label>Diagnóstico <span style="opacity:.5;font-size:.8em">(conversão)</span></label><input type="text" id="np-dia"><span class="novo-prob-pct">%</span></div>
  </div>
  <div class="novo-prob-drawer-ftr">
    <button class="novo-prob-cancel" onclick="novoCloseProbEditor()" title="Cancelar">

// ── Blur ──────────────────────────────────────────────────────────────────────
function setContentBlur(on) {
  var el = document.getElementById('view-novo');
  if (el) el.classList.toggle('content-blur', on);
}

// ── Nav Drawer ────────────────────────────────────────────────────────────────
// Modo "docked": o menu fica aberto e empurra o conteúdo (sem backdrop bloqueando).
// Em telas estreitas (<=820px) ele volta a sobrepor o conteúdo com backdrop.
function _setNavOpen(open) {
  document.getElementById('nav-drawer').classList.toggle('open', open);
  document.body.classList.toggle('nav-docked', open);
  var narrow = window.matchMedia('(max-width:820px)').matches;
  document.getElementById('nav-backdrop').classList.toggle('open', open && narrow);
  try { localStorage.setItem('novo_nav_open', open ? 'true' : 'false'); } catch(e) {}
}
function openDrawer()  { _setNavOpen(true); }
function closeDrawer() { _setNavOpen(false); setContentBlur(false); }
function toggleDrawer() {
  _setNavOpen(!document.getElementById('nav-drawer').classList.contains('open'));
}

// ── Modal ─────────────────────────────────────────────────────────────────────
var modalStack = [];
function openModal(title, bodyHtml) {
  setContentBlur(true);
  var overlay = document.getElementById('modal-overlay');
  if (overlay.classList.contains('open')) {
    modalStack.push({ title: document.getElementById('modal-title').textContent, body: document.getElementById('modal-body').innerHTML });
  }
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-back').classList.toggle('visible', modalStack.length > 0);
  var hasLb = document.getElementById('modal-body').querySelector('table.lb');
  var headerBtn = document.querySelector('#modal-overlay .btn-export');
  if (headerBtn) headerBtn.style.display = hasLb ? 'none' : '';
  overlay.classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  var headerBtn = document.querySelector('#modal-overlay .btn-export');
  if (headerBtn) headerBtn.style.display = '';
  modalStack = [];
  document.getElementById('modal-back').classList.remove('visible');
  setContentBlur(false);
}
function modalGoBack() {
  if (!modalStack.length) return;
  var prev = modalStack.pop();
  document.getElementById('modal-title').textContent = prev.title;
  document.getElementById('modal-body').innerHTML = prev.body;
  document.getElementById('modal-back').classList.toggle('visible', modalStack.length > 0);
  document.getElementById('modal-body').scrollTop = 0;
}
function exportModalCSV() {
  var title = document.getElementById('modal-title').textContent;
  var body  = document.getElementById('modal-body');
  var table = body.querySelector('table');
  if (!table) return;
  var rows = [];
  table.querySelectorAll('tr').forEach(function(tr) {
    var cells = [];
    tr.querySelectorAll('th,td').forEach(function(cell) {
      var v = cell.textContent.trim().replace(/"/g,'""');
      cells.push('"' + v + '"');
    });
    rows.push(cells.join(','));
  });
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows.join('\n'));
  a.download = (title||'export').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40) + '-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// ── Exportar layout ──────────────────────────────────────────────────────────
function exportFullLayout() {
  if (!_novoDeals) { alert('Carregue os dados primeiro.'); return; }
  var rows = [['Deal','AE','Pipeline','Etapa','Dias','Colaboradores','Vidas','1ª Fatura','ARR Estimado','Modelo','Agenciamento','Vitalício','Prob AE','P. Etapa','P. Ajust.','Quarter','Dt. Receita']];
  _novoDeals.forEach(function(d) {
    var pi = _calcProbInfo(d);
    rows.push([
      d.dealname||'', d.ae||'', d.pipeline||'', d.stage||'',
      d.dias_no_pipe!=null?d.dias_no_pipe:'', d.colaboradores!=null?d.colaboradores:'', d.vidas!=null?d.vidas:'',
      d.primeira_fatura!=null?d.primeira_fatura:'', d.arr_estimado!=null?d.arr_estimado:'', d.modelo_remuneracao||'',
      d.possui_agenciamento===true?'Sim':d.possui_agenciamento===false?'Não':'',
      d.possui_vitalicio===true?'Sim':d.possui_vitalicio===false?'Não':'',
      d.probabilidade!=null?(d.probabilidade*100).toFixed(1)+'%':'',
      pi.sp!=null?(pi.sp*100).toFixed(1)+'%':'',
      pi.final!=null?(pi.final*100).toFixed(1)+'%':'',
      d.quarter||'', d.data_prevista_para_receita||''
    ]);
  });
  var csv = rows.map(function(r){ return r.map(function(c){ return '"'+(String(c).replace(/"/g,'""'))+'"'; }).join(','); }).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,﻿' + encodeURIComponent(csv);
  a.download = 'novo-dashboard-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

      var merged = {};
      Object.keys(NOVO_STAGE_PROB_DEFAULT).forEach(function(k) { merged[k] = NOVO_STAGE_PROB_DEFAULT[k]; });
      Object.keys(parsed).forEach(function(k) { merged[k] = parsed[k]; });
      return merged;
    }
  } catch(e) {}
  var copy = {};
  Object.keys(NOVO_STAGE_PROB_DEFAULT).forEach(function(k) { copy[k] = NOVO_STAGE_PROB_DEFAULT[k]; });
  return copy;
})();

  setContentBlur(true);

function novoSaveProbEditor() {
  var parse = function(id) { return parseFloat(document.getElementById(id).value.replace(',', '.')); };
  var v = { cot: parse('np-cot'), pro: parse('np-pro'), con: parse('np-con'), neg: parse('np-neg'),
            imp: parse('np-imp'), gan: parse('np-gan'), stb: parse('np-stb'), dia: parse('np-dia') };
  var list = [v.cot, v.pro, v.con, v.neg, v.imp, v.gan, v.stb, v.dia];
  if (list.some(isNaN)) { alert('Preencha todos os campos com valores numéricos.'); return; }
  if (list.some(function(n) { return n < 0 || n > 100; })) { alert('Probabilidades devem estar entre 0 e 100.'); return; }
  NOVO_STAGE_PROB['Cotação']          = v.cot / 100;
  NOVO_STAGE_PROB['Proposta Enviada'] = v.pro / 100;
  NOVO_STAGE_PROB['Consultoria']      = v.con / 100;
  NOVO_STAGE_PROB['Negociação']       = v.neg / 100;
  NOVO_STAGE_PROB['Implantação']      = v.imp / 100;
  NOVO_STAGE_PROB['Ganho']            = v.gan / 100;
  NOVO_STAGE_PROB['Standby']          = v.stb / 100;
  NOVO_STAGE_PROB['Stand by']         = v.stb / 100;
  NOVO_STAGE_PROB['Diagnóstico']      = v.dia / 100;
  try { localStorage.setItem('novo_stage_prob', JSON.stringify(NOVO_STAGE_PROB)); } catch(e) {}
  novoCloseProbEditor();
}

// ── Dados ─────────────────────────────────────────────────────────────────────
var _novoDeals   = null;
var _novoLoading = false;
var _novoChartAE = null;
var _novoAeMode    = 'lives';
var _novoStageMode = 'deals';
var _novoConcMode  = 'vidas';
var _novoValMode   = 'raw';
var COTACAO_PLUS = ['Cotação','Consultoria','Negociação','Stand by','Implantação','Proposta Enviada','Standby'];
var _novoModalDeals = [];
var _novoModalSort  = { col: -1, dir: 1 };
var NOVO_FONT = "Inter,'Segoe UI',system-ui,sans-serif";

// Formatadores
var _ne = function(s) { return (s == null ? '—' : String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
var _np = function(v) { return v != null ? (v * 100).toFixed(1) + '%' : '—'; };
var _ni = function(v) { return v != null ? Number(v).toLocaleString('pt-BR') : '—'; };
var _nb = function(v) { return v === true ? 'Sim' : v === false ? 'Não' : '—'; };
var _nd = function(v) { if (!v) return '—'; var p = v.split('-'); return p.length===3 ? p[2]+'/'+p[1]+'/'+p[0] : v; };
var _nr = function(v) { return v != null ? Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'; };

function _calcProbInfo(d) {
  var sp = NOVO_STAGE_PROB[d.stage];
  if (sp == null) return { sp: null, cp: null, final: null };
  var cp = d.probabilidade;
  if (cp == null) return { sp: sp, cp: null, final: sp };
  if (cp <= sp - 0.3) return { sp: sp, cp: cp, final: sp * 0.9 };
  if (cp >= sp + 0.3) return { sp: sp, cp: cp, final: sp * 1.1 };
  return { sp: sp, cp: cp, final: sp };
}

function _novoDealsRows(deals) {
  return deals.map(function(d) {
    var hsUrl = 'https://app.hubspot.com/contacts/44444289/deal/' + d.hs_id;
    var nameCell = d.hs_id
      ? '<a href="'+hsUrl+'" target="_blank" rel="noopener" style="color:var(--teal);text-decoration:none" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">'+_ne(d.dealname)+'</a>'
      : _ne(d.dealname);
    var pi = _calcProbInfo(d);
    return '<tr>'+
      '<td style="text-align:left;min-width:150px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+nameCell+'</td>'+
      '<td style="text-align:left;white-space:nowrap">'+_ne(d.ae)+'</td>'+
      '<td style="white-space:nowrap">'+_ne(d.pipeline)+'</td>'+
      '<td style="white-space:nowrap">'+_ne(d.stage)+'</td>'+
      '<td>'+_ni(d.dias_no_pipe)+'</td>'+
      '<td>'+_ni(d.colaboradores)+'</td>'+
      '<td>'+_ni(d.vidas)+'</td>'+
      '<td>'+_nr(d.primeira_fatura)+'</td>'+
      '<td>'+_nr(d.arr_estimado)+'</td>'+
      '<td style="white-space:nowrap">'+_ne(d.modelo_remuneracao)+'</td>'+
      '<td>'+_nb(d.possui_agenciamento)+'</td>'+
      '<td>'+_nb(d.possui_vitalicio)+'</td>'+
      '<td>'+_np(d.probabilidade)+'</td>'+
      '<td>'+_np(pi.sp)+'</td>'+
      '<td>'+_np(pi.final)+'</td>'+
      '<td style="white-space:nowrap">'+_ne(d.quarter)+'</td>'+
      '<td style="white-space:nowrap">'+_nd(d.data_prevista_para_receita)+'</td>'+
    '</tr>';
  }).join('');
}

function _novoSortVal(d, col) {
  switch(col) {
    case 0:  return (d.dealname||'').toLowerCase();
    case 1:  return (d.ae||'').toLowerCase();
    case 2:  return (d.pipeline||'').toLowerCase();
    case 3:  return (d.stage||'').toLowerCase();
    case 4:  return d.dias_no_pipe;
    case 5:  return d.colaboradores;
    case 6:  return d.vidas;
    case 7:  return d.primeira_fatura;
    case 8:  return d.arr_estimado;
    case 9:  return (d.modelo_remuneracao||'').toLowerCase();
    case 10: return d.possui_agenciamento === true ? 1 : d.possui_agenciamento === false ? 0 : null;
    case 11: return d.possui_vitalicio   === true ? 1 : d.possui_vitalicio   === false ? 0 : null;
    case 12: return d.probabilidade;
    case 13: return _calcProbInfo(d).sp;
    case 14: return _calcProbInfo(d).final;
    case 15: return (d.quarter||'').toLowerCase();
    case 16: return d.data_prevista_para_receita||'';
    default: return null;
  }
}

function novoSortDeals(col) {
  if (_novoModalSort.col === col) { _novoModalSort.dir *= -1; }
  else { _novoModalSort.col = col; _novoModalSort.dir = 1; }
  for (var i = 0; i < 17; i++) {
    var ind = document.getElementById('ndsi-'+i);
    if (ind) ind.textContent = i === col ? (_novoModalSort.dir === 1 ? ' ↑' : ' ↓') : '';
  }
  var dir = _novoModalSort.dir;
  var sorted = _novoModalDeals.slice().sort(function(a,b) {
    var va = _novoSortVal(a,col), vb = _novoSortVal(b,col);
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return va.localeCompare(vb) * dir;
    return (va - vb) * dir;
  });
  var tbody = document.getElementById('novo-deals-tbody');
  if (tbody) tbody.innerHTML = _novoDealsRows(sorted);
}

function novoSetStatus(html) {

}

            '<div class="novo-skel" style="width:54px;height:28px;border-radius:8px"></div>' +

function novoLoadData() {
  if (_novoLoading) return;
  _novoLoading = true;
  var btn = document.getElementById('btn-refresh');
  if (btn) { btn.classList.add('spinning'); btn.disabled = true; }
  novoShowSkeleton();
  fetch('/api/forecast-table')
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Erro ' + r.status); });
      return r.json();
    })
    .then(function(data) {
      _novoDeals = data.deals || [];
      _novoLoading = false;
      if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
      novoRender();
    })
    .catch(function(err) {
      _novoLoading = false;
      if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
      novoSetStatus(
        '<span style="color:var(--red)">' + t('error_prefix') + err.message + '</span>' +
        '<br><button onclick="novoLoadData()" style="margin-top:.75rem;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:.35rem .9rem;font-size:.85rem;cursor:pointer">' + t('retry') + '</button>'
      );
    });
}

function novoSwitchAeMode(mode) {
  _novoAeMode = mode;
  document.querySelectorAll('#novo-ae-tabs .tab-sub-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-mode') === mode);
  });
  buildNovoVidasAE();
}

function buildNovoVidasAE() {
  if (typeof Chart !== 'undefined') {
    Chart.defaults.font.family = NOVO_FONT;
    Chart.defaults.font.size   = 12;
  }
  var deals = _novoDeals || [];
  var s = getComputedStyle(document.documentElement);
  var cText  = s.getPropertyValue('--text').trim()  || '#e6edf3';
  var cText2 = s.getPropertyValue('--text2').trim() || '#8b949e';
  var fontCfg = { family: NOVO_FONT };
  var isLight = document.documentElement.getAttribute('data-theme') === 'light';
  var cGrid   = isLight ? 'rgba(0,0,0,.08)' : 'rgba(255,255,255,.06)';

  var agg = {}, byAe = {};
  deals.forEach(function(d) {
    if (COTACAO_PLUS.indexOf(d.stage) < 0) return;
    if (!d.ae || d.ae === '-') return;
    var inc = _novoAeMode === 'deals' ? 1 : (d.vidas || 0);
    agg[d.ae] = (agg[d.ae] || 0) + inc;
    if (!byAe[d.ae]) byAe[d.ae] = [];
    byAe[d.ae].push(d);
  });

  var ranked = Object.keys(agg).map(function(ae) {
    return { ae: ae, value: agg[ae] };
  }).sort(function(a, b) { return b.value - a.value; });
  var total = ranked.reduce(function(sum, r) { return sum + r.value; }, 0);

  var canvas = document.getElementById('chart-novo-vidas-ae');
  if (!canvas) return;
  if (_novoChartAE) { _novoChartAE.destroy(); _novoChartAE = null; }

  if (!ranked.length) {
    canvas.style.display = 'none';
    var msg = document.createElement('p');
    msg.style.cssText = 'color:var(--text2);text-align:center;padding:2rem;font-size:.85rem';
    msg.textContent = t('no_data');
    canvas.parentNode.appendChild(msg);
    return;
  }

  var unit = _novoAeMode === 'deals' ? t('tab_deals').toLowerCase() : t('tab_vidas').toLowerCase();

  _novoChartAE = new Chart(canvas, {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: {
      labels: ranked.map(function(r) { return r.ae; }),
      datasets: [{
        data: ranked.map(function(r) { return r.value; }),
        backgroundColor: 'rgba(58,184,183,.75)',
        hoverBackgroundColor: 'rgba(58,184,183,1)',
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        datalabels: {
          display: true, anchor: 'end', align: 'right',
          color: cText,
          font: { family: NOVO_FONT, size: 11, weight: 'bold' },
          formatter: function(v) {
            var pct = total > 0 ? ' (' + (v / total * 100).toFixed(1) + '%)' : '';
            return v.toLocaleString('pt-BR') + pct;
          }
        },
        tooltip: {
          bodyFont: fontCfg, titleFont: fontCfg,
          footerFont: { family: NOVO_FONT, size: 11, style: 'normal' },
          displayColors: false, padding: 12,
          footerColor: 'rgba(139,148,158,.7)',
          callbacks: {
            label: function(ctx) { return ctx.parsed.x.toLocaleString('pt-BR') + ' ' + unit; },
            afterLabel: function(ctx) {
              var pct = total > 0 ? (ranked[ctx.dataIndex].value / total * 100).toFixed(1) : '0';
              return [
                pct + '% ' + t('of_total'),
                total.toLocaleString('pt-BR') + ' ' + unit + ' no total'
              ];
            },
            footer: function() { return 'Clique para ver os deals'; }
          }
        }
      },
      scales: {
        x: { grid: { color: cGrid }, ticks: { color: cText2, font: fontCfg } },
        y: { grid: { display: false }, ticks: { color: cText, font: fontCfg } }
      },
      onClick: function(evt, elems) {
        if (!elems.length) return;
        var item = ranked[elems[0].index];
        novoOpenDealsModal(t('title_vidas_ae') + ' | ' + item.ae, byAe[item.ae] || []);
      }
    }
  });
  canvas.style.cursor = 'pointer';
}

// ── Drill modal compartilhado (usado por todos os gráficos) ─────────────────────
function novoOpenDealsModal(title, deals) {
  _novoModalDeals = (deals || []).slice().sort(function(a,b){ return (b.vidas||0)-(a.vidas||0); });
  _novoModalSort  = { col: -1, dir: 1 };
  var totalVidas  = _novoModalDeals.reduce(function(s,d){ return s+(d.vidas||0); }, 0);
  var totalArr    = _novoModalDeals.reduce(function(s,d){ return s+(d.arr_estimado||0); }, 0);
  var sub = _novoModalDeals.length + ' deal' + (_novoModalDeals.length !== 1 ? 's' : '');
  var tfoot = _novoModalDeals.length > 0
    ? '<tfoot><tr><td style="text-align:left;font-weight:600" colspan="6">Total</td>'+
      '<td style="font-weight:600">'+_ni(totalVidas)+'</td>'+
      '<td></td>'+
      '<td style="font-weight:600">'+_nr(totalArr)+'</td>'+
      '<td colspan="8"></td></tr></tfoot>'
    : '';
  var ts = 'padding:.4rem .5rem;white-space:nowrap;font-size:.68rem;cursor:pointer;user-select:none';
  var th = function(label, col, left) {
    return '<th style="'+ts+(left?';text-align:left':'')+'" onclick="novoSortDeals('+col+')">'+
      label+'<span id="ndsi-'+col+'" style="color:var(--teal);font-size:.6rem"></span></th>';
  };
  var body =
    '<p style="font-size:.78rem;color:var(--text2);margin-bottom:.6rem">'+sub+'</p>'+
    '<div style="overflow-x:auto">'+
    '<table class="lb" style="width:100%;font-size:.75rem"><thead><tr>'+
      th('Deal',0,true)+th('AE',1,true)+th('Pipe',2)+th('Etapa',3)+
      th('Dias',4)+th('Colab.',5)+th('Vidas',6)+th('1\xaa Fatura (R$)',7)+th('ARR Est. (R$)',8)+
      th('Modelo',9)+th('Agenc.',10)+th('Vit.',11)+
      th('Prob AE',12)+th('P. Etapa',13)+th('P. Ajust.',14)+
      th('Quarter',15)+th('Dt. Receita',16)+
    '</tr></thead><tbody id="novo-deals-tbody">'+_novoDealsRows(_novoModalDeals)+'</tbody>'+tfoot+'</table></div>';
  openModal(title, body);
}

// ── Helpers de gráfico ──────────────────────────────────────────────────────────
var _novoCharts = {};
function _novoTheme() {
  var s = getComputedStyle(document.documentElement);
  var isLight = document.documentElement.getAttribute('data-theme') === 'light';
  return {
    cText:  s.getPropertyValue('--text').trim()  || '#e6edf3',
    cText2: s.getPropertyValue('--text2').trim() || '#8b949e',
    cGrid:  isLight ? 'rgba(0,0,0,.08)' : 'rgba(255,255,255,.06)',
    isLight: isLight
  };
}
function _novoMkChart(id, cfg) {
  var canvas = document.getElementById(id);
  if (!canvas) return null;
  if (typeof Chart !== 'undefined') { Chart.defaults.font.family = NOVO_FONT; Chart.defaults.font.size = 12; }
  if (_novoCharts[id]) { try { _novoCharts[id].destroy(); } catch(e) {} }
  _novoCharts[id] = new Chart(canvas, cfg);
  canvas.style.cursor = 'pointer';
  return _novoCharts[id];
}
function _setActive(containerId, mode) {
  var c = document.getElementById(containerId);
  if (!c) return;
  c.querySelectorAll('.tab-sub-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-mode') === mode); });
}
var NOVO_WON_STAGE = 'Ganho';
var NOVO_STAGE_ORDER = ['Diagnóstico','Cotação','Proposta Enviada','Consultoria','Negociação','Standby','Implantação'];
function _stageNorm(s) { return s === 'Stand by' ? 'Standby' : s; }
function _novoOpen() { return (_novoDeals || []).filter(function(d){ return d.stage !== NOVO_WON_STAGE; }); }
function _annualRev(d) {
  if (d.arr_estimado != null && d.arr_estimado > 0) return d.arr_estimado;
  if (d.primeira_fatura != null && d.primeira_fatura > 0) return d.primeira_fatura * 12;
  return 0;
}
function _revShort(v) { return v >= 1000000 ? ('R$'+(v/1000000).toFixed(1)+'M') : ('R$'+Math.round(v/1000)+'k'); }

// ── Cards (HTML) ────────────────────────────────────────────────────────────────
function _infoBtn(tip, helpKey) {
  return '<button class="novo-info-btn" data-tooltip="'+tip+'"'+(helpKey?' onclick="novoHelpChart(\''+helpKey+'\')"':'')+' aria-label="Campos do HubSpot">i</button>';
}
function _subTabs(id, current, opts) {
  return '<div id="'+id+'" class="tab-sub">'+opts.map(function(o){
    return '<button class="tab-sub-btn'+(current===o.mode?' active':'')+'" data-mode="'+o.mode+'" onclick="'+o.fn+'(\''+o.mode+'\')">'+o.label+'</button>';
  }).join('')+'</div>';
}
function _card(title, tip, tabsHtml, canvasId, maxH, helpKey) {
  return '<div class="novo-card"><div class="novo-card-header"><h3>'+title+'</h3>'+
    _infoBtn(tip, helpKey)+(tabsHtml||'')+'</div>'+
    '<canvas id="'+canvasId+'" style="max-height:'+(maxH||340)+'px"></canvas></div>';
}

// ── Builders dos novos gráficos ─────────────────────────────────────────────────
function buildNovoStage() {
  var th = _novoTheme(), open = _novoOpen();
  var agg = {}, by = {};
  NOVO_STAGE_ORDER.forEach(function(s){ agg[s]=0; by[s]=[]; });
  open.forEach(function(d){ var s=_stageNorm(d.stage); if(!(s in agg)){agg[s]=0;by[s]=[];} agg[s]+= (_novoStageMode==='lives'?(d.vidas||0):1); by[s].push(d); });
  var labels = NOVO_STAGE_ORDER.filter(function(s){ return agg[s] > 0; });
  var data = labels.map(function(s){ return agg[s]; });
  var unit = _novoStageMode==='lives' ? t('tab_vidas').toLowerCase() : t('tab_deals').toLowerCase();
  _novoMkChart('chart-novo-stage', { type:'bar', plugins:[ChartDataLabels],
    data:{ labels:labels, datasets:[{ data:data, backgroundColor:'rgba(88,166,255,.75)', hoverBackgroundColor:'rgba(88,166,255,1)', borderRadius:4 }] },
    options:{ responsive:true, plugins:{ legend:{display:false},
      datalabels:{ anchor:'end', align:'end', color:th.cText, font:{family:NOVO_FONT,size:11,weight:'bold'}, formatter:function(v){return v.toLocaleString('pt-BR');} },
      tooltip:{ callbacks:{ label:function(c){return c.parsed.y.toLocaleString('pt-BR')+' '+unit;}, footer:function(){return 'Clique para ver os deals';} } } },
      scales:{ x:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}}, y:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},precision:0}} },
      onClick:function(e,el){ if(!el.length)return; var s=labels[el[0].index]; novoOpenDealsModal(t('t_stage')+' | '+s, by[s]); } } });
}

function buildNovoFunnel() {
  var th = _novoTheme(), open = _novoOpen();
  var idx = {}; NOVO_STAGE_ORDER.forEach(function(s,i){ idx[s]=i; });
  var counts = NOVO_STAGE_ORDER.map(function(){ return 0; });
  open.forEach(function(d){ var i=idx[_stageNorm(d.stage)]; if(i==null)return; for(var j=0;j<=i;j++) counts[j]++; });
  _novoMkChart('chart-novo-funnel', { type:'bar', plugins:[ChartDataLabels],
    data:{ labels:NOVO_STAGE_ORDER.slice(), datasets:[{ data:counts, backgroundColor:'rgba(58,184,183,.75)', hoverBackgroundColor:'rgba(58,184,183,1)', borderRadius:4 }] },
    options:{ indexAxis:'y', responsive:true, plugins:{ legend:{display:false},
      datalabels:{ anchor:'end', align:'right', color:th.cText, font:{family:NOVO_FONT,size:11,weight:'bold'}, formatter:function(v){return v.toLocaleString('pt-BR');} },
      tooltip:{ callbacks:{ label:function(c){return c.parsed.x.toLocaleString('pt-BR')+' deals nesta etapa ou adiante';}, footer:function(){return 'Clique para ver os deals';} } } },
      scales:{ x:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},precision:0}}, y:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}} },
      onClick:function(e,el){ if(!el.length)return; var i=el[0].index; var deals=open.filter(function(d){ var j=idx[_stageNorm(d.stage)]; return j!=null && j>=i; }); novoOpenDealsModal(t('t_funnel')+' | ≥ '+NOVO_STAGE_ORDER[i], deals); } } });
}

function buildNovoConc() {
  var th = _novoTheme(), open = _novoOpen();
  var metric = function(d){ return _novoConcMode==='revenue' ? _annualRev(d) : (d.vidas||0); };
  var ranked = open.filter(function(d){ return metric(d) > 0; }).sort(function(a,b){ return metric(b)-metric(a); }).slice(0,10);
  var isRev = _novoConcMode==='revenue';
  _novoMkChart('chart-novo-conc', { type:'bar', plugins:[ChartDataLabels],
    data:{ labels:ranked.map(function(d){ return (d.dealname||'—').slice(0,32); }), datasets:[{ data:ranked.map(metric), backgroundColor:'rgba(210,153,34,.8)', hoverBackgroundColor:'rgba(210,153,34,1)', borderRadius:4 }] },
    options:{ indexAxis:'y', responsive:true, plugins:{ legend:{display:false},
      datalabels:{ anchor:'end', align:'right', color:th.cText, font:{family:NOVO_FONT,size:10,weight:'bold'}, formatter:function(v){ return isRev ? ('R$ '+Math.round(v).toLocaleString('pt-BR')) : v.toLocaleString('pt-BR'); } },
      tooltip:{ callbacks:{ label:function(c){ return isRev ? ('R$ '+Math.round(c.parsed.x).toLocaleString('pt-BR')+' /ano') : (c.parsed.x.toLocaleString('pt-BR')+' vidas'); }, footer:function(){return 'Clique para ver o deal';} } } },
      scales:{ x:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT}}}, y:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT,size:10}}} },
      onClick:function(e,el){ if(!el.length)return; var d=ranked[el[0].index]; novoOpenDealsModal(t('t_conc')+' | '+(d.dealname||''), [d]); } } });
}

function buildNovoSizeDist() {
  var th = _novoTheme(), open = _novoOpen();
  var defs = [['< 50k',0,50000],['50–100k',50000,100000],['100–250k',100000,250000],['250–500k',250000,500000],['500k–1M',500000,1000000],['1M+',1000000,Infinity]];
  var counts = defs.map(function(){return 0;}), by = defs.map(function(){return [];});
  open.forEach(function(d){ var v=_annualRev(d); if(v<=0)return; for(var i=0;i<defs.length;i++){ if(v>=defs[i][1]&&v<defs[i][2]){ counts[i]++; by[i].push(d); break; } } });
  _novoMkChart('chart-novo-sizedist', { type:'bar', plugins:[ChartDataLabels],
    data:{ labels:defs.map(function(d){return d[0];}), datasets:[{ data:counts, backgroundColor:'rgba(88,166,255,.75)', borderRadius:3 }] },
    options:{ responsive:true, plugins:{ legend:{display:false},
      datalabels:{ anchor:'end', align:'end', color:th.cText, font:{family:NOVO_FONT,size:11,weight:'bold'}, formatter:function(v){return v||'';} },
      tooltip:{ callbacks:{ label:function(c){return c.parsed.y+' deals';}, footer:function(){return 'Clique para ver os deals';} } } },
      scales:{ x:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}}, y:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},precision:0}} },
      onClick:function(e,el){ if(!el.length)return; novoOpenDealsModal(t('t_sizedist')+' | '+defs[el[0].index][0], by[el[0].index]); } } });
}

function buildNovoVidasDist() {
  var th = _novoTheme(), open = _novoOpen();
  var defs = [['0 (sem vidas)',function(v){return v<=0;}],['1–50',function(v){return v>=1&&v<=50;}],['51–200',function(v){return v>50&&v<=200;}],['201–500',function(v){return v>200&&v<=500;}],['501–1K',function(v){return v>500&&v<=1000;}],['1K–5K',function(v){return v>1000&&v<=5000;}],['5K+',function(v){return v>5000;}]];
  var counts = defs.map(function(){return 0;}), by = defs.map(function(){return [];});
  open.forEach(function(d){ var v=d.vidas||0; for(var i=0;i<defs.length;i++){ if(defs[i][1](v)){ counts[i]++; by[i].push(d); break; } } });
  _novoMkChart('chart-novo-vidasdist', { type:'bar', plugins:[ChartDataLabels],
    data:{ labels:defs.map(function(d){return d[0];}), datasets:[{ data:counts, backgroundColor:'rgba(63,185,80,.75)', borderRadius:3 }] },
    options:{ responsive:true, plugins:{ legend:{display:false},
      datalabels:{ anchor:'end', align:'end', color:th.cText, font:{family:NOVO_FONT,size:11,weight:'bold'}, formatter:function(v){return v||'';} },
      tooltip:{ callbacks:{ label:function(c){return c.parsed.y+' deals';}, footer:function(){return 'Clique para ver os deals';} } } },
      scales:{ x:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}}, y:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},precision:0}} },
      onClick:function(e,el){ if(!el.length)return; novoOpenDealsModal(t('t_vidasdist')+' | '+defs[el[0].index][0], by[el[0].index]); } } });
}

function buildNovoStageVal() {
  var th = _novoTheme(), open = _novoOpen();
  var agg = {}, by = {};
  NOVO_STAGE_ORDER.forEach(function(s){ agg[s]=0; by[s]=[]; });
  open.forEach(function(d){ var s=_stageNorm(d.stage); if(!(s in agg)){agg[s]=0;by[s]=[];} var v=_annualRev(d);
    if(_novoValMode==='weighted'){ var p=NOVO_STAGE_PROB[d.stage]; if(p==null)p=NOVO_STAGE_PROB[s]; v=v*(p||0); }
    agg[s]+=v; by[s].push(d); });
  var labels = NOVO_STAGE_ORDER.filter(function(s){ return agg[s] > 0; });
  var data = labels.map(function(s){ return Math.round(agg[s]); });
  _novoMkChart('chart-novo-stageval', { type:'bar', plugins:[ChartDataLabels],
    data:{ labels:labels, datasets:[{ data:data, backgroundColor:'rgba(58,184,183,.75)', borderRadius:4 }] },
    options:{ responsive:true, plugins:{ legend:{display:false},
      datalabels:{ anchor:'end', align:'end', color:th.cText, font:{family:NOVO_FONT,size:10,weight:'bold'}, formatter:_revShort },
      tooltip:{ callbacks:{ label:function(c){return 'R$ '+Math.round(c.parsed.y).toLocaleString('pt-BR')+' /ano';}, footer:function(){return 'Clique para ver os deals';} } } },
      scales:{ x:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}}, y:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},callback:function(v){return 'R$'+(v/1000)+'k';}}} },
      onClick:function(e,el){ if(!el.length)return; var s=labels[el[0].index]; novoOpenDealsModal(t('t_stageval')+' | '+s, by[s]); } } });
}

function buildNovoSegment() {
  var th = _novoTheme(), open = _novoOpen();
  var defs = [['Pequeno (<50)',function(v){return v<50;}],['Médio (50–200)',function(v){return v>=50&&v<200;}],['Grande (200–1000)',function(v){return v>=200&&v<1000;}],['Enterprise (1000+)',function(v){return v>=1000;}]];
  var sums = defs.map(function(){return 0;}), by = defs.map(function(){return [];});
  open.forEach(function(d){ var vidas=d.vidas||0, rev=_annualRev(d); for(var i=0;i<defs.length;i++){ if(defs[i][1](vidas)){ sums[i]+=rev; by[i].push(d); break; } } });
  _novoMkChart('chart-novo-segment', { type:'bar', plugins:[ChartDataLabels],
    data:{ labels:defs.map(function(d){return d[0];}), datasets:[{ data:sums.map(function(v){return Math.round(v);}), backgroundColor:'rgba(147,112,219,.75)', borderRadius:4 }] },
    options:{ responsive:true, plugins:{ legend:{display:false},
      datalabels:{ anchor:'end', align:'end', color:th.cText, font:{family:NOVO_FONT,size:10,weight:'bold'}, formatter:_revShort },
      tooltip:{ callbacks:{ label:function(c){return 'R$ '+Math.round(c.parsed.y).toLocaleString('pt-BR')+' /ano';}, footer:function(){return 'Clique para ver os deals';} } } },
      scales:{ x:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}}, y:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},callback:function(v){return 'R$'+(v/1000)+'k';}}} },
      onClick:function(e,el){ if(!el.length)return; novoOpenDealsModal(t('t_segment')+' | '+defs[el[0].index][0], by[el[0].index]); } } });
}

// Switchers dos toggles
function novoSwitchStageMode(m){ _novoStageMode=m; _setActive('novo-stage-tabs',m); buildNovoStage(); }
function novoSwitchConcMode(m){ _novoConcMode=m; _setActive('novo-conc-tabs',m); buildNovoConc(); }
function novoSwitchValMode(m){ _novoValMode=m; _setActive('novo-val-tabs',m); buildNovoStageVal(); }

function novoRender() {
  var deals = _novoDeals || [];
  var content = document.getElementById('novo-content');
  if (!content) return;
  var total  = deals.length;
  var vendas = deals.filter(function(d) { return d.pipeline === 'Vendas'; }).length;
  var bid    = deals.filter(function(d) { return d.pipeline === 'Bid'; }).length;
  var ts = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  content.innerHTML =
    '<div id="novo-status" style="padding:.25rem 0 1.25rem;font-size:.85rem">' +
      '<span style="color:var(--teal);font-weight:600">' + total + ' ' + t('active_deals') + '</span>' +
      '&ensp;<span style="color:var(--text2)">' + t('vendas') + ': ' + vendas + ' &middot; Bid: ' + bid + '</span>' +
      '&ensp;<span style="color:var(--text2);opacity:.6">' + t('updated_at') + ' ' + ts + '</span>' +
    '</div>' +
    '<div class="novo-cards">' +
      _card(t('title_vidas_ae'), t('tooltip_vidas_ae'),
        _subTabs('novo-ae-tabs', _novoAeMode, [{mode:'lives',label:t('tab_vidas'),fn:'novoSwitchAeMode'},{mode:'deals',label:t('tab_deals'),fn:'novoSwitchAeMode'}]),
        'chart-novo-vidas-ae', 360, 'ae') +
      _card(t('t_stage'), t('tip_stage'),
        _subTabs('novo-stage-tabs', _novoStageMode, [{mode:'lives',label:t('tab_vidas'),fn:'novoSwitchStageMode'},{mode:'deals',label:t('tab_deals'),fn:'novoSwitchStageMode'}]),
        'chart-novo-stage', 340, 'stage') +
      _card(t('t_funnel'), t('tip_funnel'), '', 'chart-novo-funnel', 340, 'funnel') +
      _card(t('t_conc'), t('tip_conc'),
        _subTabs('novo-conc-tabs', _novoConcMode, [{mode:'vidas',label:t('tab_vidas'),fn:'novoSwitchConcMode'},{mode:'revenue',label:t('lbl_revenue'),fn:'novoSwitchConcMode'}]),
        'chart-novo-conc', 360, 'conc') +
      _card(t('t_sizedist'), t('tip_sizedist'), '', 'chart-novo-sizedist', 320, 'sizedist') +
      _card(t('t_vidasdist'), t('tip_vidasdist'), '', 'chart-novo-vidasdist', 320, 'vidasdist') +
      _card(t('t_stageval'), t('tip_stageval'),
        _subTabs('novo-val-tabs', _novoValMode, [{mode:'raw',label:t('lbl_raw'),fn:'novoSwitchValMode'},{mode:'weighted',label:t('lbl_weighted'),fn:'novoSwitchValMode'}]),
        'chart-novo-stageval', 340, 'stageval') +
      _card(t('t_segment'), t('tip_segment'), '', 'chart-novo-segment', 320, 'segment') +
    '</div>';

  buildNovoVidasAE();
  buildNovoStage();
  buildNovoFunnel();
  buildNovoConc();
  buildNovoSizeDist();
  buildNovoVidasDist();
  buildNovoStageVal();
  buildNovoSegment();
}

// ── Init ──────────────────────────────────────────────────────────────────────
// Fecha modal/drawers com a tecla Esc (fecha o overlay mais ao topo)
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Escape' && e.keyCode !== 27) return;
  var help  = document.getElementById('novo-help-drawer');
  var prob  = document.getElementById('novo-prob-drawer');
  var modal = document.getElementById('modal-overlay');
  if (help && help.classList.contains('open'))   { novoCloseHelp(); return; }
  if (prob && prob.classList.contains('open'))   { novoCloseProbEditor(); return; }
  if (modal && modal.classList.contains('open')) { closeModal(); return; }
});

document.addEventListener('DOMContentLoaded', function() {
  setContentBlur(false);
  var navOpen = true;
  try { navOpen = localStorage.getItem('novo_nav_open') !== 'false'; } catch(e) {}
  _setNavOpen(navOpen);
  var lbl = document.getElementById('novo-lang-label');
  if (lbl) lbl.textContent = NOVO_LANG.toUpperCase();
  novoLoadData();
});
</script>
