<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axenya — Preenchimento HubSpot</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05070a;
  --surface: #0d1117;
  --surface2: #161b22;
  --surface3: #1c2333;
  --border: #21262d;
  --border-accent: #30363d;
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --accent: #3ab8b7;
  --accent-glow: rgba(58, 184, 183, 0.15);
  --accent2: #3f96b4;
  --green: #3fb950;
  --green-bg: rgba(63, 185, 80, 0.1);
  --yellow: #d29922;
  --yellow-bg: rgba(210, 153, 34, 0.1);
  --red: #f85149;
  --red-bg: rgba(248, 81, 73, 0.1);
  --orange: #db6d28;
  --orange-bg: rgba(219, 109, 40, 0.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;height:400px;
  background:radial-gradient(ellipse 80% 50% at 50% -20%, var(--accent-glow), transparent);
  pointer-events:none;z-index:0;
}

.container{max-width:1280px;margin:0 auto;padding:32px 24px;position:relative;z-index:1}

/* Header */
.header{margin-bottom:32px;animation:fadeUp .6s ease both}
.header-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#fff;letter-spacing:-1px}
h1{font-family:'Outfit',sans-serif;font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.3px;line-height:1.2}
h1 span{color:var(--accent);font-weight:700}
.subtitle{color:var(--text-secondary);font-size:13px;margin-top:4px;font-weight:300}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;background:var(--accent-glow);color:var(--accent);border:1px solid rgba(58,184,183,.25);font-weight:600;letter-spacing:.5px;white-space:nowrap}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:28px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;animation:fadeUp .6s .1s ease both}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;border-radius:9px;border:none;background:transparent;color:var(--text-secondary);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .25s;white-space:nowrap;position:relative}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(58,184,183,.3)}
.tab.consolidado-tab{font-weight:600}
.tab.consolidado-tab::before{content:'';position:absolute;left:8px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent)}
.tab.consolidado-tab{padding-left:20px}
.tab.active.consolidado-tab::before{background:#fff}

/* Summary Cards */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:28px;animation:fadeUp .6s .15s ease both}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;transition:all .3s cubic-bezier(.4,0,.2,1);cursor:default;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .3s}
.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 32px rgba(58,184,183,.08)}
.card:hover::before{opacity:1}
.card .name{font-size:11px;color:var(--text-secondary);margin-bottom:2px;text-transform:uppercase;letter-spacing:.8px;font-weight:500}
.card .deals{font-size:10px;color:var(--text-muted);margin-bottom:8px;font-weight:400}
.card .pct{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;line-height:1}
.delta{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:6px;font-weight:600;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px}
.delta.up{color:var(--green);background:var(--green-bg)}
.delta.down{color:var(--red);background:var(--red-bg)}
.delta.same{color:var(--text-muted);background:var(--surface2)}
.bar-track{width:100%;height:3px;background:var(--surface2);border-radius:2px;margin-top:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* Detail Table */
.detail-section{animation:fadeUp .6s .2s ease both}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.detail-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.detail-hint{font-size:11px;color:var(--text-muted);font-weight:300}

.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);background:var(--surface)}
.table-wrap::-webkit-scrollbar{height:6px}
.table-wrap::-webkit-scrollbar-track{background:var(--surface)}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--surface2);color:var(--text-secondary);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2}
thead th:first-child{min-width:190px;padding-left:16px}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s}
tbody tr:hover{background:var(--surface2)}
.prop-name{color:var(--text);font-weight:500;font-size:12px;padding-left:4px}
.cell{display:flex;align-items:center;gap:8px}
.mini-track{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;min-width:30px}
.mini-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.cell-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;min-width:40px;text-align:right}
.cell-empty{color:var(--text-muted);font-size:10px;text-align:center;width:100%;font-weight:400}

/* Legend */
.legend{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;animation:fadeUp .6s .12s ease both}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-secondary);font-weight:400}
.legend-dot{width:8px;height:8px;border-radius:3px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-row">
      <div class="brand">
        <div class="brand-mark">Ax</div>
        <div>
          <h1>Preenchimento <span>HubSpot</span></h1>
          <div class="subtitle">Pipeline de Vendas 2025 · Dados atualizados via API em 15/04/2026</div>
        </div>
      </div>
      <div class="badge">VS PLANILHA ANTERIOR</div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> 0–10%</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> 11–25%</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> 26–50%</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> 51–100%</div>

  <div class="summary-grid" id="grid"></div>

  <div class="detail-section">

    </div>
    <div class="table-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

const pctColor = v => v <= 10 ? 'var(--red)' : v <= 25 ? 'var(--orange)' : v <= 50 ? 'var(--yellow)' : 'var(--green)';
const pctBg = v => v <= 10 ? 'var(--red-bg)' : v <= 25 ? 'var(--orange-bg)' : v <= 50 ? 'var(--yellow-bg)' : 'var(--green-bg)';

function delta(now, before) {
  if (before === null || before === undefined) return `<span class="delta same">novo</span>`;
  const d = Math.round((now - before) * 10) / 10;
  if (d > 0) return `<span class="delta up">▲ +${d.toFixed(1)}pp</span>`;
  if (d < 0) return `<span class="delta down">▼ ${d.toFixed(1)}pp</span>`;
  return `<span class="delta same">—</span>`;
}

const stages = Object.keys(DATA);
let active = 'Consolidado';

function renderTabs() {
  document.getElementById('tabs').innerHTML = stages.map(s => {
    const cls = ['tab'];
    if (s === active) cls.push('active');
    if (s === 'Consolidado') cls.push('consolidado-tab');
    return `<button class="${cls.join(' ')}" onclick="go('${s}')">${s}</button>`;
  }).join('');
}

function go(s) { active = s; renderTabs(); render(); }

function render() {
  const {properties: props, executives: execs} = DATA[active];
  const names = Object.keys(execs);
  const isC = active === 'Consolidado';

  document.getElementById('detailTitle').textContent = isC ? 'Detalhamento por etapa' : 'Detalhamento por propriedade';
  document.getElementById('detailHint').textContent = isC ? `${names.length} executivos · 6 etapas` : `${props.length} propriedades`;

  // Cards
  document.getElementById('grid').innerHTML = names.map((n, i) => {
    const e = execs[n];
    const c = pctColor(e.pct);
    return `<div class="card" style="animation-delay:${i * 40}ms">
      <div class="name">${n}</div>
      <div class="deals">${e.deals} negócio${e.deals !== 1 ? 's' : ''}</div>
      <div class="pct" style="color:${c}">${e.pct}%</div>
      ${delta(e.pct, e.before)}
      <div class="bar-track"><div class="bar-fill" style="width:${e.pct}%;background:${c}"></div></div>
    </div>`;
  }).join('');

  // Table head
  document.getElementById('thead').innerHTML = `<tr>
    <th>${isC ? 'Etapa' : 'Propriedade'}</th>
    ${names.map(n => `<th style="text-align:center;min-width:95px">${n.split(' ')[0]}</th>`).join('')}
  </tr>`;

  // Table body
  document.getElementById('tbody').innerHTML = props.map(prop => {
    const cells = names.map(n => {
      const pp = execs[n].per_property;
      const d = pp[prop];
      if (!d) return `<td><span class="cell-empty">—</span></td>`;
      if (d.deals !== undefined && d.deals === 0) return `<td><span class="cell-empty">—</span></td>`;
      const v = d.pct;
      const c = pctColor(v);
      return `<td><div class="cell">
        <div class="mini-track"><div class="mini-fill" style="width:${v}%;background:${c}"></div></div>
        <span class="cell-val" style="color:${c}">${v}%</span>
      </div></td>`;
    }).join('');
    return `<tr><td class="prop-name">${prop}</td>${cells}</tr>`;
  }).join('');
}

renderTabs();
render();
</script>
