<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Dashboard | Axenya</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#171f2e;--card2:#1e2a3c;--border:#293a50;--text:#e6edf3;--text2:#8b949e;--muted:#6e7681;--teal:#3ab8b7;--green:#3fb950;--red:#f85149;--orange:#d29922;--yellow:#e3b341;--hover:rgba(255,255,255,0.06);--even-s:#131b28;--hover-s:#1c2b40;--hdr-glass:rgba(13,17,23,.78)}
html[data-theme="light"]{--bg:#f6f8fa;--card:#ffffff;--card2:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#57606a;--teal:#0d7377;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--hover:rgba(0,0,0,0.05);--even-s:#f1f4f8;--hover-s:#e8eef4;--hdr-glass:rgba(246,248,250,.82)}
body{background:var(--bg);color:var(--text);font-family:Inter,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5}
button,input,select,textarea{font-family:inherit}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.15rem}
.hdr-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);border-radius:99px;cursor:pointer;transition:background .15s,color .15s;position:relative;flex-shrink:0}
.hdr-btn:hover{background:rgba(255,255,255,0.13);color:var(--text)}
html[data-theme="light"] .hdr-btn:hover{background:rgba(0,0,0,0.07)}
.hdr-btn.highlighted{background:var(--teal)!important;color:#fff!important;box-shadow:0 0 0 2px rgba(58,184,183,.3)}
.hdr-btn[data-tooltip]::after{content:attr(data-tooltip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);font-size:.73rem;padding:.26rem .62rem;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300}
.hdr-btn[data-tooltip]:hover::after{opacity:1}
.hdr-sep{width:1px;height:16px;background:rgba(255,255,255,0.12);margin:0 2px;flex-shrink:0}
html[data-theme="light"] .hdr-sep{background:rgba(0,0,0,0.12)}
.hdr-actions{display:flex;align-items:center;background:rgba(255,255,255,0.09);border-radius:99px;padding:7px;gap:12px}
html[data-theme="light"] .hdr-actions{background:rgba(0,0,0,0.03)}
@keyframes hdr-spin{to{transform:rotate(360deg)}}
.hdr-btn.spinning svg{animation:hdr-spin .7s linear infinite}
.nav-drawer{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--card);border-right:1px solid rgba(255,255,255,.08);z-index:1000;transition:left .25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.nav-drawer.open{left:0}
.nav-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s ease}
.nav-backdrop.open{opacity:1;pointer-events:auto}
.nav-drawer-header{display:flex;align-items:center;gap:.75rem;padding:1.1rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-drawer-brand{font-weight:600;font-size:1rem;color:var(--text);flex:1}
.nav-drawer-footer{margin-top:auto;display:flex;align-items:center;gap:.5rem;padding:.7rem .75rem;border-top:1px solid rgba(255,255,255,.08)}
html[data-theme="light"] .nav-drawer-footer{border-top-color:rgba(0,0,0,.1)}
.nav-foot-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;min-height:38px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;padding:.4rem;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;transition:border-color .15s,color .15s,background .15s}
.nav-foot-btn:hover{border-color:var(--teal);color:var(--text)}
.nav-menu{list-style:none;padding:.5rem 0;margin:0}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.25rem;cursor:pointer;font-size:.9rem;color:var(--text2);transition:background .15s,color .15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.nav-item.active{color:var(--teal);font-weight:500}
.nav-item.active svg{stroke:var(--teal)}
.novo-hdr{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.25rem 2rem;background:transparent;position:sticky;top:0;z-index:100;transition:background .25s,backdrop-filter .25s,box-shadow .25s}
.novo-hdr.scrolled{background:var(--hdr-glass);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);box-shadow:0 1px 0 var(--border)}
.novo-theme-sun{display:block}.novo-theme-moon{display:none}
[data-theme="light"] .novo-theme-sun{display:none}[data-theme="light"] .novo-theme-moon{display:block}
.novo-lang-btn{width:auto !important;padding:0 9px;font-size:.71rem;font-weight:700;letter-spacing:.06em}
.novo-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:1rem;padding-bottom:2rem}
.novo-card{background:var(--card);border-radius:10px;padding:1.25rem 1.5rem}
.novo-card-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.novo-card-header h3{font-size:.88rem;font-weight:600;color:var(--text);margin:0;flex:1}
.novo-code-tag{display:none;align-items:center;font-size:.6rem;font-weight:700;letter-spacing:.04em;font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--teal);background:rgba(58,184,183,.14);border:1px solid rgba(58,184,183,.32);border-radius:5px;padding:.05rem .32rem;line-height:1.35;flex-shrink:0}
.novo-info-btn{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--text2);background:none;color:var(--text2);font-size:.62rem;font-style:normal;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;padding:0;line-height:1}
body:not(.novo-info-on) .novo-card .novo-info-btn{display:none}
body.novo-info-on .novo-code-tag{display:inline-flex}
#novo-tip{position:fixed;z-index:9999;background:rgba(23,31,46,.78);backdrop-filter:blur(14px) saturate(1.5);border-radius:6px;padding:.45rem .7rem;width:278px;pointer-events:none;display:none;box-shadow:0 6px 20px rgba(0,0,0,.3)}
html[data-theme="light"] #novo-tip{background:rgba(246,248,250,.82)}
#novo-tip.nt-show{display:block}
#novo-tip .nt-text{font-size:.73rem;color:var(--text);font-weight:400;line-height:1.5}
#novo-tip .nt-code{font-size:.62rem;font-weight:700;color:var(--teal);font-family:ui-monospace,Menlo,Consolas,monospace;margin-top:.3rem;padding-top:.28rem;border-top:1px solid rgba(255,255,255,.12);letter-spacing:.07em}
html[data-theme="light"] #novo-tip .nt-code{border-top-color:rgba(0,0,0,.1)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:.75rem}
.kpi-card{background:var(--card);border-radius:14px;padding:1.6rem 1.8rem;transition:box-shadow .18s}
.kpi-click{cursor:pointer}
.kpi-label{font-size:.66rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;line-height:1}
.kpi-value{font-size:2rem;font-weight:800;line-height:1.1;margin:.35rem 0 .25rem}
.kpi-sub{font-size:.7rem;color:var(--muted);line-height:1.35}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s linear;backdrop-filter:blur(5px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:90vw;max-width:960px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .28s cubic-bezier(0.4,0,0.2,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1rem;font-weight:600;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px}
.modal-close:hover{color:var(--red)}
.modal-body{padding:1.2rem 1.5rem;overflow-y:auto;flex:1}
.btn-export{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:.3rem .7rem;font-size:.7rem;cursor:pointer;margin-left:auto}
table.lb{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
table.lb th{text-align:right;color:var(--teal);font-size:.72rem;font-weight:700;text-transform:uppercase;padding:.6rem 1rem;border-bottom:2px solid var(--teal);white-space:nowrap;position:sticky;top:0;background:var(--card)}
table.lb th:first-child{text-align:left}
table.lb td{padding:.38rem 1rem;border-bottom:1px solid var(--border);color:var(--text);text-align:right}
table.lb td:first-child{text-align:left;font-weight:600}
table.lb tbody tr:nth-child(even) td{background:var(--even-s)}
table.lb tbody tr:hover td{background:var(--hover-s)}
#view-novo{transition:filter .25s ease,margin-left .25s cubic-bezier(0.4,0,0.2,1)}
body.nav-docked #view-novo{margin-left:280px}
@media(max-width:820px){body.nav-docked #view-novo{margin-left:0}}
.content-blur{filter:blur(4px);pointer-events:none;user-select:none}
.section-hdr{grid-column:1/-1;margin:1.5rem 0 .25rem;border-top:1px solid var(--border);padding-top:1.25rem}
.section-hdr h2{font-size:.78rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin:0}
.banner-api{grid-column:1/-1;background:rgba(248,81,73,.1);border:1.5px dashed rgba(248,81,73,.4);border-radius:10px;padding:1.2rem 1.5rem;margin-bottom:.25rem}
.banner-api h4{color:var(--red);font-size:.84rem;margin-bottom:.4rem}
.banner-api p{font-size:.78rem;color:var(--text2);line-height:1.6;margin:.2rem 0}
.banner-api code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.75rem;background:rgba(248,81,73,.15);padding:.1rem .35rem;border-radius:3px;color:var(--red)}
.placeholder-card{background:var(--card);border:1.5px dashed var(--border);border-radius:10px;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;text-align:center}
.placeholder-card .ph-icon{font-size:2.5rem;opacity:.4}
.placeholder-card .ph-title{font-size:.88rem;font-weight:600;color:var(--text2)}
.placeholder-card .ph-body{font-size:.75rem;color:var(--muted);max-width:320px;line-height:1.6}
.placeholder-card .ph-field{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.7rem;color:var(--teal);background:rgba(58,184,183,.08);padding:.15rem .4rem;border-radius:3px;margin:.1rem}
</style>

    <li class="nav-item" onclick="location.href='/novo-bdr'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>BDR Performance</li>

<div id="view-novo">
  <div class="novo-hdr" id="novo-hdr">
    <div style="display:flex;align-items:center;gap:.75rem">
      <button class="hdr-btn" onclick="toggleDrawer()" data-tooltip="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="panel-switcher" id="panel-switcher"><button class="panel-switch-btn" type="button" onclick="togglePanelMenu(event)" aria-haspopup="true" aria-expanded="false"><h1>CS Dashboard</h1><svg class="panel-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button><div class="panel-dd" id="panel-dd" role="menu"></div></div>
    </div>
    <div class="hdr-actions">
      <button class="hdr-btn" id="btn-info-toggle" onclick="novoToggleInfo()" data-tooltip="Mostrar/ocultar IDs e auditoria" style="font-size:.9rem;font-weight:800">?</button>
      <button class="hdr-btn highlighted" id="btn-refresh" onclick="_novoDeals=null;novoLoadData();" data-tooltip="Atualizar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    </div>

  </div>

<div id="novo-tip"><div class="nt-text"></div><div class="nt-code"></div></div>
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div class="modal-header"><h2 id="modal-title"></h2><button class="btn-export" onclick="exportModalCSV()">&#11015; CSV</button><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body" id="modal-body"></div></div>

<script>
(function(){ var s=localStorage.getItem('axenya_theme')||'dark'; if(s==='light') document.documentElement.setAttribute('data-theme','light'); })();
function toggleTheme(){ var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('axenya_theme',n); if(_novoDeals) novoRender(); }
function doLogout(){ window.location.href='/login.html'; }
function setContentBlur(on){ document.getElementById('view-novo').classList.toggle('content-blur',on); }
function _setNavOpen(open){ document.getElementById('nav-drawer').classList.toggle('open',open); document.body.classList.toggle('nav-docked',open); var narrow=window.matchMedia('(max-width:820px)').matches; document.getElementById('nav-backdrop').classList.toggle('open',open&&narrow); try{localStorage.setItem('novo_nav_open',open?'true':'false');}catch(e){} }
function closeDrawer(){ _setNavOpen(false); }
function toggleDrawer(){ _setNavOpen(!document.getElementById('nav-drawer').classList.contains('open')); }
function openModal(title,bodyHtml){ setContentBlur(true); document.getElementById('modal-title').textContent=title; document.getElementById('modal-body').innerHTML=bodyHtml; document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); setContentBlur(false); }
function exportModalCSV(){ var title=document.getElementById('modal-title').textContent; var table=document.getElementById('modal-body').querySelector('table'); if(!table)return; var rows=[]; table.querySelectorAll('tr').forEach(function(tr){ var cells=[]; tr.querySelectorAll('th,td').forEach(function(c){ cells.push('"'+(c.textContent.trim().replace(/"/g,'""'))+'"'); }); rows.push(cells.join(',')); }); var a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(rows.join('\n')); a.download=(title||'export').slice(0,40).replace(/[^a-z0-9]/gi,'-')+'-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); }

var NOVO_LANG=(function(){ try{return localStorage.getItem('novo_lang')||'pt';}catch(e){return 'pt';} })();
function novoToggleLang(){ NOVO_LANG=NOVO_LANG==='pt'?'en':'pt'; try{localStorage.setItem('novo_lang',NOVO_LANG);}catch(e){} (function(_e){if(_e)_e.textContent=NOVO_LANG.toUpperCase();})(document.getElementById('novo-lang-label')); if(_novoDeals) novoRender(); }

var CS_CARD_CODES={'kpi-customers':'CS01','kpi-arr':'CS02','kpi-lives':'CS03','kpi-product':'CS04','cs-produto':'CS05','cs-modelo':'CS06','cs-vidas-prod':'CS07','cs-concentration':'CS08'};
var _novoShowInfo=(function(){try{return localStorage.getItem('cs_show_info')==='1';}catch(e){return false;}})();
function _codeTag(key){var c=CS_CARD_CODES[key]||'';return c?'<span class="novo-code-tag">'+c+'</span>':'';}
function novoToggleInfo(){_novoShowInfo=!_novoShowInfo;document.body.classList.toggle('novo-info-on',_novoShowInfo);var b=document.getElementById('btn-info-toggle');if(b)b.classList.toggle('highlighted',_novoShowInfo);try{localStorage.setItem('cs_show_info',_novoShowInfo?'1':'0');}catch(e){}}

document.addEventListener('mouseover',function(e){ var btn=e.target.closest('.novo-info-btn'); if(!btn)return; var tip=document.getElementById('novo-tip'); tip.querySelector('.nt-text').textContent=btn.getAttribute('data-tip')||''; tip.querySelector('.nt-code').textContent=btn.getAttribute('data-code')||''; tip.classList.add('nt-show'); });
document.addEventListener('mouseout',function(e){ if(!e.target.closest('.novo-info-btn')) document.getElementById('novo-tip').classList.remove('nt-show'); });
document.addEventListener('mousemove',function(e){ var tip=document.getElementById('novo-tip'); if(!tip.classList.contains('nt-show'))return; var r=tip.getBoundingClientRect(); var x=e.clientX+14; var y=e.clientY+14; if(x+r.width>window.innerWidth-8) x=e.clientX-r.width-10; if(y+r.height>window.innerHeight-8) y=e.clientY-r.height-10; tip.style.left=x+'px'; tip.style.top=y+'px'; });
function _infoBtn(tip,code){ return _codeTag(code)+'<button class="novo-info-btn" data-tip="'+_ne(tip)+'" data-code="'+(CS_CARD_CODES[code]||code||'')+'" aria-label="info">i</button>'; }
window.addEventListener('scroll',function(){ document.getElementById('novo-hdr').classList.toggle('scrolled',window.scrollY>10); },{passive:true});

var _ne=function(s){ return (s==null?'—':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
var _ni=function(v){ return v!=null?Number(v).toLocaleString('pt-BR'):'—'; };
function _revShort(v){ if(!v||v<=0)return 'R$0'; return v>=1000000?('R$'+(v/1000000).toFixed(1)+'M'):('R$'+Math.round(v/1000)+'k'); }
function _fmtBig(v){ if(v==null||isNaN(v))return '—'; if(Math.abs(v)>=1e6)return 'R$ '+(v/1e6).toFixed(2).replace('.',',')+'M'; if(Math.abs(v)>=1e3)return 'R$ '+(v/1e3).toFixed(1).replace('.',',')+'k'; return 'R$ '+Math.round(v).toLocaleString('pt-BR'); }
function _mlbl(ym){ var p=ym.split('-'); return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(p[1])-1]+'/'+p[0].slice(2); }
function _annualRev(d){ if(d.arr_estimado!=null&&d.arr_estimado>0)return d.arr_estimado; if(d.primeira_fatura!=null&&d.primeira_fatura>0)return d.primeira_fatura*12; return 0; }

var NOVO_WON_STAGE='Ganho';
var NOVO_FONT='Inter,\'Segoe UI\',system-ui,sans-serif';
function _novoTheme(){ var isLight=document.documentElement.getAttribute('data-theme')==='light'; return { cText:isLight?'#1f2328':'#e6edf3', cText2:isLight?'#57606a':'#8b949e', cGrid:isLight?'rgba(0,0,0,.08)':'rgba(255,255,255,.06)', isLight:isLight }; }
var _novoCharts={};
function _novoMkChart(id,cfg){ var ctx=document.getElementById(id); if(!ctx)return; if(_novoCharts[id]) _novoCharts[id].destroy(); _novoCharts[id]=new Chart(ctx,cfg); }
function _novoDealsRows(deals){ return deals.map(function(d){ var hsUrl=d.hs_id?'https://app.hubspot.com/contacts/44715285/deal/'+d.hs_id:'#'; var nameCell=d.hs_id?'<a href="'+hsUrl+'" target="_blank" rel="noopener" style="color:var(--teal);text-decoration:none">'+_ne(d.dealname)+'</a>':_ne(d.dealname); return '<tr><td style="text-align:left;min-width:140px;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+nameCell+'</td><td style="text-align:left;white-space:nowrap">'+_ne(d.ae)+'</td><td style="white-space:nowrap">'+_ne(d.stage)+'</td><td>'+_ni(d.vidas)+'</td><td>'+_revShort(_annualRev(d))+'</td></tr>'; }).join(''); }
function novoOpenDealsModal(title,deals){ if(!deals||!deals.length){ openModal(title,'<p style="color:var(--text2);padding:1rem 0">Nenhum deal.</p>'); return; } var html='<table class="lb"><thead><tr><th style="text-align:left">Deal</th><th style="text-align:left">AE</th><th>Etapa</th><th>Vidas</th><th>ARR</th></tr></thead><tbody>'+_novoDealsRows(deals)+'</tbody></table>'; openModal(title+' ('+deals.length+')',html); }

function _placeholder(icon,title,body,fields){
  var fHtml=fields?fields.map(function(f){return '<span class="ph-field">'+f+'</span>';}).join(' '):'';
  return '<div class="placeholder-card"><div class="ph-icon">'+icon+'</div><div class="ph-title">'+title+'</div><div class="ph-body">'+body+'</div>'+(fHtml?'<div style="margin-top:.5rem">'+fHtml+'</div>':'')+'</div>';
}

var _novoDeals=null;
function novoLoadData(){
  var btn=document.getElementById('btn-refresh'); if(btn) btn.classList.add('spinning');
  document.getElementById('novo-content').innerHTML='<div style="text-align:center;padding:3rem 0;color:var(--text2)">Buscando dados…</div>';
  fetch('/api/forecast-table').then(function(r){ if(!r.ok) return r.text().then(function(txt){ throw new Error(txt||('HTTP '+r.status)); }); return r.json(); }).then(function(data){
    _novoDeals=Array.isArray(data)?data:(data.deals||[]);window._novoDealsRaw=_novoDeals;
    if(btn) btn.classList.remove('spinning');
    novoRender();
  }).catch(function(err){
    if(btn) btn.classList.remove('spinning');
    document.getElementById('novo-content').innerHTML='<div style="text-align:center;padding:3rem 0;color:var(--red)">Erro: '+_ne(String(err))+'<br><br><button onclick="novoLoadData()" style="background:var(--teal);color:#fff;border:none;border-radius:8px;padding:.5rem 1.2rem;cursor:pointer">Tentar novamente</button></div>';
  });
}

function novoRender(){
  var deals=window._novoDealsRaw||_novoDeals||[];
  var won=deals.filter(function(d){return d.stage===NOVO_WON_STAGE;});
  var ts=new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
  var totalArr=won.reduce(function(s,d){return s+_annualRev(d);},0);
  var totalVidas=won.reduce(function(s,d){return s+(d.vidas||0);},0);
  var produtos={}; won.forEach(function(d){ if(d.produto) produtos[d.produto]=(produtos[d.produto]||0)+1; });
  var topProd=Object.keys(produtos).sort(function(a,b){return produtos[b]-produtos[a];})[0]||'—';

  var kpi=function(lbl,val,sub,col,key,kind){ return '<div class="kpi-card'+(kind?' kpi-click':'')+'" '+(kind?'onclick="csKpiOpen(\''+kind+'\')"':'')+'><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.35rem"><div class="kpi-label">'+lbl+'</div>'+_codeTag(key)+'</div><div class="kpi-value" style="color:'+(col||'var(--text)')+'">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>'; };

  document.getElementById('novo-content').innerHTML=
    '<div style="font-size:.78rem;color:var(--text2);margin-bottom:1rem">Atualizado às '+ts+' | proxy não filtrado por período | '+won.length+' deals ganhos</div>'+ 
    '<div class="kpi-row">'+
      kpi('Clientes Ativos (proxy)',_ni(won.length),'deals em stage Ganho','var(--teal)','kpi-customers','won')+
      kpi('ARR da Base (proxy)',_fmtBig(totalArr),'soma do ARR dos ganhos','var(--green)','kpi-arr','won')+
      kpi('Vidas na Base (proxy)',_ni(totalVidas),'vidas em deals ganhos','var(--text)','kpi-lives','won')+
      kpi('Produto Líder (proxy)',_ne(topProd),'produto mais recorrente','var(--text)','kpi-product','topProd')+
    '</div>'+
    '<div class="novo-cards">'+

    '<div class="banner-api">'+
      '<h4>API de CS não disponível nesta versão</h4>'+ 
      '<p>O CS Dashboard original utiliza <code>window.electronAPI.pullCSData()</code>, que é exclusivo do app Electron e não está disponível no contexto web.</p>'+
      '<p>Para habilitar os gráficos de CS (churn, NPS, saúde de conta, renovações, tickets), é necessário criar o endpoint <code>GET /api/cs-accounts</code> que retorne dados dos objetos de contato/empresa do HubSpot.</p>'+
      '<p style="margin-top:.5rem"><strong>Campos necessários (HubSpot Contacts/Companies):</strong></p>'+
      '<p>contact.id · company.name · hs_lead_status · lifecyclestage · last_nps_survey_date · nps_score · churn_reason · renewal_date · contract_start_date · mrr · num_vidas · cs_owner · health_score</p>'+
    '</div>'+

    '<div class="section-hdr"><h2>Disponível via /api/forecast-table (proxy: clientes = deals Ganho | sem filtro de período)</h2></div>'+ 

    '<div class="novo-card"><div class="novo-card-header"><h3>ARR por Produto (proxy)</h3>'+_infoBtn('ARR acumulado por produto dos deals em stage Ganho. Sem filtro de período.','cs-produto')+'</div><canvas id="chart-cs-produto" style="max-height:320px"></canvas></div>'+ 
    '<div class="novo-card"><div class="novo-card-header"><h3>Clientes por Modelo de Remuneração (proxy)</h3>'+_infoBtn('Deals Ganho segmentados por modelo de remuneração. Sem filtro de período.','cs-modelo')+'</div><canvas id="chart-cs-modelo" style="max-height:320px"></canvas></div>'+ 
    '<div class="novo-card"><div class="novo-card-header"><h3>Vidas por Produto (proxy)</h3>'+_infoBtn('Vidas dos deals Ganho segmentadas por produto. Sem filtro de período.','cs-vidas-prod')+'</div><canvas id="chart-cs-vidas-prod" style="max-height:320px"></canvas></div>'+ 
    '<div class="novo-card"><div class="novo-card-header"><h3>Concentração de ARR por Cliente (proxy)</h3>'+_infoBtn('% do ARR total representado por Top 1/3/5/10 deals ganhos por ARR.','cs-concentration')+'</div><canvas id="chart-cs-concentration" style="max-height:320px"></canvas></div>'+ 

    '<div class="section-hdr"><h2>Requer API de CS (/api/cs-accounts)</h2></div>'+ 
    _placeholder('','Churn Rate Mensal','Taxa de cancelamento mensal. Requer endpoint /api/cs-accounts com campo churn_date.',['churn_date','renewal_date','hs_lead_status'])+
    _placeholder('','NPS por Período','Score NPS médio por mês. Requer dados de pesquisa NPS do HubSpot.',['nps_score','last_nps_survey_date','cs_owner'])+
    _placeholder('','Health Score da Base','Distribuição de health score por cliente. Requer campo health_score.',['health_score','company.name','cs_owner'])+
    _placeholder('','Renovações no Mês','Contratos com renewal_date no mês atual. Requer renewal_date.',['renewal_date','contract_start_date','mrr'])+
    _placeholder('','Clientes em Risco','Clientes com health_score < 40 ou NPS < 6. Requer campos de saúde.',['health_score','nps_score','hs_lead_status'])+
    _placeholder('','CS Owner Leaderboard','Carteira de clientes e ARR por CS Owner.',['cs_owner','health_score','mrr'])+
    '</div>';

  buildCSProduto();
  buildCSModelo();
  buildCSVidasProd();
  buildCSConcentration();
}

function csKpiOpen(kind){
  var won=(_novoDeals||[]).filter(function(d){return d.stage===NOVO_WON_STAGE;});
  if(kind==='topProd'){
    var produtos={}; won.forEach(function(d){ if(d.produto) produtos[d.produto]=(produtos[d.produto]||0)+1; });
    var top=Object.keys(produtos).sort(function(a,b){return produtos[b]-produtos[a];})[0];
    return novoOpenDealsModal('Produto Líder | '+(top||'—'), top?won.filter(function(d){return d.produto===top;}):[]);
  }
  novoOpenDealsModal('Clientes Ativos (proxy)',won);
}

function buildCSProduto(){
  var th=_novoTheme();
  var won=(_novoDeals||[]).filter(function(d){return d.stage===NOVO_WON_STAGE;});
  var map={}; won.forEach(function(d){ var k=d.produto||'(sem produto)'; map[k]=(map[k]||0)+_annualRev(d); });
  var labels=Object.keys(map).sort(function(a,b){return map[b]-map[a];}).slice(0,8);
  var vals=labels.map(function(l){return Math.round(map[l]);});
  _novoMkChart('chart-cs-produto',{type:'bar',plugins:[ChartDataLabels],
    data:{labels:labels,datasets:[{data:vals,backgroundColor:'rgba(58,184,183,.75)',borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,layout:{padding:{right:70}},plugins:{legend:{display:false},
      datalabels:{anchor:'end',align:'right',color:th.cText,font:{family:NOVO_FONT,size:10,weight:'bold'},formatter:_revShort},
      tooltip:{callbacks:{label:function(c){return _fmtBig(c.parsed.x)+' ARR';}}}},
      scales:{x:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},callback:_revShort}},y:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}}},
      onClick:function(e,el){ if(!el.length)return; var prod=labels[el[0].index]; novoOpenDealsModal('CS | '+prod, won.filter(function(d){return (d.produto||'(sem produto)')===prod;})); }}});
}

function buildCSModelo(){
  var th=_novoTheme();
  var won=(_novoDeals||[]).filter(function(d){return d.stage===NOVO_WON_STAGE;});
  var map={}; won.forEach(function(d){ var k=d.modelo_remuneracao||'(não informado)'; map[k]=(map[k]||0)+1; });
  var labels=Object.keys(map), vals=labels.map(function(l){return map[l];});
  var colors=['rgba(88,166,255,.75)','rgba(63,185,80,.75)','rgba(210,153,34,.8)','rgba(147,112,219,.75)','rgba(248,81,73,.65)'];
  _novoMkChart('chart-cs-modelo',{type:'doughnut',plugins:[ChartDataLabels],
    data:{labels:labels,datasets:[{data:vals,backgroundColor:colors.slice(0,labels.length),borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,plugins:{legend:{display:true,position:'bottom',labels:{color:th.cText2,font:{family:NOVO_FONT,size:10},padding:10}},
      datalabels:{color:'#fff',font:{family:NOVO_FONT,weight:'bold',size:11},formatter:function(v,ctx){var total=ctx.dataset.data.reduce(function(a,b){return a+b;},0); return total?Math.round(v/total*100)+'%':'';}},
      tooltip:{callbacks:{label:function(c){return c.label+': '+c.parsed+' clientes';}}}}}});
}

function buildCSVidasProd(){
  var th=_novoTheme();
  var won=(_novoDeals||[]).filter(function(d){return d.stage===NOVO_WON_STAGE;});
  var map={}; won.forEach(function(d){ var k=d.produto||'(sem produto)'; map[k]=(map[k]||0)+(d.vidas||0); });
  var labels=Object.keys(map).sort(function(a,b){return map[b]-map[a];}).slice(0,8);
  var vals=labels.map(function(l){return map[l];});
  _novoMkChart('chart-cs-vidas-prod',{type:'bar',plugins:[ChartDataLabels],
    data:{labels:labels,datasets:[{data:vals,backgroundColor:'rgba(63,185,80,.75)',borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,layout:{padding:{right:65}},plugins:{legend:{display:false},
      datalabels:{anchor:'end',align:'right',color:th.cText,font:{family:NOVO_FONT,size:10,weight:'bold'},formatter:function(v){return _ni(v);}},
      tooltip:{callbacks:{label:function(c){return _ni(c.parsed.x)+' vidas';}}}},
      scales:{x:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT}}},y:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}}},
      onClick:function(e,el){ if(!el.length)return; var prod=labels[el[0].index]; novoOpenDealsModal('Vidas | '+prod, won.filter(function(d){return (d.produto||'(sem produto)')===prod;})); }}});
}

function buildCSConcentration(){
  var th=_novoTheme();
  var won=(_novoDeals||[]).filter(function(d){return d.stage===NOVO_WON_STAGE;}).slice().sort(function(a,b){return _annualRev(b)-_annualRev(a);});
  var total=won.reduce(function(s,d){return s+_annualRev(d);},0)||1;
  var tops=[1,3,5,10];
  var pcts=tops.map(function(n){return Math.round(won.slice(0,n).reduce(function(s,d){return s+_annualRev(d);},0)/total*100);});
  _novoMkChart('chart-cs-concentration',{type:'bar',plugins:[ChartDataLabels],
    data:{labels:tops.map(function(n){return 'Top '+n;}),datasets:[{data:pcts,backgroundColor:pcts.map(function(v){return v>=80?'rgba(248,81,73,.7)':v>=60?'rgba(210,153,34,.8)':'rgba(63,185,80,.75)';}),borderRadius:6}]},
    options:{responsive:true,layout:{padding:{top:28}},plugins:{legend:{display:false},
      datalabels:{anchor:'end',align:'end',color:th.cText,font:{family:NOVO_FONT,size:12,weight:'bold'},formatter:function(v){return v+'%';}},
      tooltip:{callbacks:{label:function(c){return c.parsed.y+'% do ARR';}}}},
      scales:{x:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}},y:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT}},max:100}},
      onClick:function(e,el){ if(!el.length)return; var n=tops[el[0].index]; novoOpenDealsModal('Top '+n+' clientes', won.slice(0,n)); }}});
}

(function(){
  try{ if(localStorage.getItem('novo_nav_open')==='true') _setNavOpen(true); }catch(e){}
  (function(_e){if(_e)_e.textContent=NOVO_LANG.toUpperCase();})(document.getElementById('novo-lang-label'));
  document.body.classList.toggle('novo-info-on',_novoShowInfo);
  var _ib=document.getElementById('btn-info-toggle'); if(_ib)_ib.classList.toggle('highlighted',_novoShowInfo);
  novoLoadData();
})();
</script>

<script>
(function(){

    {label:'AE Performance',url:'/novo-ae',file:'ae.html',health:'g',icon:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'},
    {label:'BDR Performance',url:'/novo-bdr',file:'bdr.html',health:'r',icon:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'},
    {label:'Last 48h',url:'/novo-48h',file:'48h.html',health:'r',icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'},
    {label:'CS Dashboard',url:'/novo-cs',file:'cs.html',health:'r',icon:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>'},
    {label:'Cotação',url:'/novo-cotacao',file:'cotacao.html',health:'r',icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>'},
    {label:'Forecast',url:'/forecast',file:'forecast.html',health:'g',icon:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>'}
  ];
  function findByUrl(u){ for(var i=0;i<PANELS.length;i++){ if(PANELS[i].url===u) return PANELS[i]; } return null; }
  var p2=location.pathname; if(p2.length>1&&p2.charAt(p2.length-1)==='/') p2=p2.slice(0,-1);
  var current=null;
  for(var i=0;i<PANELS.length;i++){ if(p2===PANELS[i].url||p2.indexOf(PANELS[i].file)!==-1){ current=PANELS[i].url; break; } }
  function dot(h){ var tt={g:'live',y:'wip',r:'not working'}; var t=tt[h]||''; return '<span class="health-dot '+h+'" title="'+t+'" aria-label="'+t+'"></span>'; }
  function svgFor(p){ return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p.icon+'</svg>'; }
  function buildNav(){
    var nav=document.getElementById('nav-drawer'); if(!nav) return;
    var h='<div class="nav-drawer-header"><span class="nav-drawer-brand">Dashboard Axenya</span>'+
      '<button class="hdr-btn" onclick="closeDrawer()" aria-label="Fechar menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'+
      '<ul class="nav-menu">';
    for(var i=0;i<PANELS.length;i++){
      var p=PANELS[i];
      if(p.url==='/forecast') h+='<div style="height:1px;background:var(--border);margin:.4rem .75rem"></div>';
      h+='<li class="nav-item'+(p.url===current?' active':'')+'" data-url="'+p.url+'">'+svgFor(p)+'<span>'+p.label+'</span>'+dot(p.health)+'</li>';
    }
    h+='</ul>'+'<div class="nav-drawer-footer"><button class="nav-foot-btn" type="button" onclick="doLogout()" title="Sair" aria-label="Sair"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button><button class="nav-foot-btn" type="button" onclick="novoToggleLang()" title="Idioma / Language"><span id="novo-lang-label">'+(typeof NOVO_LANG!=="undefined"&&NOVO_LANG==="pt"?"EN":"PT")+'</span></button><button class="nav-foot-btn" type="button" onclick="toggleTheme()" title="Tema / Theme"><svg class="novo-theme-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg class="novo-theme-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div>';
    nav.innerHTML=h;
    var nit=nav.getElementsByClassName('nav-item');
    for(var j=0;j<nit.length;j++){ nit[j].addEventListener('click',function(){ window.location.href=this.getAttribute('data-url'); }); }
  }
  function buildDropdown(){
    var dd=document.getElementById('panel-dd'); if(!dd) return;
    var html='';
    for(var i=0;i<PANELS.length;i++){
      var p=PANELS[i], act=(p.url===current?' active':'');
      html+='<div class="panel-dd-item'+act+'" role="menuitem" data-url="'+p.url+'">'+svgFor(p)+'<span>'+p.label+'</span>'+dot(p.health)+'</div>';
    }
    dd.innerHTML=html;
    var items=dd.getElementsByClassName('panel-dd-item');
    for(var j=0;j<items.length;j++){ items[j].addEventListener('click',function(){ window.location.href=this.getAttribute('data-url'); }); }
  }
  function buildTitleDot(){
    var btn=document.querySelector('.panel-switch-btn');
    if(btn && current && !btn.querySelector('.health-dot')){
      var cp=findByUrl(current);
      if(cp){ var s=document.createElement('span'); s.className='health-dot '+cp.health; var _tt={g:'live',y:'wip',r:'not working'}; s.title=_tt[cp.health]||''; s.setAttribute('aria-label',s.title); var ch=btn.querySelector('.panel-chevron'); if(ch) btn.insertBefore(s,ch); else btn.appendChild(s); }
    }
  }
  function build(){ buildNav(); buildDropdown(); buildTitleDot(); }
  window.togglePanelMenu=function(e){ if(e){e.stopPropagation();} var sw=document.getElementById('panel-switcher'); if(!sw) return; var open=!sw.classList.contains('open'); sw.classList.toggle('open',open); var btn=sw.querySelector('.panel-switch-btn'); if(btn) btn.setAttribute('aria-expanded',open?'true':'false'); };
  window.closePanelMenu=function(){ var sw=document.getElementById('panel-switcher'); if(sw){ sw.classList.remove('open'); var btn=sw.querySelector('.panel-switch-btn'); if(btn) btn.setAttribute('aria-expanded','false'); } };
  document.addEventListener('click',function(e){ var sw=document.getElementById('panel-switcher'); if(sw&&sw.classList.contains('open')&&!sw.contains(e.target)) window.closePanelMenu(); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape'||e.keyCode===27){ var sw=document.getElementById('panel-switcher'); if(sw&&sw.classList.contains('open')) window.closePanelMenu(); } });
  if(document.readyState!=='loading') build(); else document.addEventListener('DOMContentLoaded',build);
})();
</script>
