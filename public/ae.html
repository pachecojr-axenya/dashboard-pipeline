*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#171f2e;--card2:#1e2a3c;--border:#293a50;--text:#e6edf3;--text2:#8b949e;--muted:#6e7681;--teal:#3ab8b7;--green:#3fb950;--red:#f85149;--orange:#d29922;--yellow:#e3b341;--hover:rgba(255,255,255,0.06);--even-s:#131b28;--hover-s:#1c2b40;--hdr-glass:rgba(13,17,23,.78)}
html[data-theme="light"]{--bg:#f6f8fa;--card:#ffffff;--card2:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#57606a;--teal:#0d7377;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--hover:rgba(0,0,0,0.05);--even-s:#f1f4f8;--hover-s:#e8eef4;--hdr-glass:rgba(246,248,250,.82)}
body{background:var(--bg);color:var(--text);font-family:Inter,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5}
button,input,select,textarea{font-family:Inter,'Segoe UI',system-ui,sans-serif}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.15rem}
.hdr-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);border-radius:99px;cursor:pointer;transition:background .15s,color .15s;position:relative;flex-shrink:0}
.hdr-btn:hover{background:rgba(255,255,255,0.13);color:var(--text)}
html[data-theme="light"] .hdr-btn:hover{background:rgba(0,0,0,0.07)}
.hdr-btn.highlighted{background:var(--teal)!important;color:#fff!important;box-shadow:0 0 0 2px rgba(58,184,183,.3)}
.hdr-btn[data-tooltip]::after{content:attr(data-tooltip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);font-size:.73rem;padding:.26rem .62rem;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300}
.hdr-btn[data-tooltip]:hover::after{opacity:1}
.hdr-sep{width:1px;height:16px;background:rgba(255,255,255,0.12);margin:0 2px;flex-shrink:0}
html[data-theme="light"] .hdr-sep{background:rgba(0,0,0,0.12)}
.hdr-actions{display:flex;align-items:center;background:rgba(255,255,255,0.09);border-radius:99px;padding:7px;gap:12px}
html[data-theme="light"] .hdr-actions{background:rgba(0,0,0,0.03)}
@keyframes hdr-spin{to{transform:rotate(360deg)}}
.hdr-btn.spinning svg{animation:hdr-spin .7s linear infinite}
/* Settings drawer global */
.gs-toggle{display:inline-flex;align-items:center;cursor:pointer;background:var(--card2);border:1px solid var(--border);border-radius:99px;padding:.3rem;flex:none}
.gs-sw{width:34px;height:19px;border-radius:99px;background:var(--border);position:relative;transition:background .18s;flex:none}
.gs-toggle.on .gs-sw{background:var(--teal)}
.gs-sw::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .18s}
.gs-toggle.on .gs-sw::after{transform:translateX(15px)}
.gs-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s}
.gs-backdrop.open{opacity:1;pointer-events:auto}
.gs-drawer{position:fixed;top:0;right:-380px;width:360px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:3001;display:flex;flex-direction:column;transition:right .28s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.25)}
.gs-drawer.open{right:0}
.gs-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.gs-hdr h3{margin:0;font-size:1.2rem;font-weight:600;color:var(--text)}
.gs-body{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.gs-row{display:flex;align-items:center;gap:.75rem;padding:.85rem 0;border-bottom:1px solid var(--border)}
.gs-row label{flex:1;font-size:.9rem;color:var(--text)}
.nav-drawer{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--card);border-right:1px solid rgba(255,255,255,.08);z-index:1000;transition:left .25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.nav-drawer.open{left:0}
.nav-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s ease}
.nav-backdrop.open{opacity:1;pointer-events:auto}
.nav-drawer-header{display:flex;align-items:center;gap:.75rem;padding:1.1rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-drawer-brand{font-weight:600;font-size:1rem;color:var(--text);flex:1}
.nav-drawer-footer{margin-top:auto;display:flex;align-items:center;gap:.5rem;padding:.7rem .75rem;border-top:1px solid rgba(255,255,255,.08)}
html[data-theme="light"] .nav-drawer-footer{border-top-color:rgba(0,0,0,.1)}
.nav-foot-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;min-height:38px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;padding:.4rem;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;transition:border-color .15s,color .15s,background .15s}
.nav-foot-btn:hover{border-color:var(--teal);color:var(--text)}
.nav-menu{list-style:none;padding:.5rem 0;margin:0}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.25rem;cursor:pointer;font-size:.9rem;color:var(--text2);transition:background .15s,color .15s}.nav-item.nav-sub{padding-left:2.7rem;font-size:.8rem;gap:.55rem}.nav-item.nav-sub svg{width:14px;height:14px}.nav-menu.nav-group-collapsed .nav-item.nav-sub{display:none}.nav-acc-chevron{margin-left:auto;display:inline-flex;align-items:center;padding:2px;color:var(--text2);transition:transform .18s;border-radius:4px}.nav-acc-chevron:hover{background:rgba(35,209,180,.15);color:var(--teal)}.nav-acc-chevron.open{transform:rotate(180deg)}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.nav-item.active{color:var(--teal);font-weight:500}
.nav-item.active svg{stroke:var(--teal)}
.novo-hdr{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.25rem 2rem;background:transparent;position:sticky;top:0;z-index:100;transition:background .25s,backdrop-filter .25s,box-shadow .25s}
.novo-hdr.scrolled{background:var(--hdr-glass);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);box-shadow:0 1px 0 var(--border)}
.novo-theme-sun{display:block}.novo-theme-moon{display:none}
[data-theme="light"] .novo-theme-sun{display:none}[data-theme="light"] .novo-theme-moon{display:block}
.novo-lang-btn{width:auto !important;padding:0 9px;font-size:.71rem;font-weight:700;letter-spacing:.06em}
.novo-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:1rem;padding-bottom:2rem}
.novo-card{background:var(--card);border-radius:10px;padding:1.25rem 1.5rem}
.novo-card-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.novo-card-header h3{font-size:.88rem;font-weight:600;color:var(--text);margin:0;flex:1}
.novo-code-tag{display:none;align-items:center;font-size:.6rem;font-weight:700;letter-spacing:.04em;font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--teal);background:rgba(58,184,183,.14);border:1px solid rgba(58,184,183,.32);border-radius:5px;padding:.05rem .32rem;line-height:1.35;flex-shrink:0}
.novo-info-btn{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--text2);background:none;color:var(--text2);font-size:.62rem;font-style:normal;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;padding:0;line-height:1}
body:not(.novo-info-on) .novo-card .novo-info-btn{display:none}
body.novo-info-on .novo-code-tag{display:inline-flex}
#novo-tip{position:fixed;z-index:9999;background:rgba(23,31,46,.78);backdrop-filter:blur(14px) saturate(1.5);border-radius:6px;padding:.45rem .7rem;width:278px;pointer-events:none;display:none;box-shadow:0 6px 20px rgba(0,0,0,.3)}
html[data-theme="light"] #novo-tip{background:rgba(246,248,250,.82)}
#novo-tip.nt-show{display:block}
#novo-tip .nt-text{font-size:.73rem;color:var(--text);font-weight:400;line-height:1.5}
#novo-tip .nt-code{font-size:.62rem;font-weight:700;color:var(--teal);font-family:ui-monospace,Menlo,Consolas,monospace;margin-top:.3rem;padding-top:.28rem;border-top:1px solid rgba(255,255,255,.12);letter-spacing:.07em}
html[data-theme="light"] #novo-tip .nt-code{border-top-color:rgba(0,0,0,.1)}
.tab-sub{display:inline-flex;background:var(--card2);border-radius:99px;padding:3px;gap:0;position:relative}
.tab-sub-btn{background:transparent;border:none;border-radius:99px;color:var(--text2);padding:.3rem .9rem;cursor:pointer;font-size:.75rem;font-weight:500;transition:color .18s;position:relative;z-index:1}
.tab-sub-btn.active{color:var(--text);font-weight:600}
html[data-theme="light"] .tab-sub-btn.active{box-shadow:none}
.tab-sub-thumb{position:absolute;top:3px;height:calc(100% - 6px);border-radius:99px;background:rgba(255,255,255,.14);pointer-events:none;z-index:0;transition:left .22s cubic-bezier(.4,0,.2,1),width .22s cubic-bezier(.4,0,.2,1)}
html[data-theme="light"] .tab-sub-thumb{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.75rem;margin-bottom:.75rem}
.kpi-card{background:var(--card);border-radius:14px;padding:clamp(1rem,.6rem+1.3vw,1.6rem) clamp(1.05rem,.5rem+1.6vw,1.8rem);transition:box-shadow .18s}
.kpi-card:hover{box-shadow:0 0 0 2px rgba(58,184,183,.35)}
.kpi-click{cursor:pointer}
.kpi-label{font-size:.66rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;line-height:1}
.kpi-value{font-size:clamp(1.35rem,.95rem+1.3vw,2rem);font-weight:800;line-height:1.1;margin:.35rem 0 .25rem}
.kpi-sub{font-size:.7rem;color:var(--muted);line-height:1.35}
.stage-chip{background:var(--card2);border:1px solid var(--border);border-radius:99px;color:var(--text2);padding:.34rem .82rem;cursor:pointer;font-size:.72rem;font-weight:700;font-family:inherit;transition:border-color .15s,color .15s,background .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:.35rem}
.stage-chip:hover{border-color:var(--teal);color:var(--text);box-shadow:0 0 0 2px rgba(58,184,183,.1)}
.stage-chip.active{background:rgba(58,184,183,.16);border-color:var(--teal);color:var(--teal);box-shadow:inset 0 0 0 1px rgba(58,184,183,.12)}
.stage-chip .chip-count{font-size:.62rem;opacity:.7;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s linear;backdrop-filter:blur(5px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:90vw;max-width:960px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .28s cubic-bezier(0.4,0,0.2,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1rem;font-weight:600;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px;transition:color .15s}
.modal-close:hover{color:var(--red)}
.modal-body{padding:1.2rem 1.5rem;overflow-y:auto;flex:1}
.btn-export{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:.3rem .7rem;font-size:.7rem;cursor:pointer;margin-left:auto}
.btn-export:hover{border-color:var(--teal);color:var(--teal)}
table.lb{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
table.lb th{text-align:right;color:var(--teal);font-size:.72rem;font-weight:700;text-transform:uppercase;padding:.6rem 1rem;border-bottom:2px solid var(--teal);white-space:nowrap;position:sticky;top:0;background:var(--card)}
table.lb th:first-child{text-align:left}
table.lb td{padding:.38rem 1rem;border-bottom:1px solid var(--border);color:var(--text);text-align:right}
table.lb td:first-child{text-align:left;font-weight:600}
table.lb tbody tr:nth-child(even) td{background:var(--even-s)}
table.lb tbody tr:hover td{background:var(--hover-s)}
#modal-body table.lb th{cursor:pointer;user-select:none}
#modal-body table.lb th:hover{color:var(--text)}
#modal-body table.lb th[data-sort="asc"]::after{content:' \25B2';font-size:.58rem}
#modal-body table.lb th[data-sort="desc"]::after{content:' \25BC';font-size:.58rem}
#view-novo{transition:filter .25s ease,margin-left .25s cubic-bezier(0.4,0,0.2,1)}
body.nav-docked #view-novo{margin-left:280px}
@media(max-width:820px){body.nav-docked #view-novo{margin-left:0}}
.content-blur{filter:blur(4px);pointer-events:none;user-select:none}
.novo-help-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s ease}
.novo-help-backdrop.open{opacity:1;pointer-events:auto}
.novo-help-drawer{position:fixed;top:0;right:-580px;width:540px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:3001;display:flex;flex-direction:column;transition:right .28s cubic-bezier(0.4,0,0.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.25)}
.novo-help-drawer.open{right:0}
.novo-help-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.novo-help-hdr h3{margin:0;font-size:1.15rem;font-weight:600;color:var(--text)}
.novo-help-body{flex:1;overflow-y:auto;padding:1.25rem 1.5rem}
.section-hdr{grid-column:1/-1;margin:1.5rem 0 .25rem;border-top:1px solid var(--border);padding-top:1.25rem}
.section-hdr h2{font-size:.78rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin:0}
</style>

// ── Ordenação das tabelas dos modais: clique no cabeçalho ordena a coluna (asc ↔ desc).
// Parser entende número pt-BR (1.234 | 5,5 | 12%), moeda (_revShort: R$1.2M | R$500k),
// data ISO (2026-07-01) e dd/mm/aaaa; '—'/vazio vai para o fim; resto compara como texto.
function _aeSortParse(s){
  if(!s||s==='—')return null;
  var m;
  if((m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/))) return +(m[1]+m[2]+m[3]);
  if((m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/))) return +(m[3]+m[2]+m[1]);
  if((m=s.match(/^R\$\s?(-?[\d.,]+)\s*([MkK])?$/))){ var n=m[2]?parseFloat(m[1].replace(',','.')):parseFloat(m[1].replace(/\./g,'').replace(',','.')); if(m[2]==='M')n*=1e6; if(m[2]==='k'||m[2]==='K')n*=1e3; return isNaN(n)?null:n; }
  var t=s.replace(/%$/,'');
  if(/^-?[\d.]+(,\d+)?$/.test(t)) return parseFloat(t.replace(/\./g,'').replace(',','.'));
  return s.toLowerCase();
}
document.addEventListener('click',function(e){
  var th=e.target.closest('#modal-body table.lb th'); if(!th)return;
  var table=th.closest('table'); var tbody=table.querySelector('tbody'); if(!tbody)return;
  var ths=Array.prototype.slice.call(th.parentNode.children);
  var idx=ths.indexOf(th); if(idx<0)return;
  var dir=th.getAttribute('data-sort')==='asc'?'desc':'asc';
  table.querySelectorAll('th[data-sort]').forEach(function(h){h.removeAttribute('data-sort');});
  th.setAttribute('data-sort',dir);
  var rows=Array.prototype.slice.call(tbody.querySelectorAll('tr'));
  rows.sort(function(a,b){
    var ta=a.children[idx]?a.children[idx].textContent.trim():'';
    var tb=b.children[idx]?b.children[idx].textContent.trim():'';
    var va=_aeSortParse(ta), vb=_aeSortParse(tb);
    if(va==null&&vb==null)return 0; if(va==null)return 1; if(vb==null)return -1;
    if(typeof va==='number'&&typeof vb==='number')return dir==='asc'?va-vb:vb-va;
    va=String(va); vb=String(vb);
    return dir==='asc'?va.localeCompare(vb,'pt-BR'):vb.localeCompare(va,'pt-BR');
  });
  rows.forEach(function(r){tbody.appendChild(r);});
});

// ── Data loading ──────────────────────────────────────────────────────────────
var _novoDeals=null;
var _aeFunnelLoading=false;
var AE_FUNNEL_CACHE_KEY='ae_funnel_cache_v1';
var AE_FUNNEL_CACHE_TTL=30*60*1000; // 30 min | o funil histórico muda devagar
// Funil histórico (mesma fonte de probabilidade do Forecast/CRO). Para não estourar o rate
// limit do HubSpot: (1) só é buscado DEPOIS que os deals chegam (nunca em paralelo);
// (2) fica cacheado em sessionStorage por 30 min — reloads não repetem a chamada pesada.
function _aeLoadFunnelProb(){
  if(_aeFunnelData||_aeFunnelLoading) return;
  try{
    var raw=sessionStorage.getItem(AE_FUNNEL_CACHE_KEY);
    if(raw){ var c=JSON.parse(raw); if(c&&c.ts&&(Date.now()-c.ts)<AE_FUNNEL_CACHE_TTL&&c.data&&c.data.success){ _aeFunnelData=c.data; if(_aeApplyFunnelProb()&&_novoDeals) novoRender(); return; } }
  }catch(e){}
  _aeFunnelLoading=true;
  fetch('/api/funnel-stages?since=2025-08-01').then(function(r){ return r.json(); }).then(function(fd){
    _aeFunnelLoading=false;
    if(fd&&fd.success){
      _aeFunnelData=fd;
      try{ sessionStorage.setItem(AE_FUNNEL_CACHE_KEY,JSON.stringify({ts:Date.now(),data:fd})); }catch(e){}
      if(_aeApplyFunnelProb()&&_novoDeals) novoRender();
    }
  }).catch(function(){ _aeFunnelLoading=false; });
}
var _aeRateRetries=0;
function novoLoadData(){
  var btn=document.getElementById('btn-refresh'); if(btn) btn.classList.add('spinning');
  document.getElementById('novo-content').innerHTML='<div style="text-align:center;padding:3rem 0;color:var(--text2)">'+t('loading')+'</div>';
  fetch('/api/forecast-table?includeLost=true').then(function(r){ if(!r.ok) return r.text().then(function(txt){ throw new Error(txt||('HTTP '+r.status)); }); return r.json(); }).then(function(data){
    _novoDeals=Array.isArray(data)?data:(data.deals||[]);window._novoDealsRaw=_novoDeals;
    _aeRateRetries=0;
    if(btn) btn.classList.remove('spinning');
    if(typeof FaturamentoManual!=='undefined'&&!FaturamentoManual._aeLoaded){ FaturamentoManual._aeLoaded=true; FaturamentoManual.load().then(function(){ if(_novoDeals) novoRender(); }); }
    novoRender();
    _aeLoadFunnelProb(); // funil só depois dos deals | sem chamadas HubSpot em paralelo
  }).catch(function(err){
    if(btn) btn.classList.remove('spinning');
    var msg=String(err);
    // Rate limit do HubSpot: retry automático (até 2×) com contagem regressiva de 30s.
    if(/rate limit/i.test(msg)&&_aeRateRetries<2){
      _aeRateRetries++;
      var secs=30;
      var el=document.getElementById('novo-content');
      var tick=function(){
        if(!el) return;
        el.innerHTML='<div style="text-align:center;padding:3rem 0;color:var(--text2)">Limite de requisições do HubSpot atingido.<br>Tentando de novo em <strong style="color:var(--teal)">'+secs+'s</strong>… (tentativa '+_aeRateRetries+' de 2)</div>';
        if(secs<=0){ novoLoadData(); return; }
        secs--; setTimeout(tick,1000);
      };
      tick();
      return;
    }
    document.getElementById('novo-content').innerHTML='<div style="text-align:center;padding:3rem 0;color:var(--red)">'+t('error_prefix')+_ne(msg)+'<br><br><button onclick="_aeRateRetries=0;novoLoadData()" style="background:var(--teal);color:#fff;border:none;border-radius:8px;padding:.5rem 1.2rem;cursor:pointer">'+t('retry')+'</button></div>';
  });
}

function _getAEs(){
  var deals=_rawDeals();
  var aes=[];
  deals.forEach(function(d){ if(d.ae&&d.ae!=='-'&&aes.indexOf(d.ae)<0) aes.push(d.ae); });
  return aes.sort();

function aeKpiOpen(kind){
  if(kind==='stale'){ _aeStaleModal(); return; }
  if(kind==='meetings'){ _aeMeetingsModal(); return; }
  var won=_novoWon(), deals=[];

// A07 | Receita do Forecast por AE — MESMO motor e conjunto do N06B/Forecast Overall
// (ForecastEngine: régua calcReceitaMes + faturamento manual + dedup + BID 0,5%).
// A métrica NÃO é ARR nem TCV: é a soma das receitas mensais projetadas na janela jan/26→dez/27.
function buildAEArr(){
  var th=_novoTheme();
  var f=_aeForecastByAE();
  var weighted=_aePipeRevValueMode==='weighted';
  // Só executivos do time; buckets zerados (sem receita no modo atual) ficam ocultos.
  var pairs=Object.keys(f.byAE).filter(_isCoreAE).map(function(ae){
    return {ae:ae,v:weighted?f.byAE[ae].prob:f.byAE[ae].real};
  }).filter(function(p){return p.v>0;}).sort(function(a,b){return b.v-a.v;});
  var sa=pairs.map(function(p){return p.ae;}), sv=pairs.map(function(p){return Math.round(p.v);});

  if(cnt){ var nCore=pairs.reduce(function(s,p){return s+f.byAE[p.ae].deals.length;},0); cnt.textContent=nCore.toLocaleString('pt-BR')+' deals do forecast | só time'; }
  _novoMkChart('chart-ae-arr',{type:'bar',plugins:[ChartDataLabels],
    data:{labels:sa,datasets:[{data:sv,backgroundColor:'rgba(58,184,183,.75)',borderRadius:4}]},
    options:{responsive:true,layout:{padding:{top:28}},plugins:{legend:{display:false},
      datalabels:{anchor:'end',align:'end',color:th.cText,font:{family:NOVO_FONT,size:10,weight:'bold'},formatter:_revShort},
      tooltip:{callbacks:{label:function(c){return 'R$ '+Math.round(c.parsed.y).toLocaleString('pt-BR')+(weighted?' (probabilizado)':' (real)');},afterLabel:function(c){var g=f.byAE[sa[c.dataIndex]];return (g?g.deals.length:0)+' deals | soma mensal jan/26 a dez/27 | não é ARR nem TCV';},footer:function(){return 'Clique para ver os deals';}}}},
      scales:{x:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}}},y:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},callback:_revShort}}},

function buildAEWonRev(){

  var pairs=aes.map(function(ae){return {ae:ae,v:val(ae)};}).filter(function(p){return p.v>0;}).sort(function(a,b){return b.v-a.v;});

function buildAEWinRate(){
  var th=_novoTheme();
  var won=_novoWon(), lost=_novoLost();
  var all=won.concat(lost);
  var aes=_getAEs().filter(function(ae){ return all.filter(function(d){return d.ae===ae;}).length>=1; });
  var rates=aes.map(function(ae){
    var w=won.filter(function(d){return d.ae===ae;}).length;
    var l=lost.filter(function(d){return d.ae===ae;}).length;
    return w+l>0?Math.round(w/(w+l)*1000)/10:0;
  });
  var order=aes.map(function(_,i){return i;}).filter(function(i){return rates[i]>0;}).sort(function(a,b){return rates[b]-rates[a];});
  var sa=order.map(function(i){return aes[i];}), sr=order.map(function(i){return rates[i];});
  // Piso de 20% (mantém a leitura quando as taxas são baixas); acima disso o eixo acompanha
  // o maior valor (arredonda pra cima em 5, +5 de folga p/ o rótulo) — barras nunca cortadas.
  var _maxR=sr.length?Math.max.apply(null,sr):0;
  var _yMax=_maxR>20?Math.ceil(_maxR/5)*5+5:20;
  _novoMkChart('chart-ae-winrate',{type:'bar',plugins:[ChartDataLabels],
    data:{labels:sa,datasets:[{data:sr,backgroundColor:sr.map(function(r){return r>=40?'rgba(63,185,80,.75)':r>=20?'rgba(210,153,34,.8)':'rgba(248,81,73,.65)';}),borderRadius:4}]},

      tooltip:{callbacks:{label:function(c){var ae=sa[c.dataIndex]; var w=won.filter(function(d){return d.ae===ae;}).length; var l=lost.filter(function(d){return d.ae===ae;}).length; return [c.parsed.y+'% taxa ajustada','Ganhos: '+w+' / Fechados: '+(w+l)]; }}}},

function buildAEMonthlyWon(){

  for(var i=11;i>=0;i--){ var dd=new Date(now.getFullYear(),now.getMonth()-i,1); allMonths.push(dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')); }
  var aes=_getAEs().filter(function(ae){return won.some(function(d){return d.ae===ae;});}).slice(0,6);
  var months=allMonths.filter(function(m){return won.some(function(d){return aes.indexOf(d.ae)>=0&&d.close_date.substring(0,7)===m;});});
  var colors=['rgba(88,166,255,.75)','rgba(63,185,80,.7)','rgba(58,184,183,.75)','rgba(210,153,34,.8)','rgba(147,112,219,.75)','rgba(248,81,73,.65)'];
  var datasets=aes.map(function(ae,i){
    return {label:ae, data:months.map(function(m){return won.filter(function(d){return d.ae===ae&&d.close_date.substring(0,7)===m;}).length;}), backgroundColor:colors[i%colors.length], borderRadius:2, stack:'s'};
  });
  _novoMkChart('chart-ae-monthly-won',{type:'bar',plugins:[ChartDataLabels],
    data:{labels:months.map(_mlbl),datasets:datasets},
    options:{responsive:true,layout:{padding:{top:24}},plugins:{legend:{display:true,labels:{color:th.cText2,font:{family:NOVO_FONT,size:10},padding:8}},

function buildAERadar(){
  var th=_novoTheme();
  var all=_rawDeals(), open=_novoOpen(), won=_novoWon(), lost=_novoLost();
  // Só executivos do time. Clique na legenda ISOLA o AE clicado (clique de novo restaura todos).
  var aes=_getAEs().filter(_isCoreAE).filter(function(ae){ return all.filter(function(d){return d.ae===ae;}).length>=2; }).slice(0,8);
  if(!aes.length)return;
  var maxDeals=Math.max.apply(null,aes.map(function(ae){return open.filter(function(d){return d.ae===ae;}).length;}))||1;
  var maxVidas=Math.max.apply(null,aes.map(function(ae){return open.filter(function(d){return d.ae===ae;}).reduce(function(s,d){return s+(d.vidas||0);},0);}))||1;
  var maxArr=Math.max.apply(null,aes.map(function(ae){return open.filter(function(d){return d.ae===ae;}).reduce(function(s,d){return s+_annualRev(d);},0);}))||1;
  var colors=['rgba(88,166,255,.5)','rgba(63,185,80,.5)','rgba(58,184,183,.5)','rgba(210,153,34,.5)','rgba(147,112,219,.5)','rgba(248,81,73,.4)','rgba(230,150,80,.5)','rgba(200,200,100,.5)'];
  var datasets=aes.map(function(ae,i){
    var w=won.filter(function(d){return d.ae===ae;}).length;
    var l=lost.filter(function(d){return d.ae===ae;}).length;
    var wr=w+l>0?Math.round(w/(w+l)*100):0;
    var vidasN=open.filter(function(d){return d.ae===ae;}).reduce(function(s,d){return s+(d.vidas||0);},0);
    var arrN=open.filter(function(d){return d.ae===ae;}).reduce(function(s,d){return s+_annualRev(d);},0);
    var deals=open.filter(function(d){return d.ae===ae;}).length;
    var comp=open.filter(function(d){return d.ae===ae&&d.vidas&&_annualRev(d)>0;}).length;
    var compPct=deals>0?Math.round(comp/deals*100):0;
    return {label:ae,data:[Math.round(deals/maxDeals*100),Math.round(vidasN/maxVidas*100),Math.round(arrN/maxArr*100),wr,compPct],backgroundColor:colors[i%colors.length],borderColor:colors[i%colors.length].replace('.5','1').replace('.4','1'),borderWidth:2,pointRadius:3};
  });
  var dimLabels=['Deals','Vidas','ARR','Win Rate','Completude'];
  var keep=dimLabels.map(function(_,di){ return datasets.some(function(ds){return ds.data[di]>0;}); });
  var labels2=dimLabels.filter(function(_,di){return keep[di];});
  datasets.forEach(function(ds){ ds.data=ds.data.filter(function(_,di){return keep[di];}); });
  _novoMkChart('chart-ae-radar',{type:'radar',
    data:{labels:labels2,datasets:datasets},
    options:{responsive:true,plugins:{legend:{display:true,position:'right',labels:{color:th.cText2,font:{family:NOVO_FONT,size:10},padding:10},
      onClick:function(e,item,legend){ var ch=legend.chart, idx=item.datasetIndex; var isolated=ch.data.datasets.every(function(_,i){ return i===idx?ch.isDatasetVisible(i):!ch.isDatasetVisible(i); }); ch.data.datasets.forEach(function(_,i){ ch.setDatasetVisibility(i, isolated?true:i===idx); }); ch.update(); }},
      datalabels:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.raw+'%';}}}},
      scales:{r:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT,size:9},backdropColor:'transparent'},pointLabels:{color:th.cText,font:{family:NOVO_FONT,size:10}},min:0,max:100}}}});
}

  window.closePanelMenu=function(){ var sw=document.getElementById('panel-switcher'); if(sw){ sw.classList.remove('open'); var btn=sw.querySelector('.panel-switch-btn'); if(btn) btn.setAttribute('aria-expanded','false'); } };
  document.addEventListener('click',function(e){ var sw=document.getElementById('panel-switcher'); if(sw&&sw.classList.contains('open')&&!sw.contains(e.target)) window.closePanelMenu(); });
  document.addEventListener('keydown',function(e){ if(e.key!=='Escape'&&e.keyCode!==27)return; var gs=document.getElementById('gs-drawer'); if(gs&&gs.classList.contains('open')){ novoCloseSettings(); return; } var help=document.getElementById('novo-help-drawer'); if(help&&help.classList.contains('open')){ novoCloseHelp(); return; } var modal=document.getElementById('modal-overlay'); if(modal&&modal.classList.contains('open')){ closeModal(); return; } var sw=document.getElementById('panel-switcher'); if(sw&&sw.classList.contains('open')) window.closePanelMenu(); });
  if(document.readyState!=='loading') build(); else document.addEventListener('DOMContentLoaded',build);
})();
</script>
</body>
</html>
