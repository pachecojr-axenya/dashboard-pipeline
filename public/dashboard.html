}

function buildNovoFunnelHorizChart() {
  function fx(v) { return v.toFixed(1); }
  var data = _novoFunnelData;
  var area = document.getElementById('funnel-horiz-chart-area');
  if (!area) return;
  if (!data) {
    area.innerHTML = '<p style="text-align:center;padding:2rem 0;color:var(--text2);font-size:.85rem">Carregue os dados via o card do funil acima.</p>';
    return;
  }

  var funnelStages = _FUNNEL_STAGES[_novoFunnelPipeline];
  var stagesMap = {};
  _novoFunnelStagesData = {};
  var convMap = {};

  if (_novoFunnelPipeline === 'combined') {
    // Merge Vendas + Bid: sum counts and pool deals for matching stage names
    var _vMap = {}, _bMap = {};
    ((data.vendas || {}).stages || []).forEach(function(s) { _vMap[s.stage] = s; });
    ((data.bid   || {}).stages || []).forEach(function(s) { _bMap[s.stage] = s; });
    funnelStages.forEach(function(stage) {
      var v = _vMap[stage] || { count: 0, deals: [] };
      var b = _bMap[stage] || { count: 0, deals: [] };
      var combined = { stage: stage, count: v.count + b.count, deals: (v.deals || []).concat(b.deals || []) };
      stagesMap[stage] = combined;
      _novoFunnelStagesData[stage] = combined.deals;
    });
    // Recompute conversion rates from combined counts
    for (var _i = 1; _i < funnelStages.length; _i++) {
      var _from = stagesMap[funnelStages[_i - 1]];
      var _to   = stagesMap[funnelStages[_i]];
      if (_from && _to && _from.count > 0) {
        convMap[funnelStages[_i]] = {
          from: funnelStages[_i - 1], to: funnelStages[_i],
          from_count: _from.count, to_count: _to.count,
          rate_pct: Math.round((_to.count / _from.count) * 1000) / 10,
        };
      }
    }
  } else {
    var pipeData = data[_novoFunnelPipeline] || {};
    (pipeData.stages || []).forEach(function(s) {
      stagesMap[s.stage] = s;
      _novoFunnelStagesData[s.stage] = s.deals || [];
    });
    (pipeData.conversions || []).forEach(function(c) { convMap[c.to] = c; });
  }

  var counts = funnelStages.map(function(s) { return stagesMap[s] ? stagesMap[s].count : 0; });
  var maxCount = Math.max.apply(null, counts) || 1;

  var n = funnelStages.length;
  var VW = 1000, VH = 160;
  var MIN_H = VH * 0.09;
  var heights = counts.map(function(c) {
    return Math.max(MIN_H, (c / maxCount) * VH * 0.94);
  });

  // Proportional layout: stage zones get flex=1, conv zones get flex=0.35
  // This keeps label row cells perfectly aligned with SVG stage/transition zones
  var FS = 1, FC = 0.35;
  var totalFlex = n * FS + (n - 1) * FC;
  var sVW = VW * FS / totalFlex;  // stage zone width in SVG units
  var cVW = VW * FC / totalFlex;  // conv zone width in SVG units

  function xSS(i) { return i * (sVW + cVW); }        // x: start of stage i
  function xSE(i) { return xSS(i) + sVW; }           // x: end of stage i
  function xCC(i) { return xSE(i) + cVW / 2; }       // x: center of conv zone i→i+1

  // SVG path: flat across each stage zone, S-curve across each conv zone
  var p = ['M 0,' + fx(VH - heights[0])];
  for (var i = 0; i < n; i++) {
    var yC = VH - heights[i];
    if (i < n - 1) {
      var yN = VH - heights[i + 1];
      p.push('L ' + fx(xSE(i)) + ',' + fx(yC));
      // S-curve across conv zone: CP1 and CP2 both at xCC | creates horizontal tangents
      var xc = fx(xCC(i));
      p.push('C ' + xc + ',' + fx(yC) + ' ' + xc + ',' + fx(yN) + ' ' + fx(xSS(i + 1)) + ',' + fx(yN));
    } else {
      p.push('L ' + VW + ',' + fx(VH - heights[n - 1]));
    }
  }
  p.push('L ' + VW + ',' + VH);
  p.push('L 0,' + VH);
  p.push('Z');

  // Dashed vertical dividers at conv zone centers (aligns with label conv cells)
  var isLight = document.documentElement.getAttribute('data-theme') === 'light';
  var divColor = isLight ? 'rgba(0,0,0,0.14)' : 'rgba(255,255,255,0.18)';
  var divLines = '';
  for (var j = 0; j < n - 1; j++) {
    var xd = fx(xCC(j));
    divLines += '<line x1="' + xd + '" y1="0" x2="' + xd + '" y2="' + VH +
      '" stroke="' + divColor + '" stroke-width="1.5" stroke-dasharray="4,4"/>';
  }

  var gradId = 'fhg-' + _novoFunnelPipeline;
  var svg =
    '<svg viewBox="0 0 ' + VW + ' ' + VH + '" xmlns="http://www.w3.org/2000/svg" ' +
      'style="width:100%;height:100%;display:block;border-radius:6px 6px 0 0" preserveAspectRatio="none">' +
      '<defs>' +
        '<linearGradient id="' + gradId + '" x1="0" y1="0" x2="' + VW + '" y2="0" gradientUnits="userSpaceOnUse">' +
          '<stop offset="0%"   stop-color="#3ab8b7" stop-opacity="0.88"/>' +
          '<stop offset="72%"  stop-color="#3ab8b7" stop-opacity="0.32"/>' +
          '<stop offset="100%" stop-color="#3fb950" stop-opacity="0.82"/>' +
        '</linearGradient>' +
      '</defs>' +
      '<path d="' + p.join(' ') + '" fill="url(#' + gradId + ')"/>' +
      divLines +
    '</svg>';

  // Conversões sobre o gráfico (nas zonas de conversão), centralizadas verticalmente.
  var overlayHtml = '<div style="position:absolute;inset:0;display:flex;align-items:center;pointer-events:none">';
  funnelStages.forEach(function(stage, idx) {
    overlayHtml += '<div style="flex:' + FS + ';min-width:0"></div>'; // zona da etapa (vazia)
    if (idx < n - 1) {
      var conv = convMap[funnelStages[idx + 1]];
      var rate = conv ? conv.rate_pct : null;
      var rCol = rate == null ? 'var(--muted)' : rate >= 50 ? 'var(--green)' : rate >= 30 ? 'var(--yellow)' : 'var(--red)';
      var rStr = rate != null ? rate + '%' : '—';
      var firstCount = (stagesMap[funnelStages[0]] || { count: 0 }).count;
      var nextCount  = (stagesMap[funnelStages[idx + 1]] || { count: 0 }).count;
      var cumRate    = (idx > 0 && firstCount > 0) ? Math.round(nextCount / firstCount * 1000) / 10 : null;
      var cumCol     = cumRate == null ? '' : cumRate >= 30 ? 'var(--green)' : cumRate >= 10 ? 'var(--yellow)' : 'var(--red)';
      var fromName  = funnelStages[idx] === 'Implantação' ? 'Implantação/Ganho' : funnelStages[idx];
      var toName    = funnelStages[idx + 1] === 'Implantação' ? 'Implantação/Ganho' : funnelStages[idx + 1];
      var fromCount = (stagesMap[funnelStages[idx]] || { count: 0 }).count;
      var stepText  = 'Conversão entre etapas consecutivas | quantos dos deals que entraram em ' + fromName + ' avançaram para ' + toName + '.';
      var stepCode  = nextCount.toLocaleString('pt-BR') + ' ÷ ' + fromCount.toLocaleString('pt-BR') + ' = ' + rStr;
      var cumText   = 'Conversão em relação ao topo do funil | quantos dos deals da 1ª etapa (' + funnelStages[0] + ') chegaram até ' + toName + '.';
      var cumCode   = nextCount.toLocaleString('pt-BR') + ' ÷ ' + firstCount.toLocaleString('pt-BR') + ' = ' + (cumRate != null ? cumRate + '%' : '—');
      overlayHtml +=
        '<div style="flex:' + FC + ';min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto">' +
          '<div style="font-size:1.15rem;font-weight:800;color:' + rCol + ';line-height:1;cursor:help" data-tip="' + _ne(stepText) + '" data-code="' + _ne(stepCode) + '">' + rStr + '</div>' +
          (cumRate != null
            ? '<div style="font-size:.9rem;font-weight:700;color:' + cumCol + ';line-height:1;opacity:.92;margin-top:.42rem;cursor:help" data-tip="' + _ne(cumText) + '" data-code="' + _ne(cumCode) + '">' + cumRate + '%↓</div>'
            : '') +
        '</div>';
    }
  });
  overlayHtml += '</div>';

  var CHART_H = 190;
  var chartBox = '<div style="position:relative;height:' + CHART_H + 'px">' + svg + overlayHtml + '</div>';

  // Barra inferior (dobro da altura): rótulo de cada etapa + conversões.
  // flex proporcional às zonas do SVG → colunas alinhadas com o gráfico acima.
  var labelsHtml = '<div style="display:flex;border-top:1px solid var(--border)">';
  funnelStages.forEach(function(stage, idx) {
    var s = stagesMap[stage] || { count: 0 };
    var dispName = stage === 'Implantação' ? 'Implantação/Ganho' : stage;
    var numCol = stage === 'Implantação' ? 'var(--green)' : 'var(--teal)';

    // Stage cell: número absoluto + rótulo (em até 2 linhas)
    labelsHtml +=
      '<div style="flex:' + FS + ';min-width:0;min-height:74px;text-align:center;padding:.5rem .1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem;cursor:pointer;' +
        (idx > 0 ? 'border-left:1px solid var(--border);' : '') + '"' +
        ' onclick="novoOpenFunnelStage(\'' + stage.replace(/'/g, "\\'") + '\')"' +
        ' onmouseover="this.style.background=\'var(--card2)\'"' +
        ' onmouseout="this.style.background=\'\'">' +
        '<div style="font-size:1.05rem;font-weight:800;color:' + numCol + ';line-height:1">' +
          s.count.toLocaleString('pt-BR') +
        '</div>' +
        '<div style="font-size:.66rem;font-weight:600;color:var(--text2);line-height:1.2;padding:0 .1rem">' +
          dispName +
        '</div>' +
      '</div>';

    // Conv cell vazia (a conversão agora vive sobre o gráfico)
    if (idx < n - 1) {
      labelsHtml += '<div style="flex:' + FC + ';min-width:0;min-height:74px;border-left:1px solid var(--border)"></div>';
    }
  });
  labelsHtml += '</div>';

  var pipeName  = _novoFunnelPipeline === 'combined' ? 'Vendas + Bid' : (_novoFunnelPipeline === 'bid' ? 'Bid' : 'Vendas');
  var totalPipe = _novoFunnelPipeline === 'combined' ? (data.total_vendas || 0) + (data.total_bid || 0) : (_novoFunnelPipeline === 'bid' ? data.total_bid : data.total_vendas);
  var footer =
    '<p style="font-size:.71rem;color:var(--muted);margin-top:.5rem;text-align:center">' +
      'Pipeline ' + pipeName + ' | desde ' + data.since + ' | ' +
      (totalPipe || 0).toLocaleString('pt-BR') + ' deals | ' +
      data.total_with_history.toLocaleString('pt-BR') + ' com histórico' +
    '</p>';

  area.innerHTML = chartBox + labelsHtml + footer;
}

// Tabela leve do funil (os deals do funil vêm da API só com hs_id/name/entered_date).
function _novoFunnelDealsTableHtml(deals) {
  var entLbl = NOVO_LANG==='en' ? 'Entered' : 'Entrou em';
  var rows = (deals || []).map(function(d) {
    var url = 'https://app.hubspot.com/contacts/44715285/deal/' + d.hs_id;
    return '<tr><td style="text-align:left"><a href="' + url + '" target="_blank" rel="noopener" ' +
      'style="color:var(--teal);text-decoration:none" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">' +
      _ne(d.name || d.hs_id) + '</a></td><td style="text-align:left;color:var(--text2)">' + _ne(d.entered_date || '—') + '</td></tr>';
  }).join('');
  return '<p style="font-size:.78rem;color:var(--text2);margin-bottom:.6rem">' + (deals || []).length + ' deal' + ((deals || []).length !== 1 ? 's' : '') + '</p>' +
    '<div style="overflow-y:auto;max-height:55vh"><table class="lb" style="width:100%;font-size:.82rem">' +
      '<thead><tr><th style="text-align:left">Deal</th><th style="text-align:left">' + entLbl + '</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div>';
}
// C06 | Modal do funil com filtro superior por ETAPA do funil. Um deal pode constar
// em várias etapas (passou por elas), então cada etapa lista suas próprias entradas.
var _novoFnSfData = {};      // {stage: [deals]}
var _novoFnSfStages = [];    // etapas do funil presentes, na ordem do funil
var _novoFnSfSel = null;     // etapa selecionada; null => todas
function _novoFnSfRender() {
  var totalAll = 0; _novoFnSfStages.forEach(function(s){ totalAll += (_novoFnSfData[s] || []).length; });
  var html = '<div style="margin-bottom:1.1rem;display:flex;flex-wrap:wrap;gap:.45rem;align-items:center">' +
    '<span style="font-size:.72rem;color:var(--text2);font-weight:600;min-width:54px">' + t('vf_by_stage') + '</span>' +
    '<button class="stage-chip' + (_novoFnSfSel==null?' active':'') + '" onclick="novoFnSfPick(\'__all\')">' + t('p08_all_stages') + ' <span class="chip-count">' + totalAll + '</span></button>';
  _novoFnSfStages.forEach(function(s, i){
    html += '<button class="stage-chip' + (_novoFnSfSel===s?' active':'') + '" onclick="novoFnSfPick(' + i + ')">' + _ne(s) + ' <span class="chip-count">' + ((_novoFnSfData[s] || []).length) + '</span></button>';
  });
  var ch = document.getElementById('novo-fnsf-chips'); if (ch) ch.innerHTML = html + '</div>';
  var list;
  if (_novoFnSfSel == null) { list = []; _novoFnSfStages.forEach(function(s){ list = list.concat(_novoFnSfData[s] || []); }); }
  else list = _novoFnSfData[_novoFnSfSel] || [];
  var tb = document.getElementById('novo-fnsf-table'); if (tb) tb.innerHTML = _novoFunnelDealsTableHtml(list);
}
function novoFnSfPick(i) {
  _novoFnSfSel = (i === '__all') ? null : _novoFnSfStages[i];
  _novoFnSfRender();
}
function _novoOpenFunnelStageFilterModal(title, stagesData, order, preStage) {
  _novoFnSfData = stagesData || {};
  var ord = order || Object.keys(_novoFnSfData);
  _novoFnSfStages = ord.filter(function(s){ return (_novoFnSfData[s] || []).length > 0; });
  _novoFnSfSel = (preStage != null && _novoFnSfStages.indexOf(preStage) !== -1) ? preStage : null;
  openModal(title, '<div id="novo-fnsf-chips"></div><div id="novo-fnsf-table"></div>');
  _novoFnSfRender();
}

// ── Info-button tooltip (JS-driven) ──────────────────────────────────────────
(function() {
  var tip = null;
  function _getTip() { return tip || (tip = document.getElementById('novo-tip')); }
  function _showTip(btn) {
    var el = _getTip(); if (!el) return;
    var text = btn.getAttribute('data-tip') || '';
    var code = btn.getAttribute('data-code') || '';
    el.querySelector('.nt-text').textContent = text;
    var codeEl = el.querySelector('.nt-code');
    codeEl.textContent = code;
    codeEl.style.display = code ? '' : 'none';
    el.classList.add('nt-show');
    var r = btn.getBoundingClientRect();
    var tw = el.offsetWidth, th = el.offsetHeight;
    var x = r.left + r.width / 2 - tw / 2;
    var y = r.bottom + 7;
    x = Math.max(8, Math.min(x, window.innerWidth - tw - 8));
    if (y + th > window.innerHeight - 8) y = r.top - th - 7;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
  }
  function _hideTip() { var el = _getTip(); if (el) el.classList.remove('nt-show'); }
  document.addEventListener('mouseover', function(e) {
    var btn = e.target && e.target.closest && e.target.closest('.novo-info-btn,[data-tip]');
    if (btn) _showTip(btn);
  });
  document.addEventListener('mouseout', function(e) {
    if (e.target && e.target.closest && e.target.closest('.novo-info-btn,[data-tip]')) _hideTip();
  });
  document.addEventListener('scroll', _hideTip, true);
})();

// ── Init ──────────────────────────────────────────────────────────────────────
// Fecha modal/drawers com a tecla Esc (fecha o overlay mais ao topo)
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Escape' && e.keyCode !== 27) return;
  var help  = document.getElementById('novo-help-drawer');
  var prob  = document.getElementById('novo-prob-drawer');
  var modal = document.getElementById('modal-overlay');
  if (help && help.classList.contains('open'))   { novoCloseHelp(); return; }
  if (prob && prob.classList.contains('open'))   { novoCloseProbEditor(); return; }
  if (modal && modal.classList.contains('open')) { closeModal(); return; }
});

document.addEventListener('DOMContentLoaded', function() {
  setContentBlur(false);

    document.body.classList.add('novo-info-on');
    var _bi = document.getElementById('btn-info-toggle');
    if (_bi) _bi.classList.add('highlighted');
  }
  _novoLoadUserKey();

  // Sticky header glass effect on scroll
  var _hdr = document.querySelector('.novo-hdr');
  window.addEventListener('scroll', function() {
    if (_hdr) _hdr.classList.toggle('scrolled', window.scrollY > 8);
  }, { passive: true });
});

<!-- Panel switcher + menu lateral compartilhado (fonte unica: PANELS) -->
<style>

<script>
(function(){

    {label:'Board View',url:'/novo-board',file:'board.html',health:'y',icon:'<path d="M2 20h20M4 20V10l8-6 8 6v10"/><path d="M10 20v-6h4v6"/>'},
    {label:'AE Performance',url:'/novo-ae',file:'ae.html',health:'y',icon:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'},

    {label:'Last 48h',url:'/novo-48h',file:'48h.html',health:'r',icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'},
    {label:'CS Dashboard',url:'/novo-cs',file:'cs.html',health:'r',icon:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>'},

  if(document.readyState!=='loading') build(); else document.addEventListener('DOMContentLoaded',build);
})();
