<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRO Dashboard | Axenya</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#171f2e;--card2:#1e2a3c;--border:#293a50;--text:#e6edf3;--text2:#8b949e;--muted:#6e7681;--teal:#3ab8b7;--green:#3fb950;--red:#f85149;--orange:#d29922;--yellow:#e3b341;--blue:#58a6ff;--hover:rgba(255,255,255,0.06);--even-s:#131b28;--hover-s:#1c2b40;--hdr-glass:rgba(13,17,23,.78)}
html[data-theme="light"]{--bg:#f6f8fa;--card:#ffffff;--card2:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#57606a;--teal:#0d7377;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--blue:#0969da;--hover:rgba(0,0,0,0.05);--even-s:#f1f4f8;--hover-s:#e8eef4;--hdr-glass:rgba(246,248,250,.82)}
body{background:var(--bg);color:var(--text);font-family:Inter,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5}
button,input,select,textarea{font-family:Inter,'Segoe UI',system-ui,sans-serif}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.15rem}

/* Buttons */
.hdr-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);border-radius:99px;cursor:pointer;transition:background .15s,color .15s;position:relative;flex-shrink:0}
.hdr-btn:hover{background:rgba(255,255,255,0.13);color:var(--text)}
html[data-theme="light"] .hdr-btn:hover{background:rgba(0,0,0,0.07)}
.hdr-btn.highlighted{background:var(--teal)!important;color:#fff!important;box-shadow:0 0 0 2px rgba(58,184,183,.3)}
.hdr-btn.highlighted:hover{filter:brightness(.88)}
[data-theme="light"] .hdr-btn.highlighted{color:#fff!important}
.hdr-btn[data-tooltip]::after{content:attr(data-tooltip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);font-size:.73rem;font-family:Inter,'Segoe UI',system-ui,sans-serif;font-weight:400;padding:.26rem .62rem;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300}
.hdr-btn[data-tooltip]:hover::after{opacity:1}
.hdr-sep{width:1px;height:16px;background:rgba(255,255,255,0.12);margin:0 2px;flex-shrink:0}
html[data-theme="light"] .hdr-sep{background:rgba(0,0,0,0.12)}
.hdr-actions{display:flex;align-items:center;background:rgba(255,255,255,0.09);border-radius:99px;padding:7px;gap:12px}
html[data-theme="light"] .hdr-actions{background:rgba(0,0,0,0.03)}
@keyframes hdr-spin{to{transform:rotate(360deg)}}
.hdr-btn.spinning svg{animation:hdr-spin .7s linear infinite}

/* Nav Drawer */
.nav-drawer{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--card);border-right:1px solid rgba(255,255,255,.08);z-index:1000;transition:left .25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.nav-drawer.open{left:0}
.nav-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s ease}
.nav-backdrop.open{opacity:1;pointer-events:auto}
.nav-drawer-header{display:flex;align-items:center;gap:.75rem;padding:1.1rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-drawer-brand{font-weight:600;font-size:1rem;color:var(--text);flex:1}
.nav-drawer-footer{margin-top:auto;display:flex;align-items:center;gap:.5rem;padding:.7rem .75rem;border-top:1px solid rgba(255,255,255,.08)}
html[data-theme="light"] .nav-drawer-footer{border-top-color:rgba(0,0,0,.1)}
.nav-foot-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;min-height:38px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;padding:.4rem;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;transition:border-color .15s,color .15s,background .15s}
.nav-foot-btn:hover{border-color:var(--teal);color:var(--text)}
.nav-menu{list-style:none;padding:.5rem 0;margin:0}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.25rem;cursor:pointer;font-size:.9rem;color:var(--text2);transition:background .15s,color .15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.nav-item.active{color:var(--teal);font-weight:500}
.nav-item.active svg{stroke:var(--teal)}
[data-theme="light"] .nav-drawer{background:var(--card);border-right-color:rgba(0,0,0,.1)}
[data-theme="light"] .nav-backdrop{background:rgba(0,0,0,.3)}
[data-theme="light"] .nav-item:hover{background:rgba(0,0,0,.04)}

/* Header */
.novo-hdr{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.25rem 2rem;background:transparent;position:sticky;top:0;z-index:100;transition:background .25s,backdrop-filter .25s,box-shadow .25s}
.novo-hdr.scrolled{background:var(--hdr-glass);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);box-shadow:0 1px 0 var(--border)}
.novo-theme-sun{display:block}.novo-theme-moon{display:none}
[data-theme="light"] .novo-theme-sun{display:none}[data-theme="light"] .novo-theme-moon{display:block}
.novo-lang-btn{width:auto !important;padding:0 9px;font-size:.71rem;font-weight:700;letter-spacing:.06em}

/* Cards */
.novo-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:1rem;padding-bottom:2rem}
.novo-card{background:var(--card);border-radius:10px;padding:1.25rem 1.5rem}
.novo-card-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.novo-card-header h3{font-size:.88rem;font-weight:600;color:var(--text);margin:0;flex:1}

/* Info button — oculto por padrão; revelado pelo toggle "?" (body.novo-info-on) */
.novo-info-btn{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--text2);background:none;color:var(--text2);font-size:.56rem;font-style:normal;font-weight:700;cursor:pointer;display:none;align-items:center;justify-content:center;position:relative;flex-shrink:0;padding:0;line-height:1}
body.novo-info-on .novo-info-btn{display:inline-flex}
/* Tag de identificação do gráfico (ex.: N01) — também alternada pelo "?" */
.novo-code-tag{display:none;align-items:center;font-size:.6rem;font-weight:700;letter-spacing:.04em;font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--teal);background:rgba(58,184,183,.14);border:1px solid rgba(58,184,183,.32);border-radius:5px;padding:.05rem .32rem;line-height:1.35;flex-shrink:0}
body.novo-info-on .novo-code-tag{display:inline-flex}
/* Info button tooltip (JS-driven via #novo-tip) */
#novo-tip{position:fixed;z-index:9999;background:rgba(23,31,46,.78);backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);border-radius:6px;padding:.45rem .7rem;width:278px;pointer-events:none;display:none;box-shadow:0 6px 20px rgba(0,0,0,.3)}
html[data-theme="light"] #novo-tip{background:rgba(246,248,250,.82)}
#novo-tip.nt-show{display:block}
#novo-tip .nt-text{font-size:.73rem;color:var(--text);font-weight:400;line-height:1.5;font-family:Inter,'Segoe UI',system-ui,sans-serif}
#novo-tip .nt-code{font-size:.62rem;font-weight:700;color:var(--teal);font-family:ui-monospace,Menlo,Consolas,monospace;margin-top:.3rem;padding-top:.28rem;border-top:1px solid rgba(255,255,255,.12);letter-spacing:.07em;opacity:1}
html[data-theme="light"] #novo-tip .nt-code{border-top-color:rgba(0,0,0,.1)}

/* Tab sub */
.tab-sub{display:inline-flex;background:var(--card2);border-radius:99px;padding:3px;gap:0;margin-bottom:1rem;position:relative}
.tab-sub-thumb{position:absolute;top:3px;height:calc(100% - 6px);border-radius:99px;background:rgba(255,255,255,.14);pointer-events:none;z-index:0;transition:left .22s cubic-bezier(.4,0,.2,1),width .22s cubic-bezier(.4,0,.2,1)}
html[data-theme="light"] .tab-sub-thumb{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tab-sub-btn{background:transparent;border:none;border-radius:99px;color:var(--text2);padding:.3rem .9rem;cursor:pointer;font-size:.75rem;font-weight:500;transition:color .18s;position:relative;z-index:1}
.tab-sub-btn:first-child{border-radius:99px}
.tab-sub-btn:last-child{border-radius:99px}
.tab-sub-btn.active{color:var(--text);font-weight:600}
.novo-card-header .tab-sub{margin-bottom:0}
.stage-chip{background:var(--card2);border:1px solid var(--border);border-radius:99px;color:var(--text2);padding:.34rem .82rem;cursor:pointer;font-size:.72rem;font-weight:700;font-family:inherit;transition:border-color .15s,color .15s,background .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:.35rem}
.stage-chip:hover{border-color:var(--teal);color:var(--text);box-shadow:0 0 0 2px rgba(58,184,183,.1)}
.stage-chip.active{background:rgba(58,184,183,.16);border-color:var(--teal);color:var(--teal);box-shadow:inset 0 0 0 1px rgba(58,184,183,.12)}
.stage-chip .chip-count{font-size:.62rem;opacity:.7;font-weight:500}
/* Seletor de data — calendário custom (substitui o picker nativo do SO) */
.dp-pop{position:absolute;top:calc(100% + 8px);right:0;z-index:300;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.5);padding:.85rem;width:268px;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .16s ease,transform .16s ease}
html[data-theme="light"] .dp-pop{box-shadow:0 16px 48px rgba(0,0,0,.18)}
.dp-pop.open{opacity:1;transform:translateY(0);pointer-events:auto}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.dp-title{font-size:.85rem;font-weight:600;color:var(--text);text-transform:capitalize}
.dp-nav{background:var(--card2);border:none;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;transition:background .15s,color .15s}
.dp-nav:hover{background:var(--teal);color:#fff}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dp-dow{font-size:.6rem;color:var(--text2);text-align:center;text-transform:uppercase;font-weight:700;padding:.15rem 0}
.dp-day{aspect-ratio:1;border:none;background:transparent;border-radius:8px;color:var(--text);font-size:.78rem;cursor:pointer;font-family:inherit;transition:background .12s,color .12s}
.dp-day:hover{background:var(--card2)}
.dp-day.sel{background:var(--teal);color:#fff;font-weight:700}
.dp-day.empty{visibility:hidden;cursor:default}
/* Badge da data selecionada ao lado do título (sticky) */
.hdr-date-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--card2);border:1px solid var(--border);border-radius:99px;padding:.3rem .75rem;font-size:.74rem;font-weight:600;color:var(--text2);white-space:nowrap}
.hdr-date-badge svg{opacity:.65;flex:none}
.hdr-date-badge b{color:var(--teal);font-weight:700}
@media (max-width:640px){.hdr-date-badge{display:none!important}}
/* Barra de filtros globais — pills refinados + month picker custom */
.flt-bar{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin:-.35rem 0 1rem;position:sticky;top:74px;z-index:90;background:linear-gradient(180deg,var(--bg) 0%,rgba(13,17,23,.92) 100%);padding:.7rem .2rem .75rem;border-bottom:1px solid var(--border);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
html[data-theme="light"] .flt-bar{background:linear-gradient(180deg,var(--bg) 0%,rgba(246,248,250,.92) 100%)}
.flt-pill{padding:.42rem .92rem;font-size:.74rem;border-radius:99px;border:1px solid var(--border);cursor:pointer;font-family:inherit;background:rgba(255,255,255,.035);color:var(--text2);font-weight:700;transition:border-color .15s,color .15s,background .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:.4rem;white-space:nowrap;min-height:34px}
html[data-theme="light"] .flt-pill{background:rgba(255,255,255,.65)}
.flt-pill:hover{border-color:var(--teal);color:var(--text);box-shadow:0 0 0 2px rgba(58,184,183,.12)}
.flt-pill.active{background:rgba(58,184,183,.16);border-color:var(--teal);color:var(--teal);box-shadow:inset 0 0 0 1px rgba(58,184,183,.15)}
.flt-pill svg{opacity:.7;flex:none}
.flt-pill.active svg{opacity:1}
.flt-wrap{position:relative;display:inline-flex}
.flt-div{width:1px;height:22px;background:var(--border);margin:0 .3rem}
/* Intervalo de meses: De · Até · Aplicar conectados como um filtro só */
.flt-group{display:inline-flex;align-items:stretch;border:1px solid var(--border);border-radius:99px;background:var(--card2)}
.flt-group .flt-pill{border:none;border-radius:0;background:transparent}
.flt-group > *:not(:last-child){border-right:1px solid var(--border)}
.flt-group > :first-child .flt-pill{border-top-left-radius:99px;border-bottom-left-radius:99px}
.flt-group > .flt-pill:last-child{border-top-right-radius:99px;border-bottom-right-radius:99px}
.flt-group .flt-pill.active{background:rgba(58,184,183,.16);color:var(--teal)}
.flt-group .flt-pill:last-child{color:var(--teal)}
.flt-group .flt-pill:last-child:hover{background:rgba(58,184,183,.12)}
.mp-pop{position:absolute;top:calc(100% + 8px);left:0;z-index:300;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.5);padding:.85rem;width:236px;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .16s ease,transform .16s ease}
html[data-theme="light"] .mp-pop{box-shadow:0 16px 48px rgba(0,0,0,.18)}
.mp-pop.open{opacity:1;transform:translateY(0);pointer-events:auto}
.mp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:.15rem}
.mp-cell{border:none;background:transparent;border-radius:9px;color:var(--text);font-size:.78rem;cursor:pointer;font-family:inherit;padding:.5rem .2rem;text-transform:capitalize;transition:background .12s,color .12s}
.mp-cell:hover{background:var(--card2)}
.mp-cell.sel{background:var(--teal);color:#fff;font-weight:700}
.impl-toggle{display:inline-flex;align-items:center;gap:.55rem;cursor:pointer;user-select:none;background:var(--card2);border:1px solid var(--border);border-radius:99px;padding:.4rem .8rem;font-size:.76rem;font-weight:600;color:var(--text2);font-family:inherit;transition:border-color .15s,color .15s}
.impl-toggle:hover{border-color:var(--teal);color:var(--text)}
.impl-toggle.on{color:var(--text)}
.impl-toggle .sw{width:34px;height:19px;border-radius:99px;background:var(--border);position:relative;transition:background .18s;flex:none}
.impl-toggle.on .sw{background:var(--teal)}
.impl-toggle .sw::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .18s}
.impl-toggle.on .sw::after{transform:translateX(15px)}
/* Tooltip externo de gráfico (donut C05) — fica acima de tudo com fundo em blur */
#novo-charttip{position:absolute;z-index:3000;pointer-events:none;transform:translate(-50%,calc(-100% - 12px));background:rgba(13,19,33,.66);backdrop-filter:blur(13px) saturate(1.5);-webkit-backdrop-filter:blur(13px) saturate(1.5);border:1px solid var(--border);border-radius:11px;padding:.5rem .75rem;font-size:.76rem;font-family:inherit;color:var(--text);opacity:0;transition:opacity .12s;box-shadow:0 12px 34px rgba(0,0,0,.45);max-width:260px;line-height:1.45}
#novo-charttip .ct-line{color:var(--text);font-weight:600;white-space:nowrap}
#novo-charttip .ct-foot{color:var(--text2);font-size:.66rem;margin-top:.25rem;white-space:normal}
html[data-theme="light"] #novo-charttip{background:rgba(255,255,255,.72);color:#0f172a;box-shadow:0 12px 34px rgba(15,23,42,.18)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:.75rem}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.kpi-row{grid-template-columns:1fr}}
.kpi-card{background:var(--card);border-radius:14px;padding:1.6rem 1.8rem;position:relative;transition:box-shadow .18s}
.kpi-card:hover{box-shadow:0 0 0 2px rgba(58,184,183,.35)}
.kpi-card--na{opacity:.5}
.kpi-label{font-size:.66rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-value{font-size:2rem;font-weight:800;line-height:1.1;margin:.35rem 0 .25rem;white-space:nowrap}
.kpi-sub{font-size:.7rem;color:var(--muted);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-row-sec{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:.5rem;margin-bottom:1.5rem}
.kpi-sec{background:var(--card2);border-radius:10px;padding:.9rem 1.1rem;transition:box-shadow .18s}
.kpi-sec:hover{box-shadow:0 0 0 2px rgba(58,184,183,.25)}
.kpi-sec--na{opacity:.45}
.kpi-sec-label{font-size:.62rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0;line-height:1}
.kpi-sec-value{font-size:1.15rem;font-weight:700;line-height:1.15;margin:.22rem 0 .15rem;word-break:break-all}
.kpi-sec-sub{font-size:.64rem;color:var(--muted);line-height:1.3}
.kpi-click{cursor:pointer}
.kpi-click:hover{box-shadow:0 0 0 2px rgba(58,184,183,.5)}

/* Skeleton */
@keyframes novo-shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
.novo-skel{background:linear-gradient(90deg,var(--card2) 25%,var(--hover) 50%,var(--card2) 75%);background-size:1600px 100%;animation:novo-shimmer 1.4s ease-in-out infinite}

/* Blur + nav docking */
#view-novo{transition:filter .25s ease,margin-left .25s cubic-bezier(0.4,0,0.2,1)}
body.nav-docked #view-novo{margin-left:280px}
@media(max-width:820px){body.nav-docked #view-novo{margin-left:0}}
.content-blur{filter:blur(4px);pointer-events:none;user-select:none}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s linear;backdrop-filter:blur(5px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:90vw;max-width:960px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .28s cubic-bezier(0.4,0,0.2,1);will-change:transform}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1rem;font-weight:600;color:var(--text)}
.modal-back{background:none;border:none;color:var(--text2);font-size:1rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px;transition:color .15s;display:none}
.modal-back:hover{color:var(--teal)}
.modal-back.visible{display:inline-flex;align-items:center;gap:.3rem}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px;transition:color .15s}
.modal-close:hover{color:var(--red)}
.modal-body{padding:1.2rem 1.5rem;overflow-y:auto;flex:1}
.btn-export{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:.3rem .7rem;font-size:.7rem;cursor:pointer;transition:border-color .12s,color .12s;margin-left:auto}
.btn-export:hover{border-color:var(--teal);color:var(--teal)}
table.lb{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
table.lb th{text-align:right;color:var(--teal);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0;padding:.6rem 1rem;border-bottom:2px solid var(--teal);white-space:nowrap;position:sticky;top:0;background:var(--card);z-index:2}
table.lb th:first-child{text-align:left}
table.lb td{padding:calc(.38rem + 0.4px) calc(.65rem + 0.4px) calc(.38rem + 0.4px) 1rem;border-bottom:1px solid var(--border);color:var(--text);text-align:right;font-variant-numeric:normal}
table.lb td:first-child{text-align:left;font-weight:600}
table.lb tbody tr{transition:background-color .12s}
table.lb tbody tr:nth-child(even) td{background:var(--even-s)}
table.lb tbody tr:hover td{background:var(--hover-s)}
table.lb tfoot td{font-weight:600;border-top:2px solid var(--border);position:sticky;bottom:0;background:var(--card);z-index:2}
.novo-card[draggable="true"]{cursor:grab}
.novo-card.dragging{opacity:.55;outline:2px dashed var(--teal);cursor:grabbing}

/* Settings drawer */
.novo-prob-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s ease}
.novo-prob-backdrop.open{opacity:1;pointer-events:auto}
.novo-prob-drawer{position:fixed;top:0;right:-380px;width:360px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:3001;display:flex;flex-direction:column;transition:right .28s cubic-bezier(0.4,0,0.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.25)}
.novo-prob-drawer.open{right:0}
.novo-prob-drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.novo-prob-drawer-hdr h3{margin:0;font-size:1.35rem;font-weight:600;color:var(--text)}
.novo-prob-body{flex:1;overflow-y:auto;padding:0 1.5rem}
.novo-prob-field{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border)}
.novo-prob-field label{flex:1;font-size:.9rem;color:var(--text)}
.novo-prob-field input{width:72px;text-align:right;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.35rem .5rem;font-size:.9rem;font-family:inherit}
.novo-prob-field input:focus{outline:none;border-color:var(--teal)}
.novo-prob-pct{font-size:.85rem;color:var(--text2);width:14px}
.novo-prob-drawer-ftr{display:flex;justify-content:center;gap:1rem;padding:1.25rem 1.5rem;border-top:1px solid var(--border);flex-shrink:0}
.novo-prob-cancel{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--card2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.novo-prob-cancel:hover{border-color:var(--text2);color:var(--text)}
.novo-prob-save{width:48px;height:48px;border-radius:50%;border:none;background:var(--teal);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.novo-prob-save:hover{background:#2ea5a4}

/* Help drawer (desliza da direita, desfoca o fundo) */

<script>
// ── Tema ──────────────────────────────────────────────────────────────────────
(function(){
  var stored = localStorage.getItem('axenya_theme') || 'dark';
  if (stored === 'light') document.documentElement.setAttribute('data-theme','light');
})();
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('axenya_theme', next);
  if (_novoDeals) novoRender();
}

// ── Auth / Logout ─────────────────────────────────────────────────────────────
function doLogout() { window.location.href = '/login.html'; }

// ── Blur ──────────────────────────────────────────────────────────────────────
function setContentBlur(on) {
  var el = document.getElementById('view-novo');
  if (el) el.classList.toggle('content-blur', on);
}

// ── Nav Drawer ────────────────────────────────────────────────────────────────
// Modo "docked": o menu fica aberto e empurra o conteúdo (sem backdrop bloqueando).
// Em telas estreitas (<=820px) ele volta a sobrepor o conteúdo com backdrop.
function _setNavOpen(open) {
  document.getElementById('nav-drawer').classList.toggle('open', open);
  document.body.classList.toggle('nav-docked', open);
  var narrow = window.matchMedia('(max-width:820px)').matches;
  document.getElementById('nav-backdrop').classList.toggle('open', open && narrow);
  try { localStorage.setItem('nav_open', open ? 'true' : 'false'); localStorage.setItem('novo_nav_open', open ? 'true' : 'false'); } catch(e) {}
}
function openDrawer()  { _setNavOpen(true); }
function closeDrawer() { _setNavOpen(false); setContentBlur(false); }
function toggleDrawer() {
  _setNavOpen(!document.getElementById('nav-drawer').classList.contains('open'));
}

// ── Modal ─────────────────────────────────────────────────────────────────────
var modalStack = [];
function openModal(title, bodyHtml) {
  setContentBlur(true);
  var _ct = document.getElementById('novo-charttip'); if (_ct) _ct.style.opacity = '0';
  var overlay = document.getElementById('modal-overlay');
  if (overlay.classList.contains('open')) {
    modalStack.push({ title: document.getElementById('modal-title').textContent, body: document.getElementById('modal-body').innerHTML });
  }
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  _novoApplyModalTableTips();
  document.getElementById('modal-back').classList.toggle('visible', modalStack.length > 0);
  var hasLb = document.getElementById('modal-body').querySelector('table.lb');
  var headerBtn = document.querySelector('#modal-overlay .btn-export');
  if (headerBtn) headerBtn.style.display = hasLb ? 'none' : '';
  overlay.classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  var headerBtn = document.querySelector('#modal-overlay .btn-export');
  if (headerBtn) headerBtn.style.display = '';
  modalStack = [];
  document.getElementById('modal-back').classList.remove('visible');
  setContentBlur(false);
}
function modalGoBack() {
  if (!modalStack.length) return;
  var prev = modalStack.pop();
  document.getElementById('modal-title').textContent = prev.title;
  document.getElementById('modal-body').innerHTML = prev.body;
  _novoApplyModalTableTips();
  document.getElementById('modal-back').classList.toggle('visible', modalStack.length > 0);
  document.getElementById('modal-body').scrollTop = 0;
}
function _novoTableHeaderTip(label) {
  var k = String(label || '').trim().toLowerCase();
  var tips = {
    'deal':'Nome do negócio no HubSpot', 'ae':'Executivo responsável', 'pipe':'Pipeline de origem do negócio', 'pipeline':'Pipeline de origem do negócio',
    'etapa':'Etapa atual do negócio', 'stage':'Current deal stage', 'vidas':'Quantidade de vidas do negócio', 'arr':'ARR estimado do negócio',
    'arr est. (r$)':'ARR estimado do negócio', '1ª fatura (r$)':'Primeira fatura usada em cálculos de receita', 'dt. receita':'Data prevista para início de receita',
    'rev. date':'Expected revenue date', 'data usada | origem':'Data efetivamente usada no cálculo do card', 'fechamento':'Data de fechamento do negócio',
    'close date':'Deal close date', 'p. ajust.':'Probabilidade final usada no cálculo', 'prob.':'Probabilidade usada no cálculo',
    'p. etapa':'Probabilidade padrão da etapa', 'prob ae':'Probabilidade informada pelo AE', 'bdr':'BDR/origem do negócio',
    'últ. atividade':'Data da última atividade/nota registrada', 'last activity':'Last activity/note date', 'dias sem atividade':'Dias desde a última atividade/nota',
    'days no activity':'Days since last activity/note', 'dias':'Dias no funil ou no recorte indicado', 'receita real':'Receita mensal real calculada pela fórmula do Forecast',
    'receita probabilizada':'Receita real × probabilidade final ajustada', 'monthly rev calc.':'Monthly revenue used in the calculation', 'receita mensal calc.':'Receita mensal usada no cálculo'
  };
  return tips[k] || ('Coluna: ' + label);
}
function _novoApplyModalTableTips() {
  var body = document.getElementById('modal-body');
  if (!body) return;
  body.querySelectorAll('table th').forEach(function(th){
    var text = th.textContent.replace(/\s+/g,' ').trim();
    if (text) th.setAttribute('title', _novoTableHeaderTip(text));
  });
}
function exportModalCSV() {
  var title = document.getElementById('modal-title').textContent;
  var body  = document.getElementById('modal-body');
  var table = body.querySelector('table');
  if (!table) return;
  var rows = [];
  table.querySelectorAll('tr').forEach(function(tr) {
    var cells = [];
    tr.querySelectorAll('th,td').forEach(function(cell) {
      var v = cell.textContent.trim().replace(/"/g,'""');
      cells.push('"' + v + '"');
    });
    rows.push(cells.join(','));
  });
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows.join('\n'));
  a.download = (title||'export').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40) + '-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function exportFullLayout() {
  if (!_novoDeals) { alert('Carregue os dados primeiro.'); return; }
  var rows = [['Deal','AE','Pipeline','Etapa','Dias','Colaboradores','Vidas','1ª Fatura','ARR Estimado','Modelo','Agenciamento','Vitalício','Prob AE','P. Etapa','P. Ajust.','Quarter','Dt. Receita']];
  _novoDeals.forEach(function(d) {
    var pi = _calcProbInfo(d);
    rows.push([
      d.dealname||'', d.ae||'', d.pipeline||'', d.stage||'',
      d.dias_no_pipe!=null?d.dias_no_pipe:'', d.colaboradores!=null?d.colaboradores:'', d.vidas!=null?d.vidas:'',
      d.primeira_fatura!=null?d.primeira_fatura:'', d.arr_estimado!=null?d.arr_estimado:'', d.modelo_remuneracao||'',
      d.possui_agenciamento===true?'Sim':d.possui_agenciamento===false?'Não':'',
      d.possui_vitalicio===true?'Sim':d.possui_vitalicio===false?'Não':'',
      d.probabilidade!=null?(d.probabilidade*100).toFixed(1)+'%':'',
      pi.sp!=null?(pi.sp*100).toFixed(1)+'%':'',
      pi.final!=null?(pi.final*100).toFixed(1)+'%':'',
      d.quarter||'', d.data_prevista_para_receita||''
    ]);
  });
  var csv = rows.map(function(r){ return r.map(function(c){ return '"'+(String(c).replace(/"/g,'""'))+'"'; }).join(','); }).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,﻿' + encodeURIComponent(csv);

  a.click();

  document.getElementById('novo-prob-backdrop').classList.remove('open');
  document.getElementById('novo-prob-drawer').classList.remove('open');
  setContentBlur(false);
}
function novoSaveProbEditor() {
  var parse = function(id) { return parseFloat(document.getElementById(id).value.replace(',', '.')); };
  var v = { cot: parse('np-cot'), pro: parse('np-pro'), con: parse('np-con'), neg: parse('np-neg'),
            imp: parse('np-imp'), gan: parse('np-gan'), stb: parse('np-stb'), dia: parse('np-dia') };
  var list = [v.cot, v.pro, v.con, v.neg, v.imp, v.gan, v.stb, v.dia];
  if (list.some(isNaN)) { alert('Preencha todos os campos com valores numéricos.'); return; }
  if (list.some(function(n) { return n < 0 || n > 100; })) { alert('Probabilidades devem estar entre 0 e 100.'); return; }
  NOVO_STAGE_PROB['Cotação']          = v.cot / 100;
  NOVO_STAGE_PROB['Proposta Enviada'] = v.pro / 100;
  NOVO_STAGE_PROB['Consultoria']      = v.con / 100;
  NOVO_STAGE_PROB['Negociação']       = v.neg / 100;
  NOVO_STAGE_PROB['Implantação']      = v.imp / 100;
  NOVO_STAGE_PROB['Ganho']            = v.gan / 100;
  NOVO_STAGE_PROB['Standby']          = v.stb / 100;
  NOVO_STAGE_PROB['Stand by']         = v.stb / 100;
  NOVO_STAGE_PROB['Diagnóstico']      = v.dia / 100;
  try { localStorage.setItem('novo_stage_prob', JSON.stringify(NOVO_STAGE_PROB)); } catch(e) {}

  // Meta de Receita (MTD) — aceita vazio (= sem meta). Formato pt-BR: '.' milhar, ',' decimal.
  var metaRaw = document.getElementById('np-meta').value.replace(/[^\d.,]/g, '').replace(/\./g, '').replace(',', '.');
  if (metaRaw === '') {
    NOVO_META_MTD = 0;
  } else {
    var metaVal = parseFloat(metaRaw);
    if (isNaN(metaVal) || metaVal < 0) { alert('Meta inválida. Use um valor numérico (ex: 500.000).'); return; }
    NOVO_META_MTD = metaVal;
  }
  try { localStorage.setItem('novo_meta_mtd', String(NOVO_META_MTD)); } catch(e) {}

  novoCloseProbEditor();
  novoRender();
}

function _calcProbInfo(d) {
  var sp = NOVO_STAGE_PROB[d.stage];
  if (sp == null) return { sp: null, cp: null, final: null };
  var cp = d.probabilidade;
  if (cp == null) return { sp: sp, cp: null, final: sp };
  if (cp <= sp - 0.3) return { sp: sp, cp: cp, final: sp * 0.9 };
  if (cp >= sp + 0.3) return { sp: sp, cp: cp, final: sp * 1.1 };
  return { sp: sp, cp: cp, final: sp };
}

function _novoSortVal(d, col) {
  switch(col) {
    case 0:  return (d.dealname||'').toLowerCase();
    case 1:  return (d.ae||'').toLowerCase();
    case 2:  return (d.pipeline||'').toLowerCase();
    case 3:  return (d.stage||'').toLowerCase();
    case 4:  return (d.close_date||'').slice(0,10);
    case 5:  return d.dias_no_pipe;
    case 6:  return d.colaboradores;
    case 7:  return d.vidas;
    case 8:  return d.primeira_fatura;
    case 9:  return d.arr_estimado;
    case 10: return (d.modelo_remuneracao||'').toLowerCase();
    case 11: return d.possui_agenciamento === true ? 1 : d.possui_agenciamento === false ? 0 : null;
    case 12: return d.possui_vitalicio   === true ? 1 : d.possui_vitalicio   === false ? 0 : null;
    case 13: return d.probabilidade;
    case 14: return _calcProbInfo(d).sp;
    case 15: return _calcProbInfo(d).final;
    case 16: return (d.quarter||'').toLowerCase();
    case 17: return d.data_prevista_para_receita||'';
    case 18: return (d.sdr||'').toLowerCase();
    case 19: return d.ultima_atividade||'';
    case 20: return _novoWonDateInfo(d).date||'';
    case 21: return d.dias_sem_atividade;
    case 22: return d.data_ganho||'';
    case 23: return d.data_implantacao||'';
    case 24: return _annualRev(d)/12;
    default: return null;
  }
}

function novoSortDeals(col) {
  if (_novoModalSort.col === col) { _novoModalSort.dir *= -1; }
  else { _novoModalSort.col = col; _novoModalSort.dir = 1; }
  for (var i = 0; i < 21; i++) {
    var ind = document.getElementById('ndsi-'+i);
    if (ind) ind.textContent = i === col ? (_novoModalSort.dir === 1 ? ' ↑' : ' ↓') : '';
  }
  var dir = _novoModalSort.dir;
  var sorted = _novoModalDeals.slice().sort(function(a,b) {
    var va = _novoSortVal(a,col), vb = _novoSortVal(b,col);
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return va.localeCompare(vb) * dir;
    return (va - vb) * dir;
  });
  var tbody = document.getElementById('novo-deals-tbody');
  var rowsFn = _novoModalRowsFn || _novoDealsRows;
  if (tbody) tbody.innerHTML = rowsFn(sorted);
}

// S04 (Taxa de Reunião): deals criados em "Reunião Agendada" (pipeline Vendas) que avançaram
// para "Diagnóstico". Usa os conjuntos de IDs por etapa do /api/funnel-stages (_novoFunnelData).
// Tracked = entraram em Reunião Agendada; Occurred = também entraram em Diagnóstico (interseção);
// No-show = entraram em RA mas nunca chegaram a Diagnóstico; Rate = Occurred ÷ Tracked.
function _novoMeetingStats() {
  var fd = _novoFunnelData;
  if (!fd || !fd.vendas || !fd.vendas.stages) return null;
  var byStage = {};
  fd.vendas.stages.forEach(function(s){ byStage[s.stage] = s; });
  var ra = byStage['Reunião Agendada'];
  if (!ra) return null;
  var di = byStage['Diagnóstico'];
  var raDeals = ra.deals || [];
  var diIds = {};
  (di && di.deals ? di.deals : []).forEach(function(d){ diIds[d.hs_id] = true; });
  var occurredDeals = raDeals.filter(function(d){ return diIds[d.hs_id]; });
  var noshowDeals   = raDeals.filter(function(d){ return !diIds[d.hs_id]; });
  var tracked = raDeals.length, occurred = occurredDeals.length;
  return {
    tracked: tracked, occurred: occurred, noshow: noshowDeals.length,
    rate: tracked > 0 ? Math.round(occurred / tracked * 100) : null,
    occurredDeals: occurredDeals, noshowDeals: noshowDeals, trackedDeals: raDeals,
  };
}
function _novoOpenMeetingModal() {
  var m = _novoMeetingStats();

    }).join('');

function novoKpiDrill(key) {
  if (key === 'kpi2-meeting') { _novoOpenMeetingModal(); return; }
  var d = _novoKpiDrill[key];
  if (!d || !d.deals || !d.deals.length) return;
  if (key === 'kpi-lost-vidas') { _novoOpenLostModal(d); return; }
  if (key === 'kpi-weighted-vidas') { _novoOpenWeightedVidasModal(d); return; }
  if (key === 'kpi2-stale') { openModal(t('kpi2_stale_label'), _novoStaleStatsHtml(d.deals, d.totalOpen) + _novoDealsTableHtml(d.deals)); return; }
  if (key === 'kpi2-momentum') { openModal(t('kpi2_momentum_label'), _novoMomentumStatsHtml(d.deals, d.prevDeals) + _novoDealsTableHtml(d.deals)); return; }
  var title = (d.label || '').replace(/^(?:🟡|🟢|🟠|🔴) /, '');
  var stats = '';
  if (key === 'kpi-won-annual') stats = _novoKpiStatsHtml(d.deals);
  else if (key === 'kpi-won-vidas') stats = _novoKpiStatsHtml(d.deals);
  else if (key === 'kpi-weighted-pipe') stats = _novoP03StatsHtml() + _novoStageSummaryHtml(d.deals);
  if (key === 'kpi-revenue-mtd') { openModal(title, stats + _novoP01DealsHtml(d.deals)); return; }
  if (key === 'kpi-pipe-vidas') { openModal(title, _novoP05StatsHtml(d.deals) + _novoDealsTableHtml(d.deals)); return; }
  openModal(title, stats + _novoDealsTableHtml(d.deals));
}

var _novoCharts = {};
function _novoTheme() {
  var s = getComputedStyle(document.documentElement);
  var isLight = document.documentElement.getAttribute('data-theme') === 'light';
  return {
    cText:  s.getPropertyValue('--text').trim()  || '#e6edf3',
    cText2: s.getPropertyValue('--text2').trim() || '#8b949e',
    cGrid:  isLight ? 'rgba(0,0,0,.08)' : 'rgba(255,255,255,.06)',
    isLight: isLight
  };
}
function _novoMkChart(id, cfg) {
  var canvas = document.getElementById(id);
  if (!canvas) return null;
  if (typeof Chart !== 'undefined') { Chart.defaults.font.family = NOVO_FONT; Chart.defaults.font.size = 12; }
  if (_novoCharts[id]) { try { _novoCharts[id].destroy(); } catch(e) {} }
  _novoPruneZeroBars(cfg);
  _novoCharts[id] = new Chart(canvas, cfg);
  canvas.style.cursor = 'pointer';
  return _novoCharts[id];
}
function _novoPruneZeroBars(cfg) {
  if (!cfg || cfg.type !== 'bar' || !cfg.data || !cfg.data.labels || !cfg.data.datasets) return;
  var hasNonBarDataset = cfg.data.datasets.some(function(ds){ return ds.type && ds.type !== 'bar'; });
  if (hasNonBarDataset) return;
  var labels = cfg.data.labels, keep = [];
  for (var i=0; i<labels.length; i++) {
    var total = 0, hasValue = false;
    cfg.data.datasets.forEach(function(ds){ var v = ds.data ? ds.data[i] : null; if (v != null && !isNaN(v)) { total += Math.abs(Number(v)); hasValue = true; } });
    if (hasValue && total > 0) keep.push(i);
  }
  if (keep.length === labels.length) return;
  if (cfg.options && typeof cfg.options.onClick === 'function') {
    var originalOnClick = cfg.options.onClick;
    cfg.options.onClick = function(evt, elems, chart) {
      var mapped = (elems || []).map(function(el){ var clone = Object.create(el); clone.index = keep[el.index]; return clone; });
      return originalOnClick.call(this, evt, mapped, chart);
    };
  }
  function prunedArray(arr) {
    if (!Array.isArray(arr)) return arr;
    return keep.map(function(i){ return arr[i]; });
  }
  cfg.data.labels = prunedArray(labels);
  cfg.data.datasets.forEach(function(ds){
    ds.data = prunedArray(ds.data);
    ['backgroundColor','borderColor','hoverBackgroundColor','pointBackgroundColor'].forEach(function(k){ if (Array.isArray(ds[k])) ds[k] = prunedArray(ds[k]); });
  });
}
function _setActive(containerId, mode) {
  var c = document.getElementById(containerId);
  if (!c) return;
  c.querySelectorAll('.tab-sub-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-mode') === mode); });
  _moveTabSubThumb(c, true);
}
function _moveTabSubThumb(sub, animate) {
  var thumb = sub && sub.querySelector('.tab-sub-thumb');
  if (!thumb) return;
  var active = sub.querySelector('.tab-sub-btn.active');
  if (!active) { thumb.style.opacity = '0'; thumb.style.width = '0px'; return; }
  thumb.style.opacity = '';
  if (!animate) thumb.style.transition = 'none';
  thumb.style.left = active.offsetLeft + 'px';
  thumb.style.width = active.offsetWidth + 'px';
  if (!animate) { void thumb.offsetWidth; thumb.style.transition = ''; }
}
function _initTabSubs() {
  document.querySelectorAll('.tab-sub').forEach(function(sub) {
    if (!sub.querySelector('.tab-sub-thumb')) {
      var th = document.createElement('div');
      th.className = 'tab-sub-thumb';
      sub.insertBefore(th, sub.firstChild);
    }
    _moveTabSubThumb(sub, false);
  });
}

// ── Filtro global (híbrido por desfecho) ────────────────────────────────────────

// Eixos de série temporal — seguem o filtro quando ativo; senão lookback padrão.
function _novoMonthAxis(forward) {
  var out = [];
  if (_novoFilter.start) {
    var s = new Date(_novoFilter.start+'T00:00:00'), e = new Date(_novoFilter.end+'T00:00:00');
    var y = s.getFullYear(), m = s.getMonth();
    while (y < e.getFullYear() || (y === e.getFullYear() && m <= e.getMonth())) {
      out.push(y+'-'+String(m+1).padStart(2,'0')); m++; if (m>11){ m=0; y++; }
    }
  } else {
    var now = new Date();
    if (forward) { for (var j=0; j<12; j++) { var f=new Date(now.getFullYear(), now.getMonth()+j, 1); out.push(f.getFullYear()+'-'+String(f.getMonth()+1).padStart(2,'0')); } }
    else { for (var i=11; i>=0; i--) { var d=new Date(now.getFullYear(), now.getMonth()-i, 1); out.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')); } }
  }

}
function _novoWeekAxis() {

  function push(mon){ var sun=new Date(mon.getTime()); sun.setDate(sun.getDate()+6); weeks.push({ key:_wfYmd(mon), label:_wfDM(mon)+'–'+_wfDM(sun) }); }
  if (_novoFilter.start) {
    var s = new Date(_novoFilter.start+'T00:00:00'), sd = s.getDay();
    var mon = new Date(s.getFullYear(), s.getMonth(), s.getDate()+(sd===0?-6:1-sd));
    var end = new Date(_novoFilter.end+'T00:00:00').getTime();

    var thisMon = new Date(now.getFullYear(), now.getMonth(), now.getDate()+(wd===0?-6:1-wd));

}

function _novoCardOrderKey() { return 'novo_card_order_v1_' + (_novoUserKey || 'local'); }

function _novoCardSection(card) {

    if (n.classList && n.classList.contains('section-hdr')) {
      var h = n.querySelector('h2');

    }
    n = n.previousElementSibling;

function _novoLoadCardOrder() { try { return JSON.parse(localStorage.getItem(_novoCardOrderKey()) || '{}'); } catch(e) { return {}; } }
function _novoSaveCardOrder() {
  var out = {};
  document.querySelectorAll('.novo-cards .novo-card').forEach(function(card){
    var sec = _novoCardSection(card), key = _novoCardKey(card);
    if (!key) return;
    if (!out[sec]) out[sec] = [];
    out[sec].push(key);
  });
  try { localStorage.setItem(_novoCardOrderKey(), JSON.stringify(out)); } catch(e) {}

function _novoApplyCardOrder() {
  var saved = _novoLoadCardOrder();
  var grid = document.querySelector('.novo-cards');
  if (!grid) return;
  var headers = Array.prototype.slice.call(grid.querySelectorAll('.section-hdr'));
  function sectionCards(sec) {
    return Array.prototype.slice.call(grid.querySelectorAll('.novo-card')).filter(function(card){ return _novoCardSection(card) === sec; });
  }
  headers.forEach(function(header){
    var h = header.querySelector('h2');
    var sec = h ? h.textContent.trim() : '__section__';
    var order = saved[sec];
    if (!order || !order.length) return;
    var cards = sectionCards(sec);
    var map = {}; cards.forEach(function(c){ map[_novoCardKey(c)] = c; });
    var nextHeader = header.nextElementSibling;
    while (nextHeader && !(nextHeader.classList && nextHeader.classList.contains('section-hdr'))) nextHeader = nextHeader.nextElementSibling;
    order.forEach(function(key){ if (map[key]) grid.insertBefore(map[key], nextHeader || null); });
  });
}
function _novoInitCardReorder() {
  var grid = document.querySelector('.novo-cards');
  if (!grid) return;
  _novoApplyCardOrder();
  var dragging = null;
  Array.prototype.slice.call(grid.querySelectorAll('.novo-card')).forEach(function(card){
    card.setAttribute('draggable','true');
    card.addEventListener('dragstart', function(){ dragging = card; card.classList.add('dragging'); });
    card.addEventListener('dragend', function(){ card.classList.remove('dragging'); dragging = null; _novoSaveCardOrder(); });
  });
  grid.addEventListener('dragover', function(e){
    if (!dragging) return;
    e.preventDefault();
    var target = e.target.closest('.novo-card');
    if (!target || target === dragging || target.parentNode !== grid) return;
    var r = target.getBoundingClientRect();
    var before = e.clientY < r.top + r.height / 2;
    grid.insertBefore(dragging, before ? target : target.nextSibling);
  });
}

// helper: 'YYYY-MM' → 'Mar/25'
function _mlbl(ym) {
  var p = ym.split('-');
  return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(p[1])-1] + '/' + p[0].slice(2);
}
// helper: date filter by window mode
function _windowFilter(d, mode) {
  if (!d.createdate) return false;
  if (!_novoInWin(d.createdate)) return false;
  var age = (new Date().getTime() - new Date(d.createdate).getTime()) / 86400000;
  if (mode === 'last30') return age <= 30;
  if (mode === 'last90') return age <= 90;
  return true;
}
// helper: risk score for a deal
function _riskScore(d) {
  var score = 0;
  score += (d.vidas || 0) / 500;
  score += (d.arr_estimado || 0) / 500000;
  score += (d.dias_no_pipe || 0) / 30;
  var earlyStages = ['Diagnóstico','Cotação'];
  if (earlyStages.indexOf(d.stage) >= 0) score += 2;
  if (!d.arr_estimado) score += 1;
  if (!d.vidas) score += 0.5;
  return Math.round(score * 10) / 10;
}

// ── N06: Cohort Maturity ───────────────────────────────────────────────────────
// N06: curva de maturidade por coorte (mês de criação). Para cada coorte, % do total
// que atingiu o desfecho selecionado (Perdido ou Ganho) por mês desde a criação.
// Pisos de confiabilidade: coorte precisa ter idade >= MIN_AGE meses e n >= MIN_N.
var _COHORT_MONTHS_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function _cohortLabel(cm){ var p=cm.split('-'); return _COHORT_MONTHS_PT[parseInt(p[1])-1]+' '+p[0].slice(2); }
function buildNovoCohortMaturity() {
  var th = _novoTheme();
  var MAX_M = 6, MIN_AGE = 1, MIN_N = 1;
  var metric = _novoCohortMetric==='lives' ? 'lives' : 'deals';
  var weightOf = function(d){ return metric==='lives' ? (d.vidas||0) : 1; };
  var isOutcome = _novoCohortOutcome==='won'
    ? function(d){ return _novoIsWon(d); }
    : function(d){ return _novoIsWon(d) || d.stage==='Perdido'; };
  // N01: considera apenas coortes a partir de set/2025 (mais histórico).
  var COHORT_MIN_MONTH = '2025-09';
  var byM = {};
  (_novoDeals||[]).forEach(function(d){ if(!d.createdate || !_novoInWin(d.createdate)) return; var cm=d.createdate.substring(0,7); if(cm < COHORT_MIN_MONTH) return; (byM[cm]=byM[cm]||[]).push(d); });
  var now = new Date();
  var colors = ['rgba(58,184,183,1)','rgba(88,166,255,1)','rgba(147,112,219,1)','rgba(63,185,80,1)','rgba(210,153,34,1)','rgba(248,81,73,1)','rgba(227,179,65,1)','rgba(110,118,129,1)','rgba(247,129,102,1)'];
  var datasets = [], usedKeys = [], ci = 0;
  Object.keys(byM).sort().forEach(function(cm){
    var deals = byM[cm];
    if (deals.length < MIN_N) return;                    // piso de amostra
    var cd = new Date(cm+'-01');
    var ageM = Math.floor((now-cd)/(30.44*86400000));
    if (ageM < MIN_AGE) return;                          // piso de maturidade
    var total = deals.reduce(function(s,d){ return s+weightOf(d); }, 0);
    if (total === 0) return;
    var pts = [];
    for (var m=0; m<=MAX_M; m++) {
      if (m > ageM) { pts.push(null); continue; }
      var monthEnd = new Date(cd.getTime()); monthEnd.setMonth(monthEnd.getMonth()+m+1);
      var acc = 0;
      deals.forEach(function(d){
        if (!isOutcome(d) || !d.close_date) return;
        var cdd = Date.parse(d.close_date+'T00:00:00');
        if (!isNaN(cdd) && cdd < monthEnd.getTime()) acc += weightOf(d);
      });
      pts.push(+(acc/total*100).toFixed(1));
    }
    var color = colors[ci%colors.length]; ci++;
    var unit = metric==='lives' ? _ni(total)+' vidas' : deals.length+' deals';
    datasets.push({ label:_cohortLabel(cm)+' ('+unit+')', data:pts, borderColor:color, backgroundColor:color,
      borderWidth:2, tension:0.3, pointRadius:3, pointHoverRadius:6, fill:false, spanGaps:false });
    usedKeys.push(cm);
  });
  var labels = []; for (var l=0; l<=MAX_M; l++) labels.push('Mês '+l);
  var outLbl = _novoCohortOutcome==='won' ? t('lbl_won') : t('lbl_all_outcomes');
  _novoMkChart('chart-novo-cohort', { type:'line', plugins:[ChartDataLabels],
    data:{ labels:labels, datasets:datasets },
    options:{ responsive:true, plugins:{ legend:{display:true,labels:{color:th.cText2,font:{family:NOVO_FONT,size:10},boxWidth:18,usePointStyle:true}},
      datalabels:{ display:false },
      tooltip:{ callbacks:{ label:function(c){ return c.dataset.label+': '+(c.parsed.y==null?'—':c.parsed.y+'%'); } } } },
      scales:{ x:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT}},title:{display:true,text:t('cohort_x'),color:th.cText2,font:{family:NOVO_FONT,size:10}}},
        y:{min:0,max:100,grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},callback:function(v){return v+'%';}},title:{display:true,text:'% '+outLbl,color:th.cText2,font:{family:NOVO_FONT,size:10}}} },
      onClick:function(e,el){ if(!el.length)return; var cm=usedKeys[el[0].datasetIndex];
        var coCats=usedKeys.map(_cohortLabel);
        var coBy={}; usedKeys.forEach(function(k){ coBy[_cohortLabel(k)]=byM[k]||[]; });
        novoOpenDealsLabelFilterModal(NOVO_LANG==='en'?'Cohort':'Coorte', NOVO_LANG==='en'?'Cohort':'Coorte', coCats, coBy, _cohortLabel(cm)); } } });
}

// ── N06B: Forecast dinâmico (pipe atual "parado" vs projeção "com o tempo") ──
// Base histórica: deals criados a partir de set/2025 (NOVO_FC_B_FLOOR).
// Linha A (azul) = pipe atual congelado (= N06, visão ingênua).
// Linha B (verde) = pipe atual DESCONTANDO deals vencidos + NOVOS negócios
// (conversão assumida, espalhada pela curva real de fechamento). Premissas no modal.
var _novoForecastModelBLast = null;
var NOVO_FC_B_FLOOR = '2025-09';    // base histórica (mês de criação)
var NOVO_FC_B_CONVERSION = 0.04;    // PREMISSA de conversão dos novos negócios (editável)
var NOVO_FC_B_STALE_FLOOR = 0.25;   // piso de desconto para deals vencidos
function _novoFcBMonthDiff(a,b){
  if(!a||!b) return NaN;
  var x=a.split('-'), y=b.split('-');
  return (parseInt(y[0],10)-parseInt(x[0],10))*12 + (parseInt(y[1],10)-parseInt(x[1],10));
}
function _novoForecastBModel() {
  var now = new Date();
  var nowYM = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  function cm(d){ return d.createdate ? d.createdate.substring(0,7) : null; }
  // base histórica: criados a partir de set/2025
  var base = (_novoDeals || []).filter(function(d){ var c=cm(d); return c && c >= NOVO_FC_B_FLOOR; });

  // Curva de fechamento: tempo (meses) entre criação e ganho, dos deals ganhos.
  var JMAX = 12;
  var hist=[]; for (var i=0;i<=JMAX;i++) hist[i]=0;
  var winN=0;
  base.forEach(function(d){
    if (!_novoIsWon(d) || !d.close_date) return;
    var j=_novoFcBMonthDiff(cm(d), d.close_date.substring(0,7));
    if (isNaN(j)||j<0) j=0; if (j>JMAX) j=JMAX;
    hist[j]+=1; winN++;
  });
  var f=[];
  if (winN >= 5) { for (var a=0;a<=JMAX;a++) f[a]=hist[a]/winN; }
  else { for (var a0=0;a0<=JMAX;a0++) f[a0]=(a0<=3?0.25:0); }   // fallback: poucos ganhos → 0–3 meses
  var Fcum=[], acc=0;
  for (var b=0;b<=JMAX;b++){ acc+=f[b]; Fcum[b]=acc>1?1:acc; }
  function pctl(p){ var t=0; for (var k=0;k<=JMAX;k++){ t+=f[k]; if (t>=p) return k; } return JMAX; }
  var p75=pctl(0.75), p90=pctl(0.90); if (p90<=p75) p90=p75+2;

  // Taxa de ganho REAL (referência; não usada na projeção — usamos a premissa)
  var wonA=0, resA=0;
  base.forEach(function(d){ var a=_annualRev(d)||0; if(_novoIsWon(d)) wonA+=a; if(_novoIsWon(d)||d.stage==='Perdido') resA+=a; });
  var WRreal = resA>0 ? wonA/resA : 0;

  // Entrada de novos negócios: ARR médio criado nos últimos 6 meses
  var dt=new Date(now.getTime()); dt.setMonth(dt.getMonth()-6);
  var floor6 = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  var newArr=0, newCnt=0;
  base.forEach(function(d){ var c=cm(d); if(c>=floor6 && c<nowYM){ newArr+=(_annualRev(d)||0); newCnt++; } });

  return { nowYM:nowYM, JMAX:JMAX, f:f, Fcum:Fcum, winN:winN, p75:p75, p90:p90,
           conv:NOVO_FC_B_CONVERSION, WRreal:WRreal, A_new:newArr/6, avgCount:newCnt/6,
           baseN:base.length, floor6:floor6 };
}
function _novoFcBAge(M, d){ if(!d.createdate) return 0; var a=_novoFcBMonthDiff(d.createdate.substring(0,7), M.nowYM); return (isNaN(a)||a<0)?0:a; }
// Desconto de "deal vencido": aberto além do tempo típico de fechar → menos provável.
function _novoFcBStale(M, age){ if(age<=M.p75) return 1; if(age>=M.p90) return NOVO_FC_B_STALE_FLOOR; return 1-(1-NOVO_FC_B_STALE_FLOOR)*((age-M.p75)/(M.p90-M.p75)); }
// Σ Fcum(0..n-1): fração de fechamento das safras novas já realizada até o mês.
function _novoFcBNewFactor(M, ahead){ var s=0; for (var k=0;k<ahead;k++){ s += (k<=M.JMAX ? M.Fcum[k] : 1); } return s; }

// Documentação dinâmica (números calculados) injetada no modal de info do N06B.
function _novoForecastBMethodologyHtml() {
  var M = _novoForecastModelBLast; if (!M) return '';
  var pct1=function(x){ return (x*100).toFixed(1)+'%'; };
  var pct0=function(x){ return Math.round(x*100)+'%'; };

function buildNovoPipeRev12B() {
  var open = _novoPipeRevDeals();
  var months = _novoProjectionMonthsToDec27();

  _novoForecastModelBLast = M;
  var th = _novoTheme();
  var isDeals = _novoPipeRevMetricB === 'deals';
  var weighted = _novoPipeRevValueModeB === 'weighted';
  var conv = (isDeals || weighted) ? M.conv : 1;   // novos negócios: premissa (ou 1 no modo Real)

  var A={}, Bex={}, Bnew={};
  for (var k=0;k<months.length;k++){ A[months[k]]=0; Bex[months[k]]=0; Bnew[months[k]]=0; }

  // Pipe atual: A (azul, congelado) e Bex (verde, descontando deals vencidos)
  if (isDeals) {
    open.forEach(function(d){
      var dm = d.data_prevista_para_receita ? d.data_prevista_para_receita.substring(0,7) : null;
      if (dm && A[dm]!=null && _novoInWin(d.data_prevista_para_receita)) { A[dm]+=1; Bex[dm]+=_novoFcBStale(M, _novoFcBAge(M,d)); }
    });
  } else {
    open.forEach(function(d){
      var sf=_novoFcBStale(M, _novoFcBAge(M,d));
      for (var i=0;i<months.length;i++){ var m=months[i]; var v=_novoPipeRevMonthValue(d, m, weighted); if(v>0){ A[m]+=v; Bex[m]+=v*sf; } }
    });
  }
  // Novos negócios (só na verde): entrada × conversão, espalhada pela curva de fechamento
  for (var j=0;j<months.length;j++){
    var ahead=_novoFcBMonthDiff(M.nowYM, months[j]);
    if (isDeals) { Bnew[months[j]] = (ahead>=1) ? (M.avgCount*conv*M.Fcum[Math.min(ahead-1,M.JMAX)]) : 0; }
    else { Bnew[months[j]] = (ahead>=1) ? ((M.A_new*conv/12)*_novoFcBNewFactor(M, ahead)) : 0; }
  }

  var firstNonZero=-1;
  for (var f=0; f<months.length; f++){ if (((A[months[f]]||0)+(Bex[months[f]]||0)+(Bnew[months[f]]||0))>0.0001){ firstNonZero=f; break; } }
  if (firstNonZero>0) months = months.slice(firstNonZero);

  var dataA=[], dataB=[], bGar=[], bNovos=[];

  });

  var fmt=function(v){ return isDeals ? (Math.round(v*10)/10) : _revShort(v); };
  var L=NOVO_LANG==='en';

  _novoMkChart('chart-novo-piperev12b', { type:'line', plugins:[ChartDataLabels],
    data:{ labels:months.map(_mlbl), datasets:[
      { label:(L?'Projection (over time)':'Projeção (com o tempo)'), data:dataB, borderColor:'rgba(63,185,80,.95)', backgroundColor:'rgba(63,185,80,.14)', pointRadius:3, pointHoverRadius:5, borderWidth:2, tension:0.35, fill:true, order:1 },
      { label:(L?'Current pipe (frozen)':'Pipe atual (parado no tempo)'), data:dataA, borderColor:'rgba(88,166,255,.95)', backgroundColor:'transparent', borderDash:[5,4], pointRadius:2, pointHoverRadius:4, borderWidth:2, tension:0.35, fill:false, order:2 }
    ]},
    options:{ responsive:true, layout:{padding:{top:28}}, plugins:{
      legend:{display:true, labels:{color:th.cText2, font:{family:NOVO_FONT,size:11}, usePointStyle:true}},
      datalabels:{ display:function(ctx){ return ctx.datasetIndex===0; }, anchor:'end', align:'top', color:th.cText, font:{family:NOVO_FONT,size:9,weight:'bold'}, formatter:function(v){ return v>0?fmt(v):''; } },
      tooltip:{ mode:'index', intersect:false, callbacks:{
        label:function(c){ var v=c.parsed.y; return c.dataset.label+': '+(isDeals ? (Math.round(v*10)/10)+' deals' : 'R$ '+Math.round(v).toLocaleString('pt-BR')); },
        afterBody:function(items){ if(!items.length) return ''; var i=items[0].dataIndex;
          if (isDeals) return ['', (L?'Projection breakdown:':'Quebra da projeção (verde):'), '• '+(L?'current pipe (adjusted)':'pipe atual (ajustado)')+': '+(Math.round(bGar[i]*10)/10), '• '+(L?'new business':'novos negócios')+': +'+(Math.round(bNovos[i]*10)/10)];
          return ['', (L?'Projection breakdown:':'Quebra da projeção (verde):'), '• '+(L?'current pipe (adjusted)':'pipe atual (ajustado)')+': '+_revShort(bGar[i]), '• '+(L?'new business':'novos negócios')+': +'+_revShort(bNovos[i])];
        }

// Número compacto sem moeda (K para milhar, M para milhão) — usado em rótulos de gráfico.
function _novoCompactNum(v) {
  if (v == null || isNaN(v)) return '-';
  if (v >= 1e6) return (v / 1e6).toLocaleString('pt-BR', {minimumFractionDigits: 1, maximumFractionDigits: 1}) + 'M';
  if (v >= 1e3) return (v / 1e3).toLocaleString('pt-BR', {minimumFractionDigits: 0, maximumFractionDigits: 1}) + 'K';
  return Math.round(v).toLocaleString('pt-BR');
}
function _fmtBig(v) {
  if (v == null || isNaN(v)) return '—';
  if (v >= 1e6) return 'R$ ' + (v / 1e6).toLocaleString('pt-BR', {minimumFractionDigits: 1, maximumFractionDigits: 1}) + 'M';
  if (v >= 1e3) return 'R$ ' + (v / 1e3).toLocaleString('pt-BR', {minimumFractionDigits: 0, maximumFractionDigits: 1}) + 'K';
  return 'R$ ' + _nr(v);
}

function _buildKpiSecRow() {
  var deals = _novoDeals || [];
  var now = new Date();
  var openDeals = _novoCurrentActivePipeline();   // mesma base do P09 | Pipeline Ativo

  // Win rate por contagem de deals: ganhos / (ganhos + perdidos) — ambos por close_date.
  // Sem filtro: base all-time (mesma lógica do B01 do Board); com filtro: janela selecionada.
  var wonList = _novoWon();
  var lostList = _novoLost();
  var wrWon  = wonList.length;
  var wrLost = lostList.length;
  var winRate = (wrWon + wrLost) > 0 ? Math.round(wrWon / (wrWon + wrLost) * 1000) / 10 : null;

  // S02/S03 | Conversão por origem. BDR = deals com o campo BDR (interno: sdr) preenchido; AE = sem.
  // Conversão = ganhos ÷ (ganhos + perdidos) dentro de cada origem (mesma base do win rate).
  var bdrWon    = wonList.filter(function(d) { return d.sdr; });
  var bdrLost   = lostList.filter(function(d) { return d.sdr; });
  var aeWon     = wonList.filter(function(d) { return !d.sdr; });
  var aeLost    = lostList.filter(function(d) { return !d.sdr; });
  var bdrClosed = bdrWon.length + bdrLost.length;
  var aeClosed  = aeWon.length + aeLost.length;
  var bdrConv   = bdrClosed > 0 ? Math.round(bdrWon.length / bdrClosed * 1000) / 10 : null;
  var aeConv    = aeClosed  > 0 ? Math.round(aeWon.length  / aeClosed  * 1000) / 10 : null;

  // S04 | Taxa de Reunião (Reunião Agendada → Diagnóstico). Depende de _novoFunnelData (carga assíncrona).
  var meetStats = _novoMeetingStats();

  // Stale deals: open deals with no logged activity for more than 30 days (via notes_last_updated)
  var staleDeals = openDeals.filter(function(d) { return d.dias_sem_atividade != null && d.dias_sem_atividade > 30; });

  // S06 | Completude: % dos deals de "Cotação para frente" com TODOS os 10 campos preenchidos.
  // dados_completos vem calculado no servidor (avalia os campos crus do HubSpot). Ver /api/forecast-table.
  var s06Deals    = _novoDealsByDate('createdate').filter(function(d) { return NOVO_S06_STAGES[d.stage]; });
  var s06Complete = s06Deals.filter(function(d) { return d.dados_completos; });
  var completePct = s06Deals.length > 0 ? Math.round(s06Complete.length / s06Deals.length * 100) : null;

  // Momentum: open deals created in last 30 days vs prior 30 days
  var ms30 = 30 * 24 * 60 * 60 * 1000;
  var nowMs = now.getTime();
  var recentDeals = openDeals.filter(function(d) { return d.createdate && (nowMs - new Date(d.createdate).getTime()) <= ms30; });
  var recent = recentDeals.length;
  var prevDeals = openDeals.filter(function(d) {
    if (!d.createdate) return false;
    var age = nowMs - new Date(d.createdate).getTime();
    return age > ms30 && age <= ms30 * 2;
  });
  var prev = prevDeals.length;
  var momDelta = recent - prev;
  var momArrow = momDelta > 0 ? ' ↑' : momDelta < 0 ? ' ↓' : '';
  var momColor = momDelta > 0 ? 'var(--green)' : momDelta < 0 ? 'var(--red)' : 'var(--text)';

  function fmtPct(v) { return v != null ? v + '%' : '—'; }

  var kpis = [
    {
      key: 'kpi2-winrate', na: false,
      label: t('kpi2_winrate_label'), value: fmtPct(winRate),
      sub: wrWon + ' / ' + (wrWon + wrLost) + ' deals',

    },
    {
      key: 'kpi2-bdr', na: bdrClosed === 0,

      sub: bdrWon.length + ' / ' + bdrClosed + ' deals | ' + (NOVO_LANG === 'en' ? 'total won: ' : 'ganhos totais: ') + wrWon,
      color: bdrConv != null ? (bdrConv >= 50 ? 'var(--green)' : bdrConv >= 30 ? 'var(--yellow)' : 'var(--text)') : 'var(--muted)',
      tip: t('kpi2_bdr_tip'),
    },
    {
      key: 'kpi2-ae', na: aeClosed === 0,
      label: t('kpi2_ae_label'),
      value: aeClosed === 0 ? t('kpi2_na_sub') : fmtPct(aeConv),
      sub: aeWon.length + ' / ' + aeClosed + ' deals | ' + (NOVO_LANG === 'en' ? 'total won: ' : 'ganhos totais: ') + wrWon,
      color: aeConv != null ? (aeConv >= 50 ? 'var(--green)' : aeConv >= 30 ? 'var(--yellow)' : 'var(--text)') : 'var(--muted)',
      tip: t('kpi2_ae_tip'),
    },
    {
      key: 'kpi2-meeting', na: meetStats == null,
      label: t('kpi2_meeting_label'),
      value: meetStats == null ? '…' : fmtPct(meetStats.rate),
      sub: meetStats == null ? t('kpi2_meeting_loading') : (meetStats.occurred + ' / ' + meetStats.tracked + ' ' + t('kpi2_meetings')),
      color: meetStats != null && meetStats.rate != null ? (meetStats.rate >= 50 ? 'var(--green)' : meetStats.rate >= 30 ? 'var(--yellow)' : 'var(--text)') : 'var(--muted)',
      tip: t('kpi2_meeting_tip'),
    },
    {
      key: 'kpi2-stale', na: false,
      label: t('kpi2_stale_label'),
      value: staleDeals.length.toLocaleString('pt-BR'),
      sub: staleDeals.length + ' / ' + openDeals.length + ' ' + (NOVO_LANG === 'en' ? 'active deals' : 'deals ativos'),
      color: staleDeals.length > 10 ? 'var(--yellow)' : 'var(--text)',
      tip: t('kpi2_stale_tip'),
    },
    {
      key: 'kpi2-momentum', na: false,
      label: t('kpi2_momentum_label'),
      value: recent + momArrow,
      sub: t('kpi2_deals_recent') + ' | ' + prev + ' ' + t('kpi2_vs_prev'),
      color: momColor,
      tip: t('kpi2_momentum_tip'),
    },
  ];

  _novoKpiDrill['kpi2-winrate']  = { deals: wonList.concat(lostList), label: t('kpi2_winrate_label') };
  _novoKpiDrill['kpi2-bdr']      = { deals: bdrWon.concat(bdrLost),   label: t('kpi2_bdr_label') };
  _novoKpiDrill['kpi2-ae']       = { deals: aeWon.concat(aeLost),      label: t('kpi2_ae_label') };
  _novoKpiDrill['kpi2-meeting']  = { deals: meetStats ? meetStats.trackedDeals : [], label: t('kpi2_meeting_label') };
  _novoKpiDrill['kpi2-stale']    = { deals: staleDeals,  label: t('kpi2_stale_label'), totalOpen: openDeals.length };
  _novoKpiDrill['kpi2-momentum'] = { deals: recentDeals, label: t('kpi2_momentum_label'), prevDeals: prevDeals };

  var html = '<div class="kpi-row-sec">';
  kpis.forEach(function(k) {
    var dr = _novoKpiDrill[k.key]; var clickable = dr && dr.deals && dr.deals.length;
    html +=
      '<div class="kpi-sec' + (k.na ? ' kpi-sec--na' : '') + (clickable ? ' kpi-click' : '') + '"' +
        (clickable ? ' onclick="novoKpiDrill(\'' + k.key + '\')"' : '') + '>' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.2rem">' +
          '<span class="kpi-sec-label">' + k.label + '</span>' +
          _infoBtn(k.tip, k.key) +
        '</div>' +
        '<div class="kpi-sec-value" style="color:' + k.color + '">' + k.value + '</div>' +
        '<div class="kpi-sec-sub">' + k.sub + '</div>' +
      '</div>';
  });
  html += '</div>';
  return html;
}

function novoOpenMonthPicker(which, e) {
  if (e) e.stopPropagation();

function _mpRender() {
  var pop = document.getElementById(_mpTarget === 'from' ? 'flt-mp-from' : 'flt-mp-to');

function novoFilterReset(){ _novoFilter = { mode:'all', start:null, end:null }; _novoRangeFrom = null; _novoRangeTo = null; _novoApplyFilter(); }
function novoFilterPreset(mode){
  var now=new Date(), y=now.getFullYear(), mo=now.getMonth(), dd=now.getDate(), s, e, lbl;
  if (mode==='all'){ _novoFilter={mode:'all',start:null,end:null}; _novoApplyFilter(); return; }
  if (mode==='curmonth'){ s=new Date(y,mo,1); e=new Date(y,mo+1,0); lbl=t('flt_cur_month'); }
  else if (mode==='lastmonth'){ s=new Date(y,mo-1,1); e=new Date(y,mo,0); lbl=t('flt_last_month'); }
  else if (mode==='curweek'){ var w1=now.getDay(); s=new Date(y,mo,dd+(w1===0?-6:1-w1)); e=new Date(s.getTime()); e.setDate(e.getDate()+6); lbl=t('flt_cur_week'); }
  else if (mode==='lastweek'){ var w2=now.getDay(); var mon=new Date(y,mo,dd+(w2===0?-6:1-w2)); s=new Date(mon.getTime()); s.setDate(s.getDate()-7); e=new Date(s.getTime()); e.setDate(e.getDate()+6); lbl=t('flt_last_week'); }
  else if (mode==='last3mo'){ e=new Date(y,mo,dd); s=new Date(y,mo-3,dd); lbl=t('flt_last3mo'); }
  else if (mode==='curyear'){ s=new Date(y,0,1); e=new Date(y,11,31); lbl=t('flt_cur_year'); }
  else return;
  _novoFilter={mode:mode,start:_wfYmd(s),end:_wfYmd(e),label:lbl};
  _novoApplyFilter();
}
function novoFilterQuarter(q){
  if(!q){ return; }
  var p=q.split('-'), yy=parseInt(p[0]), qq=parseInt(p[1]), sm=(qq-1)*3;
  var s=new Date(yy,sm,1), e=new Date(yy,sm+3,0);
  _novoFilter={mode:'q'+q,start:_wfYmd(s),end:_wfYmd(e),label:_qLabel(q)};

}

  var lo=_novoRangeFrom<=_novoRangeTo?_novoRangeFrom:_novoRangeTo;
  var hi=_novoRangeFrom<=_novoRangeTo?_novoRangeTo:_novoRangeFrom;

  _novoApplyFilter();
}

function _isoDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function _parseIso(s) { if (!s) return null; var p = String(s).split('-'); if (p.length !== 3) return null; var d = new Date(+p[0], +p[1]-1, +p[2]); return isNaN(d.getTime()) ? null : d; }
