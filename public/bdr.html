<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#171f2e;--card2:#1e2a3c;--border:#293a50;--text:#e6edf3;--text2:#8b949e;--muted:#6e7681;--teal:#3ab8b7;--green:#3fb950;--red:#f85149;--orange:#d29922;--yellow:#e3b341;--hover:rgba(255,255,255,0.06);--even-s:#131b28;--hover-s:#1c2b40;--hdr-glass:rgba(13,17,23,.78)}
html[data-theme="light"]{--bg:#f6f8fa;--card:#ffffff;--card2:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#57606a;--teal:#0d7377;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--hover:rgba(0,0,0,0.05);--even-s:#f1f4f8;--hover-s:#e8eef4;--hdr-glass:rgba(246,248,250,.82)}
body{background:var(--bg);color:var(--text);font-family:Inter,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5}
button,input,select,textarea{font-family:inherit}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.15rem}
.hdr-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);border-radius:99px;cursor:pointer;transition:background .15s,color .15s;position:relative;flex-shrink:0}
.hdr-btn:hover{background:rgba(255,255,255,0.13);color:var(--text)}
html[data-theme="light"] .hdr-btn:hover{background:rgba(0,0,0,0.07)}
.hdr-btn.highlighted{background:var(--teal)!important;color:#fff!important;box-shadow:0 0 0 2px rgba(58,184,183,.3)}
.hdr-btn[data-tooltip]::after{content:attr(data-tooltip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);font-size:.73rem;padding:.26rem .62rem;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300}
.hdr-btn[data-tooltip]:hover::after{opacity:1}
.hdr-sep{width:1px;height:16px;background:rgba(255,255,255,0.12);margin:0 2px;flex-shrink:0}
html[data-theme="light"] .hdr-sep{background:rgba(0,0,0,0.12)}
.hdr-actions{display:flex;align-items:center;background:rgba(255,255,255,0.09);border-radius:99px;padding:7px;gap:12px}
html[data-theme="light"] .hdr-actions{background:rgba(0,0,0,0.03)}
@keyframes hdr-spin{to{transform:rotate(360deg)}}
.hdr-btn.spinning svg{animation:hdr-spin .7s linear infinite}
/* Settings drawer global */
.gs-toggle{display:inline-flex;align-items:center;cursor:pointer;background:var(--card2);border:1px solid var(--border);border-radius:99px;padding:.3rem;flex:none}
.gs-sw{width:34px;height:19px;border-radius:99px;background:var(--border);position:relative;transition:background .18s;flex:none}
.gs-toggle.on .gs-sw{background:var(--teal)}
.gs-sw::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .18s}
.gs-toggle.on .gs-sw::after{transform:translateX(15px)}
.gs-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s}
.gs-backdrop.open{opacity:1;pointer-events:auto}
.gs-drawer{position:fixed;top:0;right:-380px;width:360px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:3001;display:flex;flex-direction:column;transition:right .28s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.25)}
.gs-drawer.open{right:0}
.gs-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.gs-hdr h3{margin:0;font-size:1.2rem;font-weight:600;color:var(--text)}
.gs-body{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.gs-row{display:flex;align-items:center;gap:.75rem;padding:.85rem 0;border-bottom:1px solid var(--border)}
.gs-row label{flex:1;font-size:.9rem;color:var(--text)}
.nav-drawer{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--card);border-right:1px solid rgba(255,255,255,.08);z-index:1000;transition:left .25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.nav-drawer.open{left:0}
.nav-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s ease}
.nav-backdrop.open{opacity:1;pointer-events:auto}
.nav-drawer-header{display:flex;align-items:center;gap:.75rem;padding:1.1rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-drawer-brand{font-weight:600;font-size:1rem;color:var(--text);flex:1}
.nav-drawer-footer{margin-top:auto;display:flex;align-items:center;gap:.5rem;padding:.7rem .75rem;border-top:1px solid rgba(255,255,255,.08)}
html[data-theme="light"] .nav-drawer-footer{border-top-color:rgba(0,0,0,.1)}
.nav-foot-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;min-height:38px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;padding:.4rem;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;transition:border-color .15s,color .15s,background .15s}
.nav-foot-btn:hover{border-color:var(--teal);color:var(--text)}
.nav-menu{list-style:none;padding:.5rem 0;margin:0}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.25rem;cursor:pointer;font-size:.9rem;color:var(--text2);transition:background .15s,color .15s}.nav-item.nav-sub{padding-left:2.7rem;font-size:.8rem;gap:.55rem}.nav-item.nav-sub svg{width:14px;height:14px}.nav-menu.nav-group-collapsed .nav-item.nav-sub{display:none}.nav-acc-chevron{margin-left:auto;display:inline-flex;align-items:center;padding:2px;color:var(--text2);transition:transform .18s;border-radius:4px}.nav-acc-chevron:hover{background:rgba(35,209,180,.15);color:var(--teal)}.nav-acc-chevron.open{transform:rotate(180deg)}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.nav-item.active{color:var(--teal);font-weight:500}
.nav-item.active svg{stroke:var(--teal)}
.novo-hdr{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.25rem 2rem;background:transparent;position:sticky;top:0;z-index:100;transition:background .25s,backdrop-filter .25s,box-shadow .25s}
.novo-hdr.scrolled{background:var(--hdr-glass);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);box-shadow:0 1px 0 var(--border)}
.novo-theme-sun{display:block}.novo-theme-moon{display:none}
[data-theme="light"] .novo-theme-sun{display:none}[data-theme="light"] .novo-theme-moon{display:block}
.novo-lang-btn{width:auto !important;padding:0 9px;font-size:.71rem;font-weight:700;letter-spacing:.06em}
.novo-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:1rem;padding-bottom:2rem}
.novo-card{background:var(--card);border-radius:10px;padding:1.25rem 1.5rem}
.novo-card-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.novo-card-header h3{font-size:.88rem;font-weight:600;color:var(--text);margin:0;flex:1}
.novo-code-tag{display:none;align-items:center;font-size:.6rem;font-weight:700;letter-spacing:.04em;font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--teal);background:rgba(58,184,183,.14);border:1px solid rgba(58,184,183,.32);border-radius:5px;padding:.05rem .32rem;line-height:1.35;flex-shrink:0}
.novo-info-btn{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--text2);background:none;color:var(--text2);font-size:.62rem;font-style:normal;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;padding:0;line-height:1}
body:not(.novo-info-on) .novo-card .novo-info-btn{display:none}
body.novo-info-on .novo-code-tag{display:inline-flex}
#novo-tip{position:fixed;z-index:9999;background:rgba(23,31,46,.78);backdrop-filter:blur(14px) saturate(1.5);border-radius:6px;padding:.45rem .7rem;width:278px;pointer-events:none;display:none;box-shadow:0 6px 20px rgba(0,0,0,.3)}
html[data-theme="light"] #novo-tip{background:rgba(246,248,250,.82)}
#novo-tip.nt-show{display:block}
#novo-tip .nt-text{font-size:.73rem;color:var(--text);font-weight:400;line-height:1.5}
#novo-tip .nt-code{font-size:.62rem;font-weight:700;color:var(--teal);font-family:ui-monospace,Menlo,Consolas,monospace;margin-top:.3rem;padding-top:.28rem;border-top:1px solid rgba(255,255,255,.12);letter-spacing:.07em}
html[data-theme="light"] #novo-tip .nt-code{border-top-color:rgba(0,0,0,.1)}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:.75rem;margin-bottom:.75rem}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.tab-sub{display:inline-flex;background:var(--card2);border-radius:99px;padding:3px;gap:0;position:relative}
.tab-sub-btn{background:transparent;border:none;border-radius:99px;color:var(--text2);padding:.3rem .9rem;cursor:pointer;font-size:.75rem;font-weight:500;transition:color .18s;position:relative;z-index:1}
.tab-sub-btn.active{color:var(--text);font-weight:600}
html[data-theme="light"] .tab-sub-btn.active{box-shadow:none}
.tab-sub-thumb{position:absolute;top:3px;height:calc(100% - 6px);border-radius:99px;background:rgba(255,255,255,.14);pointer-events:none;z-index:0;transition:left .22s cubic-bezier(.4,0,.2,1),width .22s cubic-bezier(.4,0,.2,1)}
html[data-theme="light"] .tab-sub-thumb{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.bdr-fbar{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;margin-bottom:.75rem}
.bdr-fbar-lbl{font-size:.72rem;color:var(--text2);font-weight:700;margin-right:.25rem}
.bdr-fchip{background:var(--card2);border:1px solid var(--border);border-radius:99px;color:var(--text2);padding:.25rem .7rem;cursor:pointer;font-size:.72rem;font-weight:600;font-family:inherit;transition:all .15s}
.bdr-fchip:hover{border-color:var(--teal);color:var(--text)}
.bdr-fchip.on{background:var(--teal);border-color:var(--teal);color:#fff}
.kpi-card{background:var(--card);border-radius:14px;padding:1.6rem 1.8rem}
.kpi-click{cursor:pointer}
.kpi-label{font-size:.66rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;line-height:1}
.kpi-value{font-size:2rem;font-weight:800;line-height:1.1;margin:.35rem 0 .25rem}
.kpi-sub{font-size:.7rem;color:var(--muted);line-height:1.35}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s linear;backdrop-filter:blur(5px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:90vw;max-width:960px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .28s cubic-bezier(0.4,0,0.2,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1rem;font-weight:600;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px}
.modal-close:hover{color:var(--red)}
.modal-body{padding:1.2rem 1.5rem;overflow-y:auto;flex:1}
.btn-export{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:.3rem .7rem;font-size:.7rem;cursor:pointer;margin-left:auto}
.btn-export:hover{border-color:var(--teal);color:var(--teal)}
table.lb{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
table.lb th{text-align:right;color:var(--teal);font-size:.72rem;font-weight:700;text-transform:uppercase;padding:.6rem 1rem;border-bottom:2px solid var(--teal);white-space:nowrap;position:sticky;top:0;background:var(--card)}
table.lb th:first-child{text-align:left}
table.lb td{padding:.38rem 1rem;border-bottom:1px solid var(--border);color:var(--text);text-align:right}
table.lb td:first-child{text-align:left;font-weight:600}
table.lb tbody tr:nth-child(even) td{background:var(--even-s)}
table.lb tbody tr:hover td{background:var(--hover-s)}
#view-novo{transition:filter .25s ease,margin-left .25s cubic-bezier(0.4,0,0.2,1)}
body.nav-docked #view-novo{margin-left:280px}
@media(max-width:820px){body.nav-docked #view-novo{margin-left:0}}
.content-blur{filter:blur(4px);pointer-events:none;user-select:none}
.novo-help-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s ease}
.novo-help-backdrop.open{opacity:1;pointer-events:auto}
.novo-help-drawer{position:fixed;top:0;right:-580px;width:540px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:3001;display:flex;flex-direction:column;transition:right .28s cubic-bezier(0.4,0,0.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.25)}
.novo-help-drawer.open{right:0}
.novo-help-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.novo-help-hdr h3{margin:0;font-size:1.15rem;font-weight:600;color:var(--text)}
.novo-help-body{flex:1;overflow-y:auto;padding:1.25rem 1.5rem}
.section-hdr{grid-column:1/-1;margin:1.5rem 0 .25rem;border-top:1px solid var(--border);padding-top:1.25rem}
.section-hdr h2{font-size:.78rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin:0}
.banner-warn{grid-column:1/-1;background:rgba(210,153,34,.12);border:1px solid rgba(210,153,34,.3);border-radius:10px;padding:1rem 1.25rem;margin-bottom:.25rem;font-size:.82rem;color:var(--orange)}
</style>

function _novoIsWon(d){ return d.stage==='Ganho'||(_novoImplWon&&d.stage==='Implantação'); }
function _novoOpen(){ return _rawDeals().filter(function(d){ return !_novoIsWon(d)&&d.stage!=='Perdido'&&(_novoActiveMeetings||d.stage!=='Reunião Agendada')&&(_novoActiveStandby||(d.stage!=='Standby'&&d.stage!=='Stand by')); }); }
function _novoWon(){ return _dealsByDate('close_date').filter(_novoIsWon); }
function _novoLost(){ return _dealsByDate('close_date').filter(function(d){ return d.stage==='Perdido'; }); }
// Pipeline ativo (mesma régua do CRO P09): exclui Ganho/Perdido/Implantação; Standby e
// Reunião Agendada entram conforme os toggles globais.
function _bdrActivePipeline(){ return _rawDeals().filter(function(d){ if(d.stage==='Ganho'||d.stage==='Perdido'||d.stage==='Implantação')return false; if((d.stage==='Standby'||d.stage==='Stand by')&&!_novoActiveStandby)return false; if(!_novoActiveMeetings&&d.stage==='Reunião Agendada')return false; return true; }); }
function _novoTheme(){ var isLight=document.documentElement.getAttribute('data-theme')==='light'; return { cText:isLight?'#1f2328':'#e6edf3', cText2:isLight?'#57606a':'#8b949e', cGrid:isLight?'rgba(0,0,0,.08)':'rgba(255,255,255,.06)', isLight:isLight }; }
var _novoCharts={};
function _novoMkChart(id,cfg){ var ctx=document.getElementById(id); if(!ctx)return; if(_novoCharts[id]) _novoCharts[id].destroy(); _novoCharts[id]=new Chart(ctx,cfg); }
function _novoDealsRows(deals){ return deals.map(function(d){ var hsUrl=d.hs_id?'https://app.hubspot.com/contacts/44715285/deal/'+d.hs_id:'#'; var nameCell=d.hs_id?'<a href="'+hsUrl+'" target="_blank" rel="noopener" style="color:var(--teal);text-decoration:none">'+_ne(d.dealname)+'</a>':_ne(d.dealname); return '<tr><td style="text-align:left;min-width:150px;max-width:210px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+nameCell+'</td><td style="text-align:left;white-space:nowrap">'+_ne(d.sdr||'—')+'</td><td style="text-align:left;white-space:nowrap">'+_ne(d.ae)+'</td><td>'+_ne(d.pipeline)+'</td><td style="white-space:nowrap">'+_ne(d.stage)+'</td><td>'+_ni(d.vidas)+'</td><td>'+(d.colaboradores!=null?d.colaboradores:'—')+'</td><td>'+_revShort(_annualRev(d))+'</td><td style="white-space:nowrap">'+(d.createdate||'—')+'</td><td style="white-space:nowrap">'+(d.data_reuniao_agendada||'—')+'</td><td style="white-space:nowrap">'+(d.close_date||'—')+'</td></tr>'; }).join(''); }
function novoOpenDealsModal(title,deals){ if(!deals||!deals.length){ openModal(title,'<p style="color:var(--text2);padding:1rem 0">Nenhum deal.</p>'); return; } var html='<table class="lb"><thead><tr><th style="text-align:left">Deal</th><th style="text-align:left">BDR</th><th style="text-align:left">AE</th><th>Pipe</th><th>Etapa</th><th>Vidas</th><th>Colabs</th><th>ARR</th><th>Criado</th><th>Reun. Ag.</th><th>Fechado</th></tr></thead><tbody>'+_novoDealsRows(deals)+'</tbody></table>'; openModal(title+' ('+deals.length+')',html); }
// Modal de deals com filtros (chips) no topo, baseados na dimensão do gráfico clicado.
function _fBdr(d){ return _bdrName(d)||'(sem BDR)'; }
function _fOrigem(d){ return _isBdr(d)?'BDR':'AE'; }
function _fDesfecho(d){ return _novoIsWon(d)?'Ganho':(d.stage==='Perdido'?'Perdido':'Aberto'); }
function _fMes(d){ return _origDate(d)?_mlbl(_oym(d)):'(sem reunião agend.)'; }
function _fPorte(d){ var v=(_bdrSizeMode==='vidas'?d.vidas:d.colaboradores)||0; return v<50?'< 50':(v<200?'50–200':(v<500?'200–500':'500+')); }
// Facetas combináveis (AND entre dimensões; uma seleção por dimensão). Cada gráfico abre
// este modal; os chips no topo permitem cruzar BDR × Origem × Desfecho × Porte × Mês.
var _BDR_FACETS=[
  {key:'origem',label:'Origem',fn:_fOrigem},
  {key:'bdr',label:'BDR',fn:_fBdr},
  {key:'desfecho',label:'Desfecho',fn:_fDesfecho},
  {key:'porte',label:'Porte',fn:_fPorte},
  {key:'mes',label:'Mês',fn:_fMes}
];
var _bdrFacet=null;
function bdrOpenFacetModal(title,deals,preKey,preVal){
  _bdrFacet={title:title,deals:deals||[],sel:{},cats:{}};
  if(preKey&&preVal!=null) _bdrFacet.sel[preKey]=preVal;
  _bdrFacetRender();
}
function bdrFacetSel(key,idx){ if(!_bdrFacet)return; var c=_bdrFacet.cats[key]&&_bdrFacet.cats[key][idx]; if(c){ _bdrFacet.sel[key]=c.k; _bdrFacetRender(); } }
function bdrFacetClear(key){ if(!_bdrFacet)return; delete _bdrFacet.sel[key]; _bdrFacetRender(); }
function _bdrFacetRender(){
  var f=_bdrFacet; if(!f)return;
  // categorias por faceta a partir do conjunto completo (opções não somem ao filtrar).
  f.cats={};
  _BDR_FACETS.forEach(function(fc){ var m={}; f.deals.forEach(function(d){ var k=fc.fn(d); m[k]=(m[k]||0)+1; }); f.cats[fc.key]=Object.keys(m).map(function(k){return {k:k,n:m[k]};}).sort(function(a,b){return b.n-a.n;}); });
  // AND entre as dimensões selecionadas.
  var sub=f.deals.filter(function(d){ return _BDR_FACETS.every(function(fc){ var s=f.sel[fc.key]; return s==null||fc.fn(d)===s; }); });
  var bars=_BDR_FACETS.map(function(fc){
    var cats=f.cats[fc.key]; if(cats.length<=1 && f.sel[fc.key]==null) return '';
    var selIdx=-1; cats.forEach(function(c,i){ if(c.k===f.sel[fc.key]) selIdx=i; });
    var shown=cats.slice(0,12); if(selIdx>=12) shown=shown.concat([cats[selIdx]]);
    var chips=shown.map(function(c){ var i=cats.indexOf(c); var on=f.sel[fc.key]===c.k; return '<button class="bdr-fchip'+(on?' on':'')+'" onclick="bdrFacetSel(\''+fc.key+'\','+i+')">'+_ne(c.k)+' ('+c.n+')</button>'; }).join('');
    var more=cats.length>shown.length?'<span style="font-size:.68rem;color:var(--text2)">+'+(cats.length-shown.length)+'</span>':'';
    return '<div class="bdr-fbar"><span class="bdr-fbar-lbl">'+fc.label+':</span><button class="bdr-fchip'+(f.sel[fc.key]==null?' on':'')+'" onclick="bdrFacetClear(\''+fc.key+'\')">Todos</button>'+chips+more+'</div>';
  }).join('');
  var table=sub.length?('<table class="lb"><thead><tr><th style="text-align:left">Deal</th><th style="text-align:left">BDR</th><th style="text-align:left">AE</th><th>Pipe</th><th>Etapa</th><th>Vidas</th><th>Colabs</th><th>ARR</th><th>Criado</th><th>Reun. Ag.</th><th>Fechado</th></tr></thead><tbody>'+_novoDealsRows(sub)+'</tbody></table>'):'<p style="color:var(--text2);padding:1rem 0">Nenhum deal para os filtros selecionados.</p>';
  openModal(f.title+' ('+sub.length+')', bars+table);
}

function _getMonths(n){ var st=_filterState(), months=[]; if(st.start&&st.end){ var s=new Date(st.start+'T00:00:00'), e=new Date(st.end+'T00:00:00'); var y=s.getFullYear(), m=s.getMonth(); while(y<e.getFullYear()||(y===e.getFullYear()&&m<=e.getMonth())){ months.push(y+'-'+String(m+1).padStart(2,'0')); m++; if(m>11){m=0;y++;} } return months; } var now=new Date(); for(var i=n-1;i>=0;i--){ var dd=new Date(now.getFullYear(),now.getMonth()-i,1); months.push(dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')); } return months; }

      kpi('Reuniões Agendadas | Pipe Ativo',_ni(reuDeals.length),_ni(reuVidas)+' vidas potenciais','var(--text)','kpi-pipe-reunioes','reunioes')+
      kpi('Vidas Ponderadas',_ni(wVidas),'Σ vidas × probabilidade','var(--teal)','kpi-weighted-vidas','wVidas')+

function bdrKpiOpen(kind){
  var deals=_rawDeals(), created=_origDeals(), open=_novoOpen();
  if(kind==='pipeVidas') return novoOpenDealsModal('Vidas | Pipeline Ativo', _bdrActivePipeline());
  if(kind==='wonVidas') return novoOpenDealsModal('Vidas Ganhas', _novoWon());

  if(kind==='reunioes') return novoOpenDealsModal('Reuniões Agendadas | Pipe Ativo', deals.filter(function(d){return d.stage==='Reunião Agendada';}));
  if(kind==='wVidas') return novoOpenDealsModal('Vidas Ponderadas', _bdrActivePipeline());

function buildBdrOrigin(){
  var th=_novoTheme(), created=_origDeals().filter(_isBdr);
  var colab=_bdrOriginMode==='colaboradores';
  var vidas=_bdrOriginMode==='vidas';
  // Pre-compute all three aggregations for rich tooltip
  var aggDeals={}, aggVidas={}, aggColab={};
  created.forEach(function(d){
    var b=_bdrName(d)||'(sem BDR)';
    aggDeals[b]=(aggDeals[b]||0)+1;
    aggVidas[b]=(aggVidas[b]||0)+(d.vidas||0);
    aggColab[b]=(aggColab[b]||0)+(d.colaboradores||0);
  });
  var agg=colab?aggColab:vidas?aggVidas:aggDeals;
  var ranked=Object.keys(agg).map(function(b){return {bdr:b,n:agg[b]};}).filter(function(r){return r.n>0;}).sort(function(a,b){return b.n-a.n;}).slice(0,15);
  // Pre-compute per-BDR metadata (level + goal) for tooltip
  // Lookup robusto: normaliza NFD+lower para tolerar acentuação; fallback na BDR_LIST
  // quando o localStorage tem chaves antigas (ex: "Emmanuelle"→"Emanuelle", "Letícia"→"Leticia").
  var _normF=function(s){ return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase(); };
  var bdrInfo={};
  ranked.forEach(function(r){
    var metas=window.BDR_METAS||{};
    var first=_normF(r.bdr.split(' ')[0]);
    var goal=metas[r.bdr]; // direct lookup
    if(goal==null){
      var ks=Object.keys(metas).filter(function(k){ return _normF(k.split(' ')[0])===first; });
      if(ks.length===1) goal=metas[ks[0]];
    }
    var level=null;
    if(window.BDR_LIST){
      var match=window.BDR_LIST.filter(function(b){ return _normF(b.name.split(' ')[0])===first; });
      if(match.length===1){
        level=match[0].level;
        if(goal==null) goal=match[0].goal; // fallback: usa default da BDR_LIST se metas obsoleto
      }
    }
    bdrInfo[r.bdr]={goal:goal,level:level};
  });
  var canvas=document.getElementById('chart-bdr-origin-bdr');
  if(canvas) canvas.style.height=Math.max(ranked.length*36+48,160)+'px';
  // Color bars by goal attainment in deals mode
  var bgColors;
  if (!colab && !vidas) {
    bgColors=ranked.map(function(r){
      var goal=bdrInfo[r.bdr] && bdrInfo[r.bdr].goal;
      if(goal==null||goal<=0) return 'rgba(147,112,219,.75)';
      var pct=r.n/goal;
      if(pct>=1.0)  return 'rgba(63,185,80,.8)';
      if(pct>=0.85) return 'rgba(210,153,34,.85)';
      if(pct>=0.70) return 'rgba(248,160,40,.85)';
      return 'rgba(248,81,73,.8)';
    });
  } else {
    bgColors='rgba(147,112,219,.75)';
  }
  _novoMkChart('chart-bdr-origin-bdr',{type:'bar',plugins:[ChartDataLabels],
    data:{labels:ranked.map(function(r){return r.bdr;}),datasets:[{data:ranked.map(function(r){return r.n;}),backgroundColor:bgColors,hoverBackgroundColor:'rgba(147,112,219,1)',borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,layout:{padding:{right:54}},plugins:{legend:{display:false},
      datalabels:{anchor:'end',align:'right',color:th.cText,font:{family:NOVO_FONT,size:11,weight:'bold'},formatter:function(v){return _ni(v);}},
      tooltip:{callbacks:{
        title:function(items){
          var r=ranked[items[0].dataIndex];
          var info=bdrInfo[r.bdr]||{};
          return r.bdr+(info.level?' | '+info.level:'');
        },
        label:function(c){
          var r=ranked[c.dataIndex];
          var info=bdrInfo[r.bdr]||{};
          return [
            'Deals: '+_ni(aggDeals[r.bdr]||0)+(info.goal!=null?' | Meta: '+info.goal:''),
            'Colaboradores: '+_ni(aggColab[r.bdr]||0),
            'Vidas: '+_ni(aggVidas[r.bdr]||0)
          ];
        }
      }}},
      scales:{x:{grid:{color:th.cGrid},ticks:{color:th.cText2,font:{family:NOVO_FONT},precision:0}},y:{grid:{display:false},ticks:{color:th.cText,font:{family:NOVO_FONT},autoSkip:false}}},
      onClick:function(e,el){ if(!el.length)return; var b=ranked[el[0].index].bdr; bdrOpenFacetModal('Originação por BDR', created, 'bdr', b); }}});
}

// R13 | Weekly Origination: barras verticais empilhadas por BDR (Top 6 + Outros), 13 semanas.
function buildBdrWeekly(){
  var th=_novoTheme(), weeks=_getWeeks(13), created=_origDeals().filter(_isBdr);
  var colab=_bdrWeeklyMode==='colaboradores';
  var vidas=_bdrWeeklyMode==='vidas';
  var inc=function(d){ return vidas?(d.vidas||0):colab?(d.colaboradores||0):1; };
  var tot={};
  created.forEach(function(d){ var b=_bdrName(d)||'(sem BDR)'; tot[b]=(tot[b]||0)+inc(d); });

.modal-body::-webkit-scrollbar-thumb,.novo-help-body::-webkit-scrollbar-thumb,.novo-prob-body::-webkit-scrollbar-thumb,[style*="overflow-x:auto"]::-webkit-scrollbar-thumb{background:var(--text2);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
.modal-body::-webkit-scrollbar-thumb:hover,.novo-help-body::-webkit-scrollbar-thumb:hover,.novo-prob-body::-webkit-scrollbar-thumb:hover,[style*="overflow-x:auto"]::-webkit-scrollbar-thumb:hover{background:var(--teal)}
</style>
<script>
(function(){
  var PANELS=[
    {label:'CRO Dashboard',url:'/novo',file:'dashboard.html',health:'y',icon:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>'},
    {label:'Board View',url:'/novo-board',file:'board.html',health:'y',icon:'<path d="M2 20h20M4 20V10l8-6 8 6v10"/><path d="M10 20v-6h4v6"/>'},
    {label:'AE Performance',url:'/novo-ae',file:'ae.html',health:'y',icon:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'},
    {label:'BDR Performance',url:'/novo-bdr',file:'bdr.html',health:'y',icon:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'},
    {label:'Last 48h',url:'/novo-48h',file:'48h.html',health:'r',icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'},
    {label:'CS Dashboard',url:'/novo-cs',file:'cs.html',health:'r',icon:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>'},
    {label:'Cotação',url:'/novo-cotacao',file:'cotacao.html',health:'r',icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>'},
    {label:'Forecast',url:'/forecast',file:'forecast.html',health:'g',sec:'Forecast',icon:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>'},
    {label:'Overall',url:'/forecast-overall',acc:true,file:'forecast-panel.html',health:'y',icon:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>'},
    {label:'MQL / Reunião',url:'/forecast-mql',sub:true,file:'forecast-panel.html',health:'y',icon:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'},
    {label:'Diagnóstico',url:'/forecast-diagnostico',sub:true,file:'forecast-panel.html',health:'y',icon:'<path d="M9 11H5a2 2 0 0 0-2 2v7h6"/><path d="M14 11h5a2 2 0 0 1 2 2v7h-6"/><path d="M9 7h6"/><circle cx="12" cy="5" r="2"/>'},
    {label:'Cotação',url:'/forecast-cotacao',sub:true,file:'forecast-panel.html',health:'g',icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>'},
    {label:'Consultoria',url:'/forecast-consultoria',sub:true,file:'forecast-panel.html',health:'g',icon:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'},
    {label:'Negociação',url:'/forecast-negociacao',sub:true,file:'forecast-panel.html',health:'g',icon:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>'},
    {label:'BID',url:'/forecast-bid',sub:true,file:'forecast-panel.html',health:'y',icon:'<path d="M3 3v18h18"/><path d="M19 9l-5 5-3-3-4 4"/>'},
    {label:'Ganho',url:'/forecast-ganho',sub:true,file:'forecast-panel.html',health:'g',icon:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'}
  ];
  function findByUrl(u){ for(var i=0;i<PANELS.length;i++){ if(PANELS[i].url===u) return PANELS[i]; } return null; }
  var p2=location.pathname; if(p2.length>1&&p2.charAt(p2.length-1)==='/') p2=p2.slice(0,-1);
  var current=null;
  for(var i=0;i<PANELS.length;i++){ if(p2===PANELS[i].url||p2.indexOf(PANELS[i].file)!==-1){ current=PANELS[i].url; break; } }
  function dot(h){ var tt={g:'live',y:'wip',r:'not working'}; var t=tt[h]||''; return '<span class="health-dot '+h+'" title="'+t+'" aria-label="'+t+'"></span>'; }
  function svgFor(p){ return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p.icon+'</svg>'; }
  window.toggleForecastAccordion=function(e){ if(e){e.stopPropagation();e.preventDefault();} var ul=document.querySelector('.nav-menu'); if(!ul) return; var collapsed=ul.classList.toggle('nav-group-collapsed'); var ch=document.getElementById('fc-acc-chevron'); if(ch) ch.classList.toggle('open', !collapsed); };
  function buildNav(){
    var nav=document.getElementById('nav-drawer'); if(!nav) return;
    var h='<div class="nav-drawer-header"><span class="nav-drawer-brand">Dashboard Axenya</span>'+
      '<button class="hdr-btn" onclick="closeDrawer()" aria-label="Fechar menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'+
      '<ul class="nav-menu">';
    for(var i=0;i<PANELS.length;i++){
      var p=PANELS[i];
      if(p.sec) h+='<li style="list-style:none;padding:.85rem 1.25rem .3rem;margin-top:.35rem;border-top:1px solid var(--border);font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2)">'+p.sec+'</li>';
      var _accCh = p.acc ? '<span id="fc-acc-chevron" class="nav-acc-chevron" onclick="toggleForecastAccordion(event)" title="Mostrar/ocultar etapas"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>' : '';
      h+='<li><a class="nav-item'+(p.sub?' nav-sub':'')+(p.acc?' nav-acc':'')+(p.url===current?' active':'')+'" href="'+p.url+'" data-url="'+p.url+'" style="text-decoration:none">'+svgFor(p)+'<span>'+p.label+'</span>'+dot(p.health)+_accCh+'</a></li>';
    }
    h+='</ul>'+'<div class="nav-drawer-footer"><button class="nav-foot-btn" type="button" onclick="doLogout()" title="Sair" aria-label="Sair"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button><button class="nav-foot-btn" type="button" onclick="novoToggleLang()" title="Idioma / Language"><span id="novo-lang-label">'+(typeof NOVO_LANG!=="undefined"&&NOVO_LANG==="pt"?"EN":"PT")+'</span></button><button class="nav-foot-btn" type="button" onclick="toggleTheme()" title="Tema / Theme"><svg class="novo-theme-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg class="novo-theme-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div>';
    nav.innerHTML=h;
    var nit=nav.getElementsByClassName('nav-item');
    /* itens do menu sao <a href>: clique normal navega; ctrl/meio/botao-direito abrem em nova aba */
    (function(){ var ul=nav.querySelector(".nav-menu"); if(!ul) return; var inGroup=false; for(var k=0;k<PANELS.length;k++){ if((PANELS[k].acc||PANELS[k].sub)&&PANELS[k].url===current){ inGroup=true; break; } } if(!inGroup) ul.classList.add("nav-group-collapsed"); var ch=document.getElementById("fc-acc-chevron"); if(ch&&inGroup) ch.classList.add("open"); })();
  }
  function buildDropdown(){
    var dd=document.getElementById('panel-dd'); if(!dd) return;
    var html='';
    for(var i=0;i<PANELS.length;i++){
      var p=PANELS[i], act=(p.url===current?' active':'');
      html+='<a class="panel-dd-item'+act+'" role="menuitem" href="'+p.url+'" data-url="'+p.url+'" style="text-decoration:none">'+svgFor(p)+'<span>'+p.label+'</span>'+dot(p.health)+'</a>';
    }
    dd.innerHTML=html;
    var items=dd.getElementsByClassName('panel-dd-item');
    /* itens do dropdown sao <a href>: suportam abrir em nova aba */
  }
  function buildTitleDot(){
    var btn=document.querySelector('.panel-switch-btn');
    if(btn && current && !btn.querySelector('.health-dot')){
      var cp=findByUrl(current);
      if(cp){ var s=document.createElement('span'); s.className='health-dot '+cp.health; var _tt={g:'live',y:'wip',r:'not working'}; s.title=_tt[cp.health]||''; s.setAttribute('aria-label',s.title); var ch=btn.querySelector('.panel-chevron'); if(ch) btn.insertBefore(s,ch); else btn.appendChild(s); }
    }
  }
  function build(){ buildNav(); buildDropdown(); buildTitleDot(); }
  window.togglePanelMenu=function(e){ if(e){e.stopPropagation();} var sw=document.getElementById('panel-switcher'); if(!sw) return; var open=!sw.classList.contains('open'); sw.classList.toggle('open',open); var btn=sw.querySelector('.panel-switch-btn'); if(btn) btn.setAttribute('aria-expanded',open?'true':'false'); };
  window.closePanelMenu=function(){ var sw=document.getElementById('panel-switcher'); if(sw){ sw.classList.remove('open'); var btn=sw.querySelector('.panel-switch-btn'); if(btn) btn.setAttribute('aria-expanded','false'); } };
  document.addEventListener('click',function(e){ var sw=document.getElementById('panel-switcher'); if(sw&&sw.classList.contains('open')&&!sw.contains(e.target)) window.closePanelMenu(); });
  document.addEventListener('keydown',function(e){ if(e.key!=='Escape'&&e.keyCode!==27)return; var gs=document.getElementById('gs-drawer'); if(gs&&gs.classList.contains('open')){ novoCloseSettings(); return; } var help=document.getElementById('novo-help-drawer'); if(help&&help.classList.contains('open')){ novoCloseHelp(); return; } var modal=document.getElementById('modal-overlay'); if(modal&&modal.classList.contains('open')){ closeModal(); return; } var sw=document.getElementById('panel-switcher'); if(sw&&sw.classList.contains('open')) window.closePanelMenu(); });

  window.bdrOpenRulesModal = function(){
    var sp = window.NOVO_STAGE_PROB || {};
    function pct(v){ return v!=null?(Math.round((v||0)*1000)/10).toFixed(1).replace('.',',')+'%':'—'; }
    var rows = [
      ['Reunião Agendada', pct(sp['Reunião Agendada']||0.06)],
      ['Diagnóstico',      pct(sp['Diagnóstico']||0.06)],
      ['Cotação',          pct(sp['Cotação']||0.33)],
      ['Proposta Enviada', pct(sp['Proposta Enviada']||0.285)],
      ['Consultoria',      pct(sp['Consultoria']||0.611)],
      ['Negociação',       pct(sp['Negociação']||0.42)],
      ['Implantação',      pct(sp['Implantação']||0.581)],
      ['Ganho',            pct(1.0)],
    ];
    var tbl = '<table class="lb" style="width:100%;font-size:.82rem;margin-top:.75rem"><thead><tr><th style="text-align:left">Etapa</th><th>Prob. atual</th></tr></thead><tbody>'+
      rows.map(function(r){return '<tr><td style="text-align:left">'+r[0]+'</td><td style="text-align:center;font-weight:700">'+r[1]+'</td></tr>';}).join('')+
      '</tbody></table>';
    var body = '<div style="font-size:.86rem;line-height:1.65;color:var(--text)">'
      + '<p style="padding:.7rem .9rem;background:var(--card2);border-radius:8px;margin-bottom:.85rem;color:var(--text2)">'+(typeof t==='function'?t('bdr_note'):'')+'</p>'
      + '<p><strong>Fonte:</strong> Probabilidade por etapa calculada pelo funil histórico (C06 do CRO Dashboard) — proporção de deals que entraram em Implantação após passar por cada etapa, com amostra mínima de 20 deals. Ganho fixo em 100%. Em ausência de funil suficiente, usa valores padrão.</p>'
      + '<p><strong>Ajuste por deal:</strong> se a probabilidade do deal diverge mais de ±30 pp da etapa, aplica multiplicador 0,9× (pessimista) ou 1,1× (otimista) — clamp ±30 pts, evita distorções extremas.</p>'
      + '<p><strong>Uso:</strong> pipeline ponderado = Σ ARR × prob; gráfico de Receita Ponderada (N24); projeções de forecast. Editável em Configurações (⚙).</p>'
      + '<p><strong>Persistência:</strong> configurações salvas por usuário/navegador (localStorage) — não afetam outros usuários.</p>'
      + tbl + '</div>';
    openModal('Regras de Probabilização', body);
  };
  if(document.readyState!=='loading') build(); else document.addEventListener('DOMContentLoaded',build);
})();
</script>
</body>
</html>
