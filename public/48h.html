*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#171f2e;--card2:#1e2a3c;--border:#293a50;--text:#e6edf3;--text2:#8b949e;--muted:#6e7681;--teal:#3ab8b7;--green:#3fb950;--red:#f85149;--orange:#d29922;--yellow:#e3b341;--hover:rgba(255,255,255,0.06);--even-s:#131b28;--hover-s:#1c2b40;--hdr-glass:rgba(13,17,23,.78)}
html[data-theme="light"]{--bg:#f6f8fa;--card:#ffffff;--card2:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#57606a;--teal:#0d7377;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--hover:rgba(0,0,0,0.05);--even-s:#f1f4f8;--hover-s:#e8eef4;--hdr-glass:rgba(246,248,250,.82)}
body{background:var(--bg);color:var(--text);font-family:Inter,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5}
button,input,select,textarea{font-family:Inter,'Segoe UI',system-ui,sans-serif}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.15rem}
.hdr-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);border-radius:99px;cursor:pointer;transition:background .15s,color .15s;position:relative;flex-shrink:0}
.hdr-btn:hover{background:rgba(255,255,255,0.13);color:var(--text)}
html[data-theme="light"] .hdr-btn:hover{background:rgba(0,0,0,0.07)}
.hdr-btn.highlighted{background:var(--teal)!important;color:#fff!important;box-shadow:0 0 0 2px rgba(58,184,183,.3)}
.hdr-btn[data-tooltip]::after{content:attr(data-tooltip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);font-size:.73rem;padding:.26rem .62rem;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300}
.hdr-btn[data-tooltip]:hover::after{opacity:1}
.hdr-sep{width:1px;height:16px;background:rgba(255,255,255,0.12);margin:0 2px;flex-shrink:0}
html[data-theme="light"] .hdr-sep{background:rgba(0,0,0,0.12)}
.hdr-actions{display:flex;align-items:center;background:rgba(255,255,255,0.09);border-radius:99px;padding:7px;gap:12px}
html[data-theme="light"] .hdr-actions{background:rgba(0,0,0,0.03)}
@keyframes hdr-spin{to{transform:rotate(360deg)}}
.hdr-btn.spinning svg{animation:hdr-spin .7s linear infinite}
/* Settings drawer global */
.gs-toggle{display:inline-flex;align-items:center;cursor:pointer;background:var(--card2);border:1px solid var(--border);border-radius:99px;padding:.3rem;flex:none}
.gs-sw{width:34px;height:19px;border-radius:99px;background:var(--border);position:relative;transition:background .18s;flex:none}
.gs-toggle.on .gs-sw{background:var(--teal)}
.gs-sw::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .18s}
.gs-toggle.on .gs-sw::after{transform:translateX(15px)}
.gs-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s}
.gs-backdrop.open{opacity:1;pointer-events:auto}
.gs-drawer{position:fixed;top:0;right:-380px;width:360px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:3001;display:flex;flex-direction:column;transition:right .28s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.25)}
.gs-drawer.open{right:0}
.gs-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.gs-hdr h3{margin:0;font-size:1.2rem;font-weight:600;color:var(--text)}
.gs-body{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.gs-row{display:flex;align-items:center;gap:.75rem;padding:.85rem 0;border-bottom:1px solid var(--border)}
.gs-row label{flex:1;font-size:.9rem;color:var(--text)}
.nav-drawer{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--card);border-right:1px solid rgba(255,255,255,.08);z-index:1000;transition:left .25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.nav-drawer.open{left:0}
.nav-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s ease}
.nav-backdrop.open{opacity:1;pointer-events:auto}
.nav-drawer-header{display:flex;align-items:center;gap:.75rem;padding:1.1rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-drawer-brand{font-weight:600;font-size:1rem;color:var(--text);flex:1}
.nav-drawer-footer{margin-top:auto;display:flex;align-items:center;gap:.5rem;padding:.7rem .75rem;border-top:1px solid rgba(255,255,255,.08)}
html[data-theme="light"] .nav-drawer-footer{border-top-color:rgba(0,0,0,.1)}
.nav-foot-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;min-height:38px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;padding:.4rem;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.04em;transition:border-color .15s,color .15s,background .15s}
.nav-foot-btn:hover{border-color:var(--teal);color:var(--text)}
.nav-menu{list-style:none;padding:.5rem 0;margin:0}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.25rem;cursor:pointer;font-size:.9rem;color:var(--text2);transition:background .15s,color .15s}.nav-item.nav-sub{padding-left:2.7rem;font-size:.8rem;gap:.55rem}.nav-item.nav-sub svg{width:14px;height:14px}.nav-menu.nav-group-collapsed .nav-item.nav-sub{display:none}.nav-acc-chevron{margin-left:auto;display:inline-flex;align-items:center;padding:2px;color:var(--text2);transition:transform .18s;border-radius:4px}.nav-acc-chevron:hover{background:rgba(35,209,180,.15);color:var(--teal)}.nav-acc-chevron.open{transform:rotate(180deg)}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.nav-item.active{color:var(--teal);font-weight:500}
.nav-item.active svg{stroke:var(--teal)}
[data-theme="light"] .nav-drawer{background:var(--card);border-right-color:rgba(0,0,0,.1)}
[data-theme="light"] .nav-item:hover{background:rgba(0,0,0,.04)}
.novo-hdr{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.25rem 2rem;background:transparent;position:sticky;top:0;z-index:100;transition:background .25s,backdrop-filter .25s,box-shadow .25s}
.novo-hdr.scrolled{background:var(--hdr-glass);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);box-shadow:0 1px 0 var(--border)}
.novo-theme-sun{display:block}.novo-theme-moon{display:none}
[data-theme="light"] .novo-theme-sun{display:none}[data-theme="light"] .novo-theme-moon{display:block}
.novo-lang-btn{width:auto !important;padding:0 9px;font-size:.71rem;font-weight:700;letter-spacing:.06em}
.novo-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:1rem;padding-bottom:2rem}
.novo-card{background:var(--card);border-radius:10px;padding:1.25rem 1.5rem}
.novo-card-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.novo-card-header h3{font-size:.88rem;font-weight:600;color:var(--text);margin:0;flex:1}
.novo-info-btn{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--text2);background:none;color:var(--text2);font-size:.62rem;font-style:normal;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;padding:0;line-height:1}
#novo-tip{position:fixed;z-index:9999;background:rgba(23,31,46,.78);backdrop-filter:blur(14px) saturate(1.5);border-radius:6px;padding:.45rem .7rem;width:278px;pointer-events:none;display:none;box-shadow:0 6px 20px rgba(0,0,0,.3)}
html[data-theme="light"] #novo-tip{background:rgba(246,248,250,.82)}
#novo-tip.nt-show{display:block}
#novo-tip .nt-text{font-size:.73rem;color:var(--text);font-weight:400;line-height:1.5}
#novo-tip .nt-code{font-size:.62rem;font-weight:700;color:var(--teal);font-family:ui-monospace,Menlo,Consolas,monospace;margin-top:.3rem;padding-top:.28rem;border-top:1px solid rgba(255,255,255,.12);letter-spacing:.07em}

.tab-sub-btn{background:transparent;border:none;border-radius:99px;color:var(--text2);padding:.3rem .9rem;cursor:pointer;font-size:.75rem;font-weight:500;transition:color .18s;position:relative;z-index:1}
.tab-sub-btn.active{color:var(--text);font-weight:600}
.novo-card-header .tab-sub{margin-bottom:0}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:.75rem}
.kpi-card{background:var(--card);border-radius:14px;padding:1.6rem 1.8rem;position:relative;transition:box-shadow .18s}
.kpi-card:hover{box-shadow:0 0 0 2px rgba(58,184,183,.35)}
.kpi-label{font-size:.66rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;line-height:1}
.kpi-value{font-size:2rem;font-weight:800;line-height:1.1;margin:.35rem 0 .25rem}
.kpi-sub{font-size:.7rem;color:var(--muted);line-height:1.35}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s linear;backdrop-filter:blur(5px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:90vw;max-width:960px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .28s cubic-bezier(0.4,0,0.2,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1rem;font-weight:600;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px;transition:color .15s}

.modal-body{padding:1.2rem 1.5rem;overflow-y:auto;flex:1}
.btn-export{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:.3rem .7rem;font-size:.7rem;cursor:pointer;transition:border-color .12s,color .12s;margin-left:auto}
.btn-export:hover{border-color:var(--teal);color:var(--teal)}
table.lb{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
table.lb th{text-align:right;color:var(--teal);font-size:.72rem;font-weight:700;text-transform:uppercase;padding:.6rem 1rem;border-bottom:2px solid var(--teal);white-space:nowrap;position:sticky;top:0;background:var(--card)}
table.lb th:first-child{text-align:left}
table.lb td{padding:.38rem 1rem;border-bottom:1px solid var(--border);color:var(--text);text-align:right;font-variant-numeric:normal}
table.lb td:first-child{text-align:left;font-weight:600}
table.lb tbody tr:nth-child(even) td{background:var(--even-s)}
table.lb tbody tr:hover td{background:var(--hover-s)}
#view-novo{transition:filter .25s ease,margin-left .25s cubic-bezier(0.4,0,0.2,1)}
body.nav-docked #view-novo{margin-left:280px}
@media(max-width:820px){body.nav-docked #view-novo{margin-left:0}}
.content-blur{filter:blur(4px);pointer-events:none;user-select:none}
.novo-help-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s ease}
.novo-help-backdrop.open{opacity:1;pointer-events:auto}
.novo-help-drawer{position:fixed;top:0;right:-580px;width:540px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:3001;display:flex;flex-direction:column;transition:right .28s cubic-bezier(0.4,0,0.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.25)}
.novo-help-drawer.open{right:0}
.novo-help-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.novo-help-hdr h3{margin:0;font-size:1.15rem;font-weight:600;color:var(--text)}
.novo-help-body{flex:1;overflow-y:auto;padding:1.25rem 1.5rem}
.alert-card{background:var(--card2);border-radius:8px;padding:.75rem 1rem;border-left:3px solid var(--teal);margin-bottom:.5rem;font-size:.82rem;display:flex;gap:.75rem;align-items:flex-start}
.alert-card.alert-red{border-left-color:var(--red)}
.alert-card.alert-green{border-left-color:var(--green)}
.alert-card.alert-yellow{border-left-color:var(--yellow)}
</style>

<script>
// ── Tema ──────────────────────────────────────────────────────────────────────
(function(){ var s=localStorage.getItem('axenya_theme')||'dark'; if(s==='light') document.documentElement.setAttribute('data-theme','light'); })();
function toggleTheme(){ var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('axenya_theme',n); if(_novoDeals) novoRender(); }
function doLogout(){ window.location.href='/login.html'; }
function setContentBlur(on){ var el=document.getElementById('view-novo'); if(el) el.classList.toggle('content-blur',on); }
// ── Configurações globais (compartilhadas via localStorage entre os painéis) ───
// _gsSync / novoOpenSettings / novoCloseSettings: agora no módulo compartilhado settings-modal.js
function novoToggleImplWon(){ _novoImplWon=!_novoImplWon; try{localStorage.setItem('novo_impl_won',_novoImplWon?'1':'0');}catch(e){} _gsSync(); if(_novoDeals)novoRender(); }
function novoToggleActiveMeetings(){ _novoActiveMeetings=!_novoActiveMeetings; try{localStorage.setItem('novo_active_meetings',_novoActiveMeetings?'1':'0');}catch(e){} _gsSync(); if(_novoDeals)novoRender(); }
function novoToggleActiveStandby(){ _novoActiveStandby=!_novoActiveStandby; try{localStorage.setItem('novo_active_standby',_novoActiveStandby?'1':'0');}catch(e){} _gsSync(); if(_novoDeals)novoRender(); }

// ── Nav ───────────────────────────────────────────────────────────────────────
function _setNavOpen(open){ document.getElementById('nav-drawer').classList.toggle('open',open); document.body.classList.toggle('nav-docked',open); var narrow=window.matchMedia('(max-width:820px)').matches; document.getElementById('nav-backdrop').classList.toggle('open',open&&narrow); try{localStorage.setItem('novo_nav_open',open?'true':'false');}catch(e){} }

function closeDrawer(){ _setNavOpen(false); setContentBlur(false); }
function toggleDrawer(){ _setNavOpen(!document.getElementById('nav-drawer').classList.contains('open')); }

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(title,bodyHtml){ setContentBlur(true); document.getElementById('modal-title').textContent=title; document.getElementById('modal-body').innerHTML=bodyHtml; document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); setContentBlur(false); }
function exportModalCSV(){ var title=document.getElementById('modal-title').textContent; var table=document.getElementById('modal-body').querySelector('table'); if(!table)return; var rows=[]; table.querySelectorAll('tr').forEach(function(tr){ var cells=[]; tr.querySelectorAll('th,td').forEach(function(c){ cells.push('"'+(c.textContent.trim().replace(/"/g,'""'))+'"'); }); rows.push(cells.join(',')); }); var a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(rows.join('\n')); a.download=(title||'export').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40)+'-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); }

// ── i18n ──────────────────────────────────────────────────────────────────────
var NOVO_LANG=(function(){ try{return localStorage.getItem('novo_lang')||'pt';}catch(e){return 'pt';} })();
var NOVO_I18N={
  pt:{ loading:'Buscando dados…', error_prefix:'Erro: ', retry:'Tentar novamente', updated_at:'Atualizado às',
    h48_new_deals:'Novos Deals', h48_new_vidas:'Vidas Novas', h48_won:'Deals Ganhos', h48_active:'Deals Ativos',
    h48_by_ae:'Originação por AE (janela fixa)', h48_by_ae_tip:'Deals criados na janela fixa do painel, agrupados por responsável. Usa createdate e não usa o filtro global.',
    h48_vidas_ae:'Vidas Novas por AE (janela fixa)', h48_vidas_ae_tip:'Vidas dos deals criados na janela fixa do painel. Usa createdate e não usa o filtro global.',
    h48_by_stage:'Etapa Atual dos Novos Deals', h48_by_stage_tip:'Etapa atual dos deals criados na janela fixa. Não é etapa histórica de entrada.',
    h48_won_table:'Deals Ganhos Recentemente', h48_won_table_tip:'Deals ganhos na janela fixa, por close_date. Implantação conta como ganho quando o toggle global está ON.',
    h48_new_table:'Todos os Novos Deals (48h)', h48_window:'Janela',
  },
  en:{ loading:'Fetching data…', error_prefix:'Error: ', retry:'Try again', updated_at:'Updated at',
    h48_new_deals:'New Deals', h48_new_vidas:'New Lives', h48_won:'Won Deals', h48_active:'Active Deals',
    h48_by_ae:'Origination by AE (fixed window)', h48_by_ae_tip:'Deals created in the panel fixed window, grouped by owner. Uses createdate and ignores the global filter.',
    h48_vidas_ae:'New Lives by AE (fixed window)', h48_vidas_ae_tip:'Lives from deals created in the panel fixed window. Uses createdate and ignores the global filter.',
    h48_by_stage:'Current Stage of New Deals', h48_by_stage_tip:'Current stage of deals created in the fixed window. This is not historical entry stage.',
    h48_won_table:'Recently Won Deals', h48_won_table_tip:'Deals won in the fixed window, by close_date. Implementation counts as won when the global toggle is ON.',
    h48_new_table:'All New Deals (48h)', h48_window:'Window',
  }
};
function t(k){ return (NOVO_I18N[NOVO_LANG]||NOVO_I18N.pt)[k] || (NOVO_I18N.pt[k]) || k; }
function novoToggleLang(){ NOVO_LANG=NOVO_LANG==='pt'?'en':'pt'; try{localStorage.setItem('novo_lang',NOVO_LANG);}catch(e){} (function(_e){if(_e)_e.textContent=NOVO_LANG.toUpperCase();})(document.getElementById('novo-lang-label')); if(_novoDeals) novoRender(); }

// ── Help drawer ───────────────────────────────────────────────────────────────
var H48_HELP=[
  {key:'h48-by-ae',title:()=>t('h48_by_ae'),desc:'Deals criados nas últimas 48h por responsável.',fields:[['createdate','Data de criação do deal.'],['ae','Responsável (AE) pelo deal.']]},
  {key:'h48-vidas-ae',title:()=>t('h48_vidas_ae'),desc:'Vidas dos deals criados nas últimas 48h por AE.',fields:[['createdate','Data de criação.'],['ae','Responsável.'],['vidas','Quantidade de vidas.']]},
  {key:'h48-by-stage',title:()=>t('h48_by_stage'),desc:'Distribuição por etapa dos deals criados nas últimas 48h.',fields:[['stage','Etapa atual do deal.'],['createdate','Data de criação.']]},
  {key:'h48-won-table',title:()=>t('h48_won_table'),desc:'Deals recém-ganhos com base na data de fechamento.',fields:[['stage','Deve ser Ganho.'],['close_date','Data de fechamento (close_date).']]},
];
function novoHelp(){ document.getElementById('novo-help-title').textContent='Campos do HubSpot por gráfico'; var html='<table class="lb" style="font-size:.78rem"><thead><tr><th style="text-align:left">Gráfico</th><th style="text-align:left">Campo HubSpot</th><th style="text-align:left">Descrição</th></tr></thead><tbody>'; H48_HELP.forEach(function(c){ c.fields.forEach(function(f,i){ html+='<tr><td style="text-align:left;white-space:nowrap">'+(i===0?'<strong>'+c.title()+'</strong>':'')+'</td><td style="text-align:left;font-family:ui-monospace,monospace;color:var(--teal);white-space:nowrap">'+f[0]+'</td><td style="text-align:left;color:var(--text2)">'+f[1]+'</td></tr>'; }); }); html+='</tbody></table>'; document.getElementById('novo-help-body').innerHTML=html; document.getElementById('novo-help-backdrop').classList.add('open'); document.getElementById('novo-help-drawer').classList.add('open'); }
function novoCloseHelp(){ document.getElementById('novo-help-backdrop').classList.remove('open'); document.getElementById('novo-help-drawer').classList.remove('open'); }

// ── Info tooltip ──────────────────────────────────────────────────────────────
document.addEventListener('mouseover',function(e){ var btn=e.target.closest('.novo-info-btn'); if(!btn)return; var tip=document.getElementById('novo-tip'); tip.querySelector('.nt-text').textContent=btn.getAttribute('data-tip')||''; tip.querySelector('.nt-code').textContent=btn.getAttribute('data-code')||''; tip.classList.add('nt-show'); });
document.addEventListener('mouseout',function(e){ if(!e.target.closest('.novo-info-btn')) document.getElementById('novo-tip').classList.remove('nt-show'); });
document.addEventListener('mousemove',function(e){ var tip=document.getElementById('novo-tip'); if(!tip.classList.contains('nt-show'))return; var r=tip.getBoundingClientRect(); var x=e.clientX+14; var y=e.clientY+14; if(x+r.width>window.innerWidth-8) x=e.clientX-r.width-10; if(y+r.height>window.innerHeight-8) y=e.clientY-r.height-10; tip.style.left=x+'px'; tip.style.top=y+'px'; });
function _infoBtn(tip,code){ return '<button class="novo-info-btn" data-tip="'+_ne(tip)+'" data-code="'+(code||'')+'" aria-label="info">i</button>'; }

// ── Scroll header ─────────────────────────────────────────────────────────────
window.addEventListener('scroll',function(){ document.getElementById('novo-hdr').classList.toggle('scrolled',window.scrollY>10); },{ passive:true });

// ── Formatadores ─────────────────────────────────────────────────────────────
var _ne=function(s){ return (s==null?'—':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
var _ni=function(v){ return v!=null?Number(v).toLocaleString('pt-BR'):'—'; };
var _nr=function(v){ return v!=null?Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—'; };
var _nd=function(v){ if(!v)return '—'; var p=v.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:v; };
function _revShort(v){ if(!v||v<=0)return 'R$0'; return v>=1000000?('R$'+(v/1000000).toFixed(1)+'M'):('R$'+Math.round(v/1000)+'k'); }
function _fmtBig(v){ if(v==null||isNaN(v))return '—'; if(Math.abs(v)>=1e6)return 'R$ '+(v/1e6).toFixed(2).replace('.',',')+'M'; if(Math.abs(v)>=1e3)return 'R$ '+(v/1e3).toFixed(1).replace('.',',')+'k'; return 'R$ '+Math.round(v).toLocaleString('pt-BR'); }

// ── Constantes ────────────────────────────────────────────────────────────────
var NOVO_FONT='Inter,\'Segoe UI\',system-ui,sans-serif';
var NOVO_WON_STAGE='Ganho';
var NOVO_STAGE_ORDER=['Diagnóstico','Cotação','Proposta Enviada','Consultoria','Negociação','Standby','Implantação'];
function _stageNorm(s){ return s==='Stand by'?'Standby':s; }
function _annualRev(d){ if(d.arr_estimado!=null&&d.arr_estimado>0)return d.arr_estimado; if(d.primeira_fatura!=null&&d.primeira_fatura>0)return d.primeira_fatura*12; return 0; }
function _rawDeals(){ return window._novoDealsRaw || _novoDeals || []; }
var _novoImplWon=(function(){try{return localStorage.getItem('novo_impl_won')!=='0';}catch(e){return true;}})();
var _novoActiveMeetings=(function(){try{return localStorage.getItem('novo_active_meetings')!=='0';}catch(e){return true;}})();
var _novoActiveStandby=(function(){try{return localStorage.getItem('novo_active_standby')==='1';}catch(e){return false;}})();
function _novoIsWon(d){ return d.stage==='Ganho'||(_novoImplWon&&d.stage==='Implantação'); }
function _novoOpen(){ return _rawDeals().filter(function(d){ return !_novoIsWon(d)&&d.stage!=='Perdido'&&(_novoActiveMeetings||d.stage!=='Reunião Agendada')&&(_novoActiveStandby||(d.stage!=='Standby'&&d.stage!=='Stand by')); }); }
function _novoTheme(){ var isLight=document.documentElement.getAttribute('data-theme')==='light'; return { cText:isLight?'#1f2328':'#e6edf3', cText2:isLight?'#57606a':'#8b949e', cGrid:isLight?'rgba(0,0,0,.08)':'rgba(255,255,255,.06)', isLight:isLight }; }

// ── Chart maker ───────────────────────────────────────────────────────────────
var _novoCharts={};
function _novoMkChart(id,cfg){ var ctx=document.getElementById(id); if(!ctx)return; if(_novoCharts[id]) _novoCharts[id].destroy(); _novoCharts[id]=new Chart(ctx,cfg); }

// ── Deals modal ───────────────────────────────────────────────────────────────
function _novoDealsRows(deals){ return deals.map(function(d){ var hsUrl=d.hs_id?'https://app.hubspot.com/contacts/44715285/deal/'+d.hs_id:'#'; var nameCell=d.hs_id?'<a href="'+hsUrl+'" target="_blank" rel="noopener" style="color:var(--teal);text-decoration:none">'+_ne(d.dealname)+'</a>':_ne(d.dealname); return '<tr><td style="text-align:left;min-width:150px;max-width:210px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+nameCell+'</td><td style="text-align:left;white-space:nowrap">'+_ne(d.ae)+'</td><td>'+_ne(d.pipeline)+'</td><td style="white-space:nowrap">'+_ne(d.stage)+'</td><td>'+_ni(d.vidas)+'</td><td>'+_revShort(_annualRev(d))+'</td><td style="white-space:nowrap">'+(d.createdate||'—')+'</td><td style="white-space:nowrap">'+(d.close_date||'—')+'</td><td style="white-space:nowrap">'+(d.data_prevista_para_receita||'—')+'</td></tr>'; }).join(''); }
function novoOpenDealsModal(title,deals){ if(!deals||!deals.length){ openModal(title,'<p style="color:var(--text2);padding:1rem 0">Nenhum deal.</p>'); return; } var html='<table class="lb"><thead><tr><th style="text-align:left">Deal</th><th style="text-align:left">AE</th><th>Pipe</th><th>Etapa</th><th>Vidas</th><th>ARR</th><th>Criado</th><th>Fechado</th><th>Dt. Receita</th></tr></thead><tbody>'+_novoDealsRows(deals)+'</tbody></table>'; openModal(title+' ('+deals.length+')',html); }

// ── Data loading ──────────────────────────────────────────────────────────────
var _novoDeals=null;
function novoLoadData(){
  var btn=document.getElementById('btn-refresh');
  if(btn) btn.classList.add('spinning');
  document.getElementById('novo-content').innerHTML='<div style="text-align:center;padding:3rem 0;color:var(--text2)">'+t('loading')+'</div>';
  fetch('/api/forecast-table').then(function(r){ if(!r.ok) return r.text().then(function(txt){ throw new Error(txt||('HTTP '+r.status)); }); return r.json(); }).then(function(data){
    _novoDeals=Array.isArray(data)?data:(data.deals||[]);window._novoDealsRaw=_novoDeals;
    if(btn) btn.classList.remove('spinning');
    novoRender();
  }).catch(function(err){
    if(btn) btn.classList.remove('spinning');
    document.getElementById('novo-content').innerHTML='<div style="text-align:center;padding:3rem 0;color:var(--red)">'+t('error_prefix')+_ne(String(err))+'<br><br><button onclick="novoLoadData()" style="background:var(--teal);color:#fff;border:none;border-radius:8px;padding:.5rem 1.2rem;cursor:pointer">'+t('retry')+'</button></div>';
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function novoRender(){
  var deals=_rawDeals();
  var now=new Date();
  var cutoff=new Date(now.getTime()-48*60*60*1000);
  var cutoffISO=cutoff.toISOString().slice(0,10);
  var newDeals=deals.filter(function(d){ return d.createdate && d.createdate>=cutoffISO; });
  var wonDeals=deals.filter(function(d){ return _novoIsWon(d) && d.close_date && d.close_date>=cutoffISO; });
  var newVidas=newDeals.reduce(function(s,d){return s+(d.vidas||0);},0);
  var ts=new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
  document.getElementById('h48-subtitle').textContent=t('updated_at')+' '+ts+' | '+t('h48_window')+': '+cutoffISO+' → '+now.toISOString().slice(0,10)+' | filtro global não aplicado';

  var kpi=function(lbl,val,sub,col){
    return '<div class="kpi-card"><div class="kpi-label">'+lbl+'</div><div class="kpi-value" style="color:'+(col||'var(--text)')+'">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>';
  };

  document.getElementById('novo-content').innerHTML=
    '<div style="font-size:.78rem;color:var(--text2);margin-bottom:1rem">Painel de janela fixa: usa createdate para novos deals e close_date para ganhos. Não responde ao filtro global.</div>'+
    '<div class="kpi-row">'+
      kpi(t('h48_new_deals'),newDeals.length,'deals criados na janela fixa','var(--teal)')+
      kpi(t('h48_new_vidas'),_ni(newVidas),'vidas dos novos deals','var(--teal)')+
      kpi(t('h48_won'),wonDeals.length,'ganhos por close_date','var(--green)')+
      kpi('Deals Abertos Total',_novoOpen().length,'snapshot atual','var(--text)')+
    '</div>'+
    '<div id="h48-alerts" style="margin-bottom:1.25rem"></div>'+
    '<div class="novo-cards">'+
      '<div class="novo-card"><div class="novo-card-header"><h3>'+t('h48_by_ae')+'</h3>'+_infoBtn(t('h48_by_ae_tip'),'createdate, ae')+'</div><canvas id="chart-h48-ae" style="max-height:320px"></canvas></div>'+
      '<div class="novo-card"><div class="novo-card-header"><h3>'+t('h48_vidas_ae')+'</h3>'+_infoBtn(t('h48_vidas_ae_tip'),'vidas, ae, createdate')+'</div><canvas id="chart-h48-vidas-ae" style="max-height:320px"></canvas></div>'+
      '<div class="novo-card"><div class="novo-card-header"><h3>'+t('h48_by_stage')+'</h3>'+_infoBtn(t('h48_by_stage_tip'),'stage, createdate')+'</div><canvas id="chart-h48-stage" style="max-height:300px"></canvas></div>'+
      '<div class="novo-card"><div class="novo-card-header"><h3>'+t('h48_won_table')+'</h3>'+_infoBtn(t('h48_won_table_tip'),'stage, close_date')+'</div><div id="h48-won-body"></div></div>'+
      '<div class="novo-card" style="grid-column:1/-1"><div class="novo-card-header"><h3>'+t('h48_new_table')+'</h3><span style="font-size:.75rem;color:var(--teal);font-weight:600">'+newDeals.length+' deals</span></div><div id="h48-new-table"></div></div>'+
    '</div>';

  buildH48Alerts(newDeals, wonDeals, now, cutoff);
  buildH48ChartAE(newDeals);
  buildH48ChartVidasAE(newDeals);
  buildH48ChartStage(newDeals);
  buildH48WonTable(wonDeals);
  buildH48NewTable(newDeals);
}

// ── Builders ──────────────────────────────────────────────────────────────────
function buildH48Alerts(newDeals, wonDeals, now, cutoff){
  var el=document.getElementById('h48-alerts');
  if(!el)return;
  var alerts='';
  if(wonDeals.length>0){
    var wonVidas=wonDeals.reduce(function(s,d){return s+(d.vidas||0);},0);
    alerts+='<div class="alert-card alert-green"><span><strong>'+wonDeals.length+' deal(s) ganho(s)</strong> nas últimas 48h | '+_ni(wonVidas)+' vidas | '+_revShort(wonDeals.reduce(function(s,d){return s+_annualRev(d);},0))+' ARR</span></div>';
  }
  var bigNew=newDeals.filter(function(d){return (d.vidas||0)>=500;});
  if(bigNew.length>0){
    alerts+='<div class="alert-card"><span><strong>'+bigNew.length+' deal(s) grande(s)</strong> criado(s) com 500+ vidas</span></div>';
  }
  var noVidas=newDeals.filter(function(d){return !d.vidas;});
  if(noVidas.length>0){
    alerts+='<div class="alert-card alert-yellow"><span><strong>'+noVidas.length+' deal(s) sem vidas</strong> cadastrado(s) | preencher campo <code style="color:var(--teal)">numero_de_vidas</code></span></div>';
  }
  if(!alerts) alerts='<div class="alert-card"><span>Nenhum alerta no período.</span></div>';
  el.innerHTML=alerts;
}

function buildH48ChartAE(newDeals){
  var th=_novoTheme();
  var aeMap={};
  newDeals.forEach(function(d){ var ae=d.ae||'(sem AE)'; aeMap[ae]=(aeMap[ae]||0)+1; });
  var aes=Object.keys(aeMap).sort(function(a,b){return aeMap[b]-aeMap[a];});
  if(!aes.length){ document.getElementById('chart-h48-ae').parentElement.querySelector('.novo-card-header').insertAdjacentHTML('afterend','<p style="color:var(--text2);font-size:.82rem;padding:.5rem 0">Nenhum deal criado nas últimas 48h.</p>'); return; }
  _novoMkChart('chart-h48-ae',{type:'bar',plugins:[ChartDataLabels],
    data:{labels:aes,datasets:[{data:aes.map(function(ae){return aeMap[ae];}),backgroundColor:'rgba(88,166,255,.75)',borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,layout:{padding:{right:45}},plugins:{legend:{display:false},
      datalabels:{anchor:'end',align:'right',color:th.cText,font:{family:NOVO_FONT,size:11,weight:'bold'}},
      tooltip:{callbacks:{label:function(c){return c.parsed.x+' deals';},footer:function(){return 'Clique para ver';} }}},

<style>
.panel-switcher{position:relative;display:inline-block}

.panel-switcher.open .panel-chevron{transform:rotate(180deg)}

.panel-dd{position:absolute;top:calc(100% + 10px);left:0;min-width:236px;background:rgba(23,31,46,.62);backdrop-filter:blur(20px) saturate(1.7);-webkit-backdrop-filter:blur(20px) saturate(1.7);border:none;border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.4);padding:.4rem;z-index:1500;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .18s ease,transform .18s ease}

.panel-dd-item:hover{background:rgba(255,255,255,.1);color:var(--text)}

.panel-dd-item svg{flex-shrink:0;opacity:.9}

.modal-body,.novo-help-body,.novo-prob-body,[style*="overflow-x:auto"]{scrollbar-width:thin;scrollbar-color:var(--text2) transparent}
.modal-body::-webkit-scrollbar,.novo-help-body::-webkit-scrollbar,.novo-prob-body::-webkit-scrollbar,[style*="overflow-x:auto"]::-webkit-scrollbar{height:11px;width:11px}
.modal-body::-webkit-scrollbar-track,.novo-help-body::-webkit-scrollbar-track,.novo-prob-body::-webkit-scrollbar-track,[style*="overflow-x:auto"]::-webkit-scrollbar-track{background:transparent}
.modal-body::-webkit-scrollbar-thumb,.novo-help-body::-webkit-scrollbar-thumb,.novo-prob-body::-webkit-scrollbar-thumb,[style*="overflow-x:auto"]::-webkit-scrollbar-thumb{background:var(--text2);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
.modal-body::-webkit-scrollbar-thumb:hover,.novo-help-body::-webkit-scrollbar-thumb:hover,.novo-prob-body::-webkit-scrollbar-thumb:hover,[style*="overflow-x:auto"]::-webkit-scrollbar-thumb:hover{background:var(--teal)}
</style>
<script>
(function(){

    {label:'Cotação',url:'/forecast-cotacao',sub:true,file:'forecast-panel.html',health:'g',icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>'},
    {label:'Consultoria',url:'/forecast-consultoria',sub:true,file:'forecast-panel.html',health:'g',icon:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'},
    {label:'Negociação',url:'/forecast-negociacao',sub:true,file:'forecast-panel.html',health:'g',icon:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>'},
    {label:'BID',url:'/forecast-bid',sub:true,file:'forecast-panel.html',health:'g',icon:'<path d="M3 3v18h18"/><path d="M19 9l-5 5-3-3-4 4"/>'},
    {label:'Ganho',url:'/forecast-ganho',sub:true,file:'forecast-panel.html',health:'g',icon:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'}
  ];
  function findByUrl(u){ for(var i=0;i<PANELS.length;i++){ if(PANELS[i].url===u) return PANELS[i]; } return null; }
  var p2=location.pathname; if(p2.length>1&&p2.charAt(p2.length-1)==='/') p2=p2.slice(0,-1);
  var current=null;
  for(var i=0;i<PANELS.length;i++){ if(p2===PANELS[i].url||p2.indexOf(PANELS[i].file)!==-1){ current=PANELS[i].url; break; } }
