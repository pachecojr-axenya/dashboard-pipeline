<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axenya Pipeline Dashboard — Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 50%, rgba(58,184,183,.04) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 50%, rgba(88,166,255,.03) 0%, transparent 50%);
  animation: drift 20s ease-in-out infinite alternate;
  z-index: -1;
}
@keyframes drift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(30px, -20px) rotate(3deg); }
}

.login-container {
  width: 400px;
  text-align: center;
}

.logo-area {
  margin-bottom: 2.5rem;
}

.logo-text {
  font-size: 1.8rem;
  font-weight: 700;
  color: #3ab8b7;
  letter-spacing: .02em;
}

.logo-sub {
  font-size: .85rem;
  color: #8b949e;
  margin-top: .3rem;
}

.login-card {
  background: #1a1d27;
  border: 1px solid #30363d;
  border-radius: 14px;
  padding: 2rem;
}

.login-card h2 {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: .5rem;
  color: #e6edf3;
}

.login-card .subtitle {
  font-size: .8rem;
  color: #8b949e;
  margin-bottom: 1.5rem;
}

/* Google Sign-In button — custom styled to match dark theme */
.btn-google {
  width: 100%;
  padding: .85rem 1rem;
  background: #fff;
  color: #3c4043;
  border: 1px solid #dadce0;
  border-radius: 8px;
  font-size: .95rem;
  font-weight: 500;
  cursor: pointer;
  transition: background .2s, box-shadow .2s;
  font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .75rem;
}

.btn-google:hover {
  background: #f8f9fa;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}

.btn-google:active {
  background: #e8eaed;
}

.btn-google:disabled {
  opacity: .6;
  cursor: not-allowed;
}

.btn-google svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

.divider {
  display: flex;
  align-items: center;
  margin: 1.5rem 0;
  color: #6e7681;
  font-size: .75rem;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #30363d;
}

.divider::before { margin-right: .75rem; }
.divider::after { margin-left: .75rem; }

.domain-badge {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .3rem .7rem;
  background: rgba(58,184,183,.1);
  border: 1px solid rgba(58,184,183,.2);
  border-radius: 20px;
  font-size: .75rem;
  color: #3ab8b7;
  margin-top: 1rem;
}

.domain-badge svg {
  width: 14px;
  height: 14px;
}

.error-msg {
  color: #f85149;
  font-size: .8rem;
  margin-top: .8rem;
  min-height: 1.2rem;
  transition: opacity .2s;
}

.status-msg {
  color: #8b949e;
  font-size: .8rem;
  margin-top: .8rem;
  min-height: 1.2rem;
}

.shake {
  animation: shake .4s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

.footer {
  margin-top: 2rem;
  font-size: .7rem;
  color: #6e7681;
}

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #dadce0;
  border-top-color: #3c4043;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="login-container">
  <div class="logo-area">
    <div class="logo-text">Axenya</div>
    <div class="logo-sub">Pipeline de Vendas — Executive Dashboard</div>
  </div>

  <div class="login-card" id="login-card">
    <h2>Bem-vindo</h2>
    <p class="subtitle">Faça login com sua conta Google corporativa</p>

    <button type="button" class="btn-google" id="btn-google" onclick="handleGoogleLogin()">
      <!-- Google "G" logo SVG -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>

    <div class="domain-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Restrito a @axenya.com
    </div>

    <div class="error-msg" id="error-msg"></div>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <div class="footer">Axenya &copy; 2026 — Pipeline Analytics</div>
</div>

<!-- Canonical-host redirect disabled for now.
     Was forcing redirect to axenya-pipeline-dashboard-psi.vercel.app -->


<!-- Google Identity Services library -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
const USER_KEY = 'axenya_current_user';
const errorMsg = document.getElementById('error-msg');
const statusMsg = document.getElementById('status-msg');
const card = document.getElementById('login-card');
const btn = document.getElementById('btn-google');

// Check if already logged in — cookie HttpOnly não é visível ao JS, então perguntamos ao backend
(async function checkExistingSession() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      if (data && data.success) {
        try { localStorage.setItem(USER_KEY, JSON.stringify(data.user)); } catch {}
        window.location.href = '/dashboard';
      }
    }
  } catch { /* offline/no session — continua no login */ }
})();

// Google Sign-In callback
async function handleCredentialResponse(response) {
  errorMsg.textContent = '';
  statusMsg.textContent = 'Verificando...';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verificando...';

  try {
    const res = await fetch('/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ credential: response.credential })
    });

    const data = await res.json();

    if (data.success) {
      try { localStorage.setItem(USER_KEY, JSON.stringify(data.user)); } catch {}
      statusMsg.textContent = 'Redirecionando...';
      window.location.href = '/dashboard';
    } else {
      errorMsg.textContent = data.error || 'Erro ao autenticar';
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);
    }
  } catch (e) {
    errorMsg.textContent = 'Erro de comunicação com o servidor';
  } finally {
    btn.disabled = false;
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Entrar com Google`;
    statusMsg.textContent = '';
  }
}

// Manual Google login trigger (button click)
function handleGoogleLogin() {
  // Check if GIS library is loaded
  if (typeof google === 'undefined' || !google.accounts) {
    errorMsg.textContent = 'Carregando Google Sign-In... tente novamente em 2s';
    return;
  }

  errorMsg.textContent = '';

  // Use the One Tap / popup flow
  google.accounts.id.initialize({
    client_id: window.__GOOGLE_CLIENT_ID__,
    callback: handleCredentialResponse,
    auto_select: false,
    cancel_on_tap_outside: true
  });

  // Trigger the popup
  google.accounts.id.prompt((notification) => {
    if (notification.isNotDisplayed()) {
      // Fallback: use the redirect flow via OAuth2 popup
      const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
        `client_id=${encodeURIComponent(window.__GOOGLE_CLIENT_ID__)}` +
        `&redirect_uri=${encodeURIComponent(window.location.origin + '/api/auth/callback')}` +
        `&response_type=code` +
        `&scope=openid%20email%20profile` +
        `&hd=axenya.com` +
        `&prompt=select_account`;
      window.location.href = authUrl;
    }
  });
}

// Load Google Client ID from our API
(async function loadConfig() {
  try {
    const res = await fetch('/api/auth/config');
    const data = await res.json();
    if (data.clientId) {
      window.__GOOGLE_CLIENT_ID__ = data.clientId;
    } else {
      errorMsg.textContent = 'Erro ao carregar configuração de login';
    }
  } catch (e) {
    errorMsg.textContent = 'Erro ao conectar com o servidor';
  }
})();
</script>
</body>
</html>
